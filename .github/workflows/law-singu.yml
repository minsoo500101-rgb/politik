name: law-singu
# 법령 신구표 자동 캐시: GHA(law.go.kr 도달 가능)에서 받아 data/law/*.json 커밋 → patchkr 서빙
on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST (21:00 UTC)
  workflow_dispatch: {}
concurrency:
  group: law-singu
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 신구표 수집
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          LAW_REFERER: https://patchkr.com
          BODY_BUDGET: '1500'   # 본문 백필/run (시행일 최신순). 전체 법×2025+ 과거 개정 포함 → 며칠 내 완비, 이후 신규만
          LAW_EF_FROM: '20250101'  # eflaw로 이 시행일 이후 모든 개정(과거 포함) 누적
        run: node scripts/fetch-law-singu.mjs
      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/law
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "🤖 법령 신구표 자동 갱신 ($(date -u +%Y-%m-%d))"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break || sleep 5
            done
          fi
