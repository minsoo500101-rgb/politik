name: 본투표율 자동 갱신 (NEC headless)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: '읽기만 (커밋 안 함, 테스트)'
        type: boolean
        default: false
      force:
        description: '투표시간 밖에도 강제 실행'
        type: boolean
        default: false
      nec_url:
        description: 'NEC 조회 문서 URL 오버라이드 (메뉴 ID 변동 시)'
        type: string
        default: ''
  # V31.27 — 9회 지선 종료. 자동 스케줄 정지(수동 실행 workflow_dispatch만 유지). 재사용 시 아래 cron 복원.
  # schedule:
  #   - cron: '*/20 21-23 2 6 *'
  #   - cron: '*/20 0-9 3 6 *'

permissions:
  contents: write

concurrency:
  group: turnout
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright(chromium) 설치
        run: |
          npm i playwright@1.48.2
          npx playwright install --with-deps chromium

      - name: NEC 본투표율 크롤 + fallback 갱신
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FORCE: ${{ github.event.inputs.force }}
          NEC_URL: ${{ github.event.inputs.nec_url }}
        run: node scripts/fetch-turnout-nec.js

      - name: 커밋·푸시 (변경 시에만)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/turnout-fallback.json
          if git diff --cached --quiet; then echo "변경 없음 — 종료"; exit 0; fi
          git commit -m "data: 본투표율 자동 갱신 (NEC headless) $(TZ=Asia/Seoul date '+%m/%d %H:%M' 2>/dev/null || date -u '+%m/%dT%H:%MZ')"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break || (echo "재시도 $i"; sleep 5)
          done
