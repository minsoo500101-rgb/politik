name: Daily data sync

on:
  schedule:
    # 매일 오전 9시 KST (= UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: {} # 수동 트리거 허용

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 위키 자동 career 보충 (career 미보유 인사만)
        run: |
          # 모든 type에 대해 limit 30씩 시도 (rate limit 보호)
          for t in local_gov_muni committee_secretary vice_minister former_pm former_local edu_superintendent agency_head local_council_speaker; do
            node scripts/wiki-auto-career.js --write --type=$t --limit=30 || true
          done

      - name: 변경사항 확인
        id: check
        run: |
          if git diff --quiet data/politicians.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 검증
        if: steps.check.outputs.changed == 'true'
        run: node scripts/validate.js

      - name: 커밋·푸시
        if: steps.check.outputs.changed == 'true'
        run: |
          # politicians.json 버전이 올라갔으니 index.html의 POLITICIANS_VER도 동기화
          NEW_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('data/politicians.json','utf8')).version)")
          sed -i "s|const POLITICIANS_VER = [0-9]*;|const POLITICIANS_VER = ${NEW_VER};|" index.html
          sed -i "s|politicians.json?v=[0-9]*|politicians.json?v=${NEW_VER}|" index.html

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/politicians.json index.html
          git commit -m "chore(data): 위키 자동 career 보충 (cron) — v${NEW_VER}"
          git push
