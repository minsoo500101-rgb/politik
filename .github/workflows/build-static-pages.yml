name: Build Static SEO Pages

on:
  push:
    branches: [main]
    paths:
      - 'build_static_pages.py'
      - 'build_sitemap.py'
      - 'data/**'
  schedule:
    - cron: '30 21 * * *'   # 매일 06:30 KST — 봇 커밋은 워크플로 트리거 안 하므로 스케줄로 정적페이지·사이트맵 갱신
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate static SEO pages + law pages + sitemaps
        run: |
          python build_static_pages.py
          python build_law_pages.py
          python build_law_hot.py
          python build_risk.py
          python build_sitemap.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A *.html sitemap.xml sitemap-law.xml law/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate static SEO pages [skip ci]"
            git push
          fi
