function initRelationsGraph() {
  if (typeof d3 === 'undefined') {
    setTimeout(initRelationsGraph, 200);
    return;
  }
  const container = document.getElementById('rel-container');
  if (!container) return;
  const mps = state.members.filter(m => m._group === 'legislative' && m.HG_NM && m.POLY_NM);
  if (mps.length < 50) {
    container.innerHTML = '<div class="empty">의원 데이터 로딩 중…</div>';
    return;
  }

  const w = Math.min(container.clientWidth || 1000, 1200);
  const h = 700;
  container.innerHTML = '';
  const svg = d3.select(container).append('svg')
    .attr('width', w).attr('height', h)
    .attr('class', 'rel-svg');

  const partyCounts = new Map();
  for (const m of mps) partyCounts.set(m.POLY_NM, (partyCounts.get(m.POLY_NM) || 0) + 1);
  const partyNodes = [...partyCounts.entries()].map(([p, n]) => ({
    id: 'P:' + p, name: p, isParty: true, count: n, color: partyColor(p),
  }));
  const mpNodes = mps.map(m => ({
    id: m.MONA_CD, name: m.HG_NM, party: m.POLY_NM, cmt: m.CMIT_NM,
    region: m.ORIG_NM, color: partyColor(m.POLY_NM), isParty: false,
  }));
  const nodes = [...partyNodes, ...mpNodes];
  const links = mpNodes.map(m => ({ source: m.id, target: 'P:' + m.party }));

  const sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(d => d.isParty ? -2500 : -28))
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.target.isParty ? 80 : 30).strength(0.4))
    .force('center', d3.forceCenter(w/2, h/2))
    .force('collide', d3.forceCollide().radius(d => d.isParty ? 32 : 7))
    .alphaDecay(0.04);

  const g = svg.append('g');
  const linkSel = g.append('g').attr('stroke-opacity', 0.12).attr('stroke-width', 0.6)
    .selectAll('line').data(links).join('line')
    .attr('stroke', d => partyColor((d.target && typeof d.target === 'object' ? d.target.name : d.target.replace('P:','')) || ''));

  const nodeSel = g.append('g').selectAll('g').data(nodes).join('g')
    .style('cursor', d => d.isParty ? 'default' : 'pointer')
    .on('mouseenter', function(e, d) {
      d3.select(this).raise();
      const tip = document.getElementById('rel-tooltip');
      if (tip) {
        tip.innerHTML = d.isParty
          ? `<b>${d.name}</b><br>${d.count}명`
          : `<b>${d.name}</b><br><span style="color:${d.color}">${d.party}</span><br>${d.region || ''}<br><span style="font-size:10px;color:var(--dim)">${d.cmt || ''}</span>`;
        tip.style.display = 'block';
        tip.style.borderColor = d.color;
      }
    })
    .on('mousemove', function(e) {
      const tip = document.getElementById('rel-tooltip');
      if (tip) {
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top  = (e.clientY + 14) + 'px';
      }
    })
    .on('mouseleave', function() {
      const tip = document.getElementById('rel-tooltip');
      if (tip) tip.style.display = 'none';
    })
    .on('click', (e, d) => { if (!d.isParty) location.hash = `#/m/${encodeURIComponent(d.id)}`; });

  nodeSel.append('circle')
    .attr('r', d => d.isParty ? 28 : 5.5)
    .attr('fill', d => d.color)
    .attr('stroke', d => d.isParty ? 'var(--bg-card)' : 'rgba(255,255,255,0.2)')
    .attr('stroke-width', d => d.isParty ? 3 : 0.5)
    .style('filter', d => d.isParty ? `drop-shadow(0 0 12px ${d.color})` : '');

  nodeSel.filter(d => d.isParty).append('text')
    .attr('text-anchor', 'middle').attr('dy', 4)
    .attr('fill', '#fff').attr('font-size', 11).attr('font-weight', 700)
    .style('pointer-events', 'none')
    .text(d => d.count);

  nodeSel.filter(d => d.isParty).append('text')
    .attr('text-anchor', 'middle').attr('dy', 48)
    .attr('fill', d => d.color).attr('font-size', 11).attr('font-weight', 600)
    .style('pointer-events', 'none')
    .style('text-shadow', '0 0 4px var(--bg-card)')
    .text(d => d.name);

  sim.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  svg.call(d3.zoom()
    .scaleExtent([0.5, 4])
    .translateExtent([[-w * 0.5, -h * 0.5], [w * 1.5, h * 1.5]])
    .on('zoom', e => g.attr('transform', e.transform)));

  // 드래그
  function drag(simulation) {
    return d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end',   (event, d) => { if (!event.active) simulation.alphaTarget(0); if (!d.isParty) { d.fx = null; d.fy = null; } });
  }
  nodeSel.call(drag(sim));
}

function renderLocalDonut() {
  // 지방정부 정당 분포 — 광역단체장 + 기초단체장 + 광역의회의장 + 교육감
  const locals = state.members.filter(m =>
    m._type === 'local_gov_head' || m._type === 'local_gov_muni' ||
    m._type === 'local_council_speaker' || m._type === 'edu_superintendent'
  );
  if (locals.length < 10) return '';
  const byParty = new Map();
  for (const m of locals) byParty.set(m.POLY_NM || '무소속', (byParty.get(m.POLY_NM || '무소속') || 0) + 1);
  const arr = [...byParty.entries()].sort((a,b) => b[1]-a[1])
    .map(([name, count]) => ({ name, count, color: partyColor(name) }));
  const total = arr.reduce((s,p) => s+p.count, 0);

  // 카테고리별 카운트
  const cats = {
    광역단체장:  locals.filter(m => m._type === 'local_gov_head').length,
    기초단체장:  locals.filter(m => m._type === 'local_gov_muni').length,
    광역의회의장: locals.filter(m => m._type === 'local_council_speaker').length,
    교육감:      locals.filter(m => m._type === 'edu_superintendent').length,
  };

  const size = 240, R = 100, r = 64;
  const cx = size/2, cy = size/2;
  let angle = -Math.PI/2;
  const segs = arr.map(p => {
    const frac = p.count / total;
    const a0 = angle;
    angle += frac * 2 * Math.PI;
    const a1 = angle;
    const large = frac > 0.5 ? 1 : 0;
    const x0 = cx + R*Math.cos(a0), y0 = cy + R*Math.sin(a0);
    const x1 = cx + R*Math.cos(a1), y1 = cy + R*Math.sin(a1);
    const x2 = cx + r*Math.cos(a1), y2 = cy + r*Math.sin(a1);
    const x3 = cx + r*Math.cos(a0), y3 = cy + r*Math.sin(a0);
    const d = `M${x0.toFixed(2)},${y0.toFixed(2)} A${R},${R} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${x2.toFixed(2)},${y2.toFixed(2)} A${r},${r} 0 ${large} 0 ${x3.toFixed(2)},${y3.toFixed(2)} Z`;
    return { d, ...p, percent: (frac*100).toFixed(1) };
  });

  return `
    <div class="donut-section">
      <div class="donut-head">
        <h2>지방정부 정당 분포</h2>
        <div class="donut-sub">현재 등록 ${total}명 (광역 ${cats.광역단체장} · 기초 ${cats.기초단체장} · 의장 ${cats.광역의회의장} · 교육감 ${cats.교육감})</div>
      </div>
      <div class="donut-wrap">
        <svg viewBox="0 0 ${size} ${size}" class="donut" width="${size}" height="${size}">
          ${segs.map(s => `<path d="${s.d}" fill="${s.color}" stroke="var(--bg-card)" stroke-width="2" class="donut-seg" data-party="${escapeHtml(s.name)}"><title>${escapeHtml(s.name)}: ${s.count}명 (${s.percent}%)</title></path>`).join('')}
          <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="34" font-weight="800" style="fill:var(--text)">${total}</text>
          <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="11" fill="var(--dim)" letter-spacing="1">지방정부</text>
        </svg>
        <div class="donut-legend">
          ${segs.map(s => `
            <div class="donut-leg-row" data-party="${escapeHtml(s.name)}">
              <span class="leg-dot" style="background:${s.color}"></span>
              <span class="leg-name">${escapeHtml(s.name)}</span>
              <span class="leg-count">${s.count}</span>
              <span class="leg-pct">${s.percent}%</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderStats() {
  const mps = state.members.filter(m => m._group === 'legislative' || (!m._group && m.UNITS));
  if (mps.length < 100) return '';

  const now = new Date().getFullYear();
  const ages = mps.map(m => {
    const y = parseInt((m.BTH_DATE || '').slice(0,4), 10);
    return y ? now - y : null;
  }).filter(a => a != null);
  const avgAge = ages.reduce((s,a) => s+a, 0) / ages.length;
  const minAge = Math.min(...ages), maxAge = Math.max(...ages);

  const sex = { 남: 0, 여: 0 };
  for (const m of mps) {
    if (m.SEX_GBN_NM === '남') sex.남++;
    else if (m.SEX_GBN_NM === '여') sex.여++;
  }
  const totalSex = sex.남 + sex.여;

  const terms = new Map();
  for (const m of mps) terms.set(m.REELE_GBN_NM || '초선', (terms.get(m.REELE_GBN_NM || '초선') || 0) + 1);
  const TERM_ORDER = ['초선','재선','3선','4선','5선','6선','7선','8선'];
  const termArr = TERM_ORDER.filter(t => terms.has(t)).map(t => ({ t, c: terms.get(t) }));
  const maxTerm = Math.max(...termArr.map(t => t.c));

  const partyAge = new Map();
  for (const m of mps) {
    const y = parseInt((m.BTH_DATE || '').slice(0,4), 10);
    if (!y) continue;
    if (!partyAge.has(m.POLY_NM)) partyAge.set(m.POLY_NM, []);
    partyAge.get(m.POLY_NM).push(now - y);
  }
  const partyAvg = [...partyAge.entries()]
    .filter(([,arr]) => arr.length >= 3)
    .map(([p, arr]) => ({ p, avg: arr.reduce((s,a) => s+a, 0) / arr.length, count: arr.length }))
    .sort((a,b) => b.count - a.count);
  const maxAvgAge = Math.max(...partyAvg.map(p => p.avg));

  return `
    <div class="stats-section">
      <div class="stats-head">
        <h2>22대 국회 통계</h2>
        <div class="stats-sub">${mps.length}명 의원의 데이터 요약</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">평균 나이 (만)</div>
          <div class="stat-card-value">${avgAge.toFixed(1)}<span class="unit">세</span></div>
          <div class="stat-card-detail">최연소 <b>${minAge}</b> · 최고령 <b>${maxAge}</b></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">성별 분포</div>
          <div class="stat-card-rows">
            <div class="stat-row-item"><span class="sex-dot" style="background:#1e40af"></span><span class="sx-lbl">남</span><b>${sex.남}</b><span class="pct">${(sex.남/totalSex*100).toFixed(1)}%</span></div>
            <div class="stat-row-item"><span class="sex-dot" style="background:#db2777"></span><span class="sx-lbl">여</span><b>${sex.여}</b><span class="pct">${(sex.여/totalSex*100).toFixed(1)}%</span></div>
          </div>
        </div>
        <div class="stat-card stat-card-wide">
          <div class="stat-card-label">선수 분포</div>
          <div class="bar-chart">
            ${termArr.map(t => `
              <div class="bar-row">
                <div class="bar-label">${escapeHtml(t.t)}</div>
                <div class="bar-wrap"><div class="bar" style="width:${(t.c/maxTerm*100).toFixed(1)}%"></div></div>
                <div class="bar-count">${t.c}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="stat-card stat-card-wide">
          <div class="stat-card-label">정당별 평균 나이</div>
          <div class="bar-chart">
            ${partyAvg.slice(0, 6).map(p => `
              <div class="bar-row">
                <div class="bar-label" style="color:${partyColor(p.p)}">${escapeHtml(p.p)}</div>
                <div class="bar-wrap"><div class="bar" style="width:${(p.avg/maxAvgAge*100).toFixed(1)}%; background:${partyColor(p.p)}"></div></div>
                <div class="bar-count">${p.avg.toFixed(1)}세</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function getCommitteeMap() {
  // 모든 22대 의원의 CMIT_NM 집계
  const map = new Map();
  const mps = state.members.filter(m => (m._group === 'legislative' || (!m._group && m.UNITS)));
  for (const m of mps) {
    const c = (m.CMIT_NM || '').trim();
    if (!c || c === '—' || c === '비위원') continue;
    // 분할: "정무위원회, 예산결산특별위원회"
    for (const part of c.split(/[,·]/).map(s => s.trim())) {
      if (!part) continue;
      if (!map.has(part)) map.set(part, []);
      map.get(part).push(m);
    }
  }
  return map;
}

function renderCommitteesPage() {
  const cmtMap = getCommitteeMap();
  if (cmtMap.size === 0) {
    return `
      <div class="group-back" id="back-home">← 조직도</div>
      <div class="loading"><span class="loading-spinner"></span>위원회 데이터 준비 중…</div>
    `;
  }
  const arr = [...cmtMap.entries()].map(([name, members]) => {
    const billCount = (state.billsByCommittee?.get(name) || []).length;
    // 정당 분포
    const byParty = new Map();
    for (const m of members) byParty.set(m.POLY_NM, (byParty.get(m.POLY_NM) || 0) + 1);
    const partyArr = [...byParty.entries()].sort((a, b) => b[1] - a[1]);
    // 위원장 찾기 (JOB_RES_NM에 위원장 포함이면)
    const chair = members.find(m => /위원장/.test(m.JOB_RES_NM || ''));
    const isSpecial = /특별위원회|예산결산|윤리|정보/.test(name);
    return { name, members, billCount, partyArr, chair, isSpecial };
  }).sort((a, b) => {
    // 상임위 먼저, 그 다음 인원 많은 순
    if (a.isSpecial !== b.isSpecial) return a.isSpecial ? 1 : -1;
    return b.members.length - a.members.length;
  });
  const standing = arr.filter(c => !c.isSpecial);
  const special = arr.filter(c => c.isSpecial);

  function cardHtml(c) {
    const top3 = c.partyArr.slice(0, 3);
    const chairColor = c.chair ? partyColor(c.chair.POLY_NM) : 'var(--text-2)';
    return `
      <div class="cmt-card" data-cmt="${escapeHtml(c.name)}">
        <div class="cmt-card-head">
          <div class="cmt-card-name">${escapeHtml(c.name)}</div>
          ${c.isSpecial ? '<span class="cmt-card-tag">특별</span>' : ''}
        </div>
        <div class="cmt-card-stats">
          <div><b>${c.members.length}</b><span>명</span></div>
          <div><b>${c.billCount}</b><span>건 처리</span></div>
        </div>
        ${c.chair ? `<div class="cmt-card-chair">위원장 <b style="color:${chairColor}">${escapeHtml(c.chair.HG_NM)}</b> <span>${escapeHtml(c.chair.POLY_NM)}</span></div>` : '<div class="cmt-card-chair"><span>위원장 정보 없음</span></div>'}
        <div class="cmt-card-bars">
          ${top3.map(([p, n]) => `<div class="cmt-card-bar" style="flex:${n}; background:${partyColor(p)}" title="${escapeHtml(p)} ${n}명"></div>`).join('')}
        </div>
      </div>`;
  }

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="cmt-page">
      <div class="cmt-hero">
        <div class="cmt-hero-eye">POLITIK · 22대 국회 위원회</div>
        <h1>국회 위원회 ${arr.length}개</h1>
        <p>상임위원회 ${standing.length} · 특별위원회 ${special.length} · 클릭하면 위원 명단 + 처리 의안</p>
      </div>
      <div class="cmt-section">
        <h2>상임위원회 <span class="cnt">${standing.length}</span></h2>
        <div class="cmt-grid">${standing.map(cardHtml).join('')}</div>
      </div>
      ${special.length ? `
        <div class="cmt-section">
          <h2>특별위원회·기타 <span class="cnt">${special.length}</span></h2>
          <div class="cmt-grid">${special.map(cardHtml).join('')}</div>
        </div>` : ''}
    </div>
  `;
}

// Bills statistics page (22대 본회의 처리 의안)

function renderBillsPage() {
  const bills = state.bills || [];
  if (!bills.length) {
    return `
      <div class="group-back" id="back-home">← 조직도</div>
      <div class="loading"><span class="loading-spinner"></span>22대 처리 의안 데이터 불러오는 중…<br><br>국회 OPEN API에서 ~1.6K 건 로드 중입니다.</div>
    `;
  }

  const total = bills.length;
  // 결과별 집계 (본회의 처리 의안만 — 원안가결·수정가결·부결·기타)
  const byResult = new Map();
  for (const b of bills) {
    const r = b.PROC_RESULT_CD || '기타';
    byResult.set(r, (byResult.get(r) || 0) + 1);
  }
  const passed = (byResult.get('원안가결') || 0) + (byResult.get('수정가결') || 0);
  const rejected = (byResult.get('부결') || 0);
  const passRate = total ? ((passed / total) * 100).toFixed(1) : '0';

  // 평균 투표 참여율 (출석/재적)
  let voteSum = 0, memberSum = 0, voteCount = 0;
  for (const b of bills) {
    const v = parseInt(b.VOTE_TCNT, 10);
    const mem = parseInt(b.MEMBER_TCNT, 10);
    if (v > 0 && mem > 0) { voteSum += v; memberSum += mem; voteCount++; }
  }
  const avgTurnout = voteCount ? (voteSum / memberSum * 100).toFixed(1) : '—';

  // 만장일치 (NO_TCNT===0 && BLANK_TCNT<=5 && YES_TCNT >= 200)
  const unanimous = bills.filter(b => {
    const y = parseInt(b.YES_TCNT, 10), n = parseInt(b.NO_TCNT, 10), bl = parseInt(b.BLANK_TCNT, 10);
    return y >= 200 && n === 0 && bl <= 5;
  });
  // 박빙 처리 (|yes - no| <= 30, yes > 0)
  const close = bills.filter(b => {
    const y = parseInt(b.YES_TCNT, 10), n = parseInt(b.NO_TCNT, 10);
    return y > 0 && n > 0 && Math.abs(y - n) <= 30;
  }).sort((a, b) => Math.abs(parseInt(a.YES_TCNT,10) - parseInt(a.NO_TCNT,10)) - Math.abs(parseInt(b.YES_TCNT,10) - parseInt(b.NO_TCNT,10))).slice(0, 10);

  // 위원회별 (Top 12)
  const byCmt = new Map();
  for (const b of bills) {
    const c = b.CURR_COMMITTEE || '미상';
    if (!byCmt.has(c)) byCmt.set(c, { total: 0, passed: 0 });
    const e = byCmt.get(c);
    e.total++;

function renderPartyHistoryPage() {
  const ph = state.partyHistory;
  if (!ph) return '<div class="loading"><span class="loading-spinner"></span>정당사 데이터 불러오는 중…</div>';

  const MIN_YEAR = 1945, MAX_YEAR = 2026;
  const SPAN = MAX_YEAR - MIN_YEAR;
  function yToX(y) { return ((y - MIN_YEAR) / SPAN * 100).toFixed(2) + '%'; }
  function dateToYear(d) {
    if (!d) return MAX_YEAR;
    const y = parseInt(d.slice(0, 4), 10);
    const m = parseInt((d.slice(5, 7) || '7'), 10);
    return y + (m - 1) / 12;
  }

  // 결정적 row assign per stream — 같은 시기 같은 stream 정당이 겹치지 않게
  const streamRows = new Map();
  for (const s of ph.streams) streamRows.set(s.id, []);
  const placed = []; // { party, row, fromY, toY }
  // 시간 순 정렬
  const parties = [...ph.parties].sort((a, b) => dateToYear(a.from) - dateToYear(b.from));
  for (const p of parties) {
    const fromY = dateToYear(p.from);
    const toY = dateToYear(p.to);
    const rows = streamRows.get(p.stream);
    let row = 0;
    while (true) {
      const conflict = placed.some(x => x.party.stream === p.stream && x.row === row && !(toY <= x.fromY || fromY >= x.toY));
      if (!conflict) break;
      row++;
    }
    placed.push({ party: p, row, fromY, toY });
    if (!rows.includes(row)) rows.push(row);
  }

  // Year markers (decade)
  const decades = [];
  for (let y = 1950; y <= 2020; y += 10) decades.push(y);

  // Group by stream
  const ROW_H = 32;
  const ROW_GAP = 4;
  const SECTION_GAP = 22;
  const HEADER_H = 26;
  const sections = ph.streams.map(s => {
    const sParties = placed.filter(x => x.party.stream === s.id);
    const rowCount = Math.max(1, ...sParties.map(x => x.row + 1));
    const bars = sParties.map(x => {
      const p = x.party;
      const left = yToX(x.fromY);
      const widthPct = ((x.toY - x.fromY) / SPAN * 100).toFixed(2) + '%';
      const top = (x.row * (ROW_H + ROW_GAP)) + 'px';
      const isActive = p.active === true;
      return `
        <div class="ph-bar${isActive ? ' ph-active' : ''}"
             style="left:${left}; width:${widthPct}; top:${top}; background:${s.color}"
             data-wiki="${escapeHtml(p.wiki || '')}"
             title="${escapeHtml(p.name)} (${p.from?.slice(0,4) || '?'} ~ ${p.to ? p.to.slice(0,4) : '현재'})${p.founder ? ' · ' + escapeHtml(p.founder) : ''}${p.fate ? ' · ' + escapeHtml(p.fate) : ''}">
          <span class="ph-bar-label">${escapeHtml(p.name)}</span>
        </div>`;
    }).join('');
    return `
      <div class="ph-section">
        <div class="ph-section-head" style="border-left:4px solid ${s.color}">
          <div class="ph-section-name">${escapeHtml(s.label)}</div>
          <div class="ph-section-desc">${escapeHtml(s.desc)}</div>
        </div>
        <div class="ph-lane" style="height:${rowCount * (ROW_H + ROW_GAP)}px">
          ${bars}
        </div>
      </div>`;
  }).join('');

  // List view (chronological)
  const listHtml = parties.slice().reverse().map(p => {
    const s = ph.streams.find(x => x.id === p.stream);
    const dur = p.to
      ? `${p.from.slice(0,4)} ~ ${p.to.slice(0,4)} (${Math.round(dateToYear(p.to) - dateToYear(p.from))}년)`
      : `${p.from.slice(0,4)} ~ 현재`;
    return `
      <div class="ph-list-row" data-wiki="${escapeHtml(p.wiki || '')}">
        <div class="ph-list-dot" style="background:${s?.color || '#888'}"></div>
        <div class="ph-list-info">
          <div class="ph-list-name">${escapeHtml(p.name)} ${p.active ? '<span class="ph-list-now">현재</span>' : ''}</div>
          <div class="ph-list-meta">${escapeHtml(s?.label || '')} · ${dur}${p.founder ? ' · ' + escapeHtml(p.founder) : ''}</div>
          ${p.fate ? `<div class="ph-list-fate">${escapeHtml(p.fate)}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="ph-page">
      <div class="ph-hero">
        <div class="ph-hero-eye">POLITIK · 정당사</div>
        <h1>대한민국 정당사 1948 → 2025</h1>
        <p>${ph.parties.length}개 주요 정당 · 5개 계열 · 막대를 클릭하면 위키 페이지로 이동합니다.</p>
      </div>

      <div class="ph-chart-wrap">
        <div class="ph-year-axis">
          ${decades.map(y => `<div class="ph-year-mark" style="left:${yToX(y)}"><span>${y}</span></div>`).join('')}
        </div>
        ${sections}
        <div class="ph-now-line" style="left:${yToX(2026)}"><span>2026</span></div>
      </div>

      <div class="ph-list">
        <h2>전체 정당 (시간 역순)</h2>
        ${listHtml}
      </div>

      <div class="ph-foot">출처: 위키백과 · 국회사 · 자체 정리. 주요 정당만 수록 (소수정당·교섭단체 미달 정당은 일부 생략).</div>
    </div>
  `;
}

function renderGroupPage(gid) {
  const g = GROUPS[gid];
  if (!g) return '<div class="empty">알 수 없는 그룹</div>';
  const groups = groupMembers();
  const members = groups[gid] || [];

  let body = '';
  if (gid === 'legislative') {
    // 정당별 sub-section
    const byParty = new Map();
    for (const m of members) {
      const p = m.POLY_NM || '무소속';
      if (!byParty.has(p)) byParty.set(p, []);
      byParty.get(p).push(m);
    }
    const sorted = [...byParty.entries()].sort((a,b) => b[1].length - a[1].length);
    body = sorted.map(([party, arr]) => `
      <div class="sub-section">
        <h2><span style="color:${partyColor(party)}">●</span> ${escapeHtml(party)} <span class="cnt">${arr.length}명</span></h2>
        <div class="grid">${arr.map(memberCardHTML).join('')}</div>
      </div>
    `).join('');
  } else {
    // type별 sub-section (역대 의원은 age별로 더 세분화)
    const byType = new Map();
    for (const m of members) {
      let t = m._type || 'misc';
      if (m._type === 'former_member' && m._age) t = `former_member_${m._age}`;
      if (!byType.has(t)) byType.set(t, []);
      byType.get(t).push(m);
    }
    // 정렬: TYPE_ORDER 기반 + 역대 의원은 대수 큰 순 (최근부터)
    const baseOrder = TYPE_ORDER[gid] || [];
    let order = [];
    for (const t of baseOrder) {
      if (t === 'former_member') {
        // age별 키들을 큰 순으로
        const ages = [...byType.keys()].filter(k => k.startsWith('former_member_'))
          .map(k => parseInt(k.split('_')[2], 10))
          .sort((a, b) => b - a);
        for (const a of ages) order.push(`former_member_${a}`);
      } else if (byType.has(t)) {
        order.push(t);
      }
    }
    // 누락된 type 추가
    for (const t of byType.keys()) {
      if (!order.includes(t)) order.push(t);
    }
    body = order.filter(t => byType.has(t)).map(t => {
      const arr = byType.get(t);
      let label = TYPE_GROUP_LABEL[t] || t;
      if (t.startsWith('former_member_')) label = `제${t.split('_')[2]}대 국회의원`;
      // 역대 의원은 처음 50명만 표시 (성능)
      const shown = t.startsWith('former_member_') ? arr.slice(0, 50) : arr;
      const remainder = arr.length - shown.length;
      return `
        <div class="sub-section">
          <h2>${escapeHtml(label)} <span class="cnt">${arr.length}명</span></h2>
          <div class="grid">${shown.map(memberCardHTML).join('')}</div>
          ${remainder > 0 ? `<div style="text-align:center;color:var(--dim);padding:12px;font-size:11px">…외 ${remainder}명 (이름순 첫 50명만 표시)</div>` : ''}
        </div>
      `;
    }).join('');
  }

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="group-header">
      <div class="icon" style="background:${g.color}">${g.icon}</div>
      <div style="flex:1">
        <h1>${g.name}</h1>
        <div class="sub">${g.desc}</div>
        <div class="counts"><b>${members.length}</b>명 등록</div>
      </div>
    </div>
    ${body}
  `;
}

  const infoBox = info ? `
    <div class="party-info">
      <div class="pi-grid">
        ${info.founded ? `<div class="pi-row"><span class="pi-k">창당일</span><span class="pi-v">${escapeHtml(info.founded)}</span></div>` : ''}
        ${info.ideology ? `<div class="pi-row"><span class="pi-k">이념</span><span class="pi-v">${escapeHtml(info.ideology)}</span></div>` : ''}
        ${info.address ? `<div class="pi-row"><span class="pi-k">중앙당</span><span class="pi-v">${escapeHtml(info.address)}</span></div>` : ''}
        ${info.members_est ? `<div class="pi-row"><span class="pi-k">당원수 (추정)</span><span class="pi-v">${escapeHtml(info.members_est)}</span></div>` : ''}

      </div>

      ${info.predecessors && info.predecessors.length ? `

function renderGrid() {
  const q = state.search.trim().toLowerCase();
  const filtered = state.members.filter(m => {
    if (state.filterParty && m.POLY_NM !== state.filterParty) return false;
    if (!q) return true;
    return (
      (m.HG_NM || '').toLowerCase().includes(q) ||
      (m.ORIG_NM || '').toLowerCase().includes(q) ||
      (m.POLY_NM || '').toLowerCase().includes(q) ||
      (m.CMIT_NM || '').toLowerCase().includes(q) ||
      (m._type_label || '').toLowerCase().includes(q)
    );
  });

  document.getElementById('stat-shown').textContent = filtered.length;

  if (filtered.length === 0) {
    return '<div class="empty">검색 결과가 없습니다.</div>';
  }

  // 검색 모드에선 그룹별로 묶기
  if (q) {
    const byGroup = new Map();
    for (const m of filtered) {
      const g = m._group || 'legislative';
      if (!byGroup.has(g)) byGroup.set(g, []);
      byGroup.get(g).push(m);
    }
    const sections = GROUP_ORDER.filter(g => byGroup.has(g)).map(g => {
      const arr = byGroup.get(g);
      const gInfo = GROUPS[g];
      return `
        <div class="sub-section">
          <h2><span style="opacity:0.5">${gInfo.icon}</span> ${escapeHtml(gInfo.name)} <span class="cnt">${arr.length}명</span></h2>
          <div class="grid">${arr.slice(0, 30).map(memberCardHTML).join('')}</div>
          ${arr.length > 30 ? `<div style="text-align:center;color:var(--dim);padding:10px;font-size:11px">…외 ${arr.length - 30}명</div>` : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="result-meta">"<b>${escapeHtml(state.search)}</b>" 검색 — ${filtered.length}건</div>
      ${sections}
    `;
  }

  const cards = filtered.map(m => {
    const color = partyColor(m.POLY_NM);
    const initial = (m.HG_NM || '?').charAt(0);
    const photo = state.photos.get(m.MONA_CD);
    const avatar = (photo && photo.thumb)
      ? `<img src="${escapeHtml(photo.thumb)}" loading="lazy" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
      : escapeHtml(initial);
    return `
      <div class="card" data-id="${escapeHtml(m.MONA_CD)}">
        <div class="card-bar" style="background:${color}"></div>
        <div class="card-body">
          <div class="avatar">${avatar}</div>
          <div class="card-meta">
            <div class="card-name">${escapeHtml(m.HG_NM)}</div>
            <div class="card-party" style="color:${color}">${escapeHtml(m.POLY_NM || '—')}</div>
            <div class="card-sub">${escapeHtml(m.ORIG_NM || '—')}</div>
          </div>
        </div>
        <div class="card-foot">
          <span>${escapeHtml(m.REELE_GBN_NM || '')}</span>
          <span class="badge">${escapeHtml(m.CMIT_NM || '비위원')}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="result-meta"><b>${filtered.length}</b>명 표시 (전체 <b>${state.members.length}</b>명)</div>
    <div class="grid">${cards}</div>
  `;
}

function renderDetail(id) {
  const m = state.members.find(x => x.MONA_CD === id);
  if (!m) return '<div class="empty">해당 의원을 찾을 수 없습니다.</div>';

  const color = partyColor(m.POLY_NM);
  const initial = (m.HG_NM || '?').charAt(0);
  const bornYear = (m.BTH_DATE || '').slice(0, 4);
  const age = bornYear ? new Date().getFullYear() - parseInt(bornYear, 10) : '—';
  const photo = state.photos.get(m.MONA_CD);
  const dAvatarInner = (photo && photo.thumb)
    ? `<img src="${escapeHtml(photo.thumb)}" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
    : escapeHtml(initial);

  // 정당 직책 확인 (mp_name 일치)
  const partyRolesForThis = [];
  if (m.POLY_NM && PARTY_ROLES[m.POLY_NM]) {
    for (const r of PARTY_ROLES[m.POLY_NM]) {
      if (r.mp_name === m.HG_NM) partyRolesForThis.push(r);
    }
  }

  // 동료 (같은 상임위)
  const colleagues = state.members.filter(x =>
    x.MONA_CD !== m.MONA_CD &&
    x.CMIT_NM === m.CMIT_NM &&
    m.CMIT_NM
  ).slice(0, 12);

  const colleaguesHtml = colleagues.length ? `
    <div class="d-section">
      <h2>같은 상임위 (${escapeHtml(m.CMIT_NM)}) · ${colleagues.length}명</h2>
      <div class="colleagues">
        ${colleagues.map(c => `
          <div class="col-card" data-id="${escapeHtml(c.MONA_CD)}">
            <div class="col-avatar" style="color:${partyColor(c.POLY_NM)}">${escapeHtml((c.HG_NM||'?').charAt(0))}</div>
            <div class="col-info">
              <div class="col-name">${escapeHtml(c.HG_NM)}</div>
              <div class="col-party">${escapeHtml(c.POLY_NM || '—')}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  // 위원회별 본회의 처리 법안
  const cmtBills = m.CMIT_NM ? (state.billsByCommittee.get(m.CMIT_NM) || []) : [];
  const passed = cmtBills.filter(b => /가결/.test(b.PROC_RESULT_CD || '')).length;
  const rejected = cmtBills.filter(b => /부결|폐기/.test(b.PROC_RESULT_CD || '')).length;
  const billsHtml = cmtBills.length ? `
    <div class="d-section">
      <h2>${escapeHtml(m.CMIT_NM)}가 22대에 본회의 처리 — ${cmtBills.length}건</h2>
      <div class="d-grid" style="margin-bottom:14px;">
        <div class="d-stat"><div class="d-stat-label">가결</div><div class="d-stat-value" style="color:var(--ok)">${passed}</div></div>
        <div class="d-stat"><div class="d-stat-label">부결·폐기</div><div class="d-stat-value" style="color:#c0392b">${rejected}</div></div>
        <div class="d-stat"><div class="d-stat-label">기타</div><div class="d-stat-value">${cmtBills.length - passed - rejected}</div></div>
      </div>
      <div class="d-list">
        ${cmtBills.slice(0, 10).map(b => `
          <div class="bill-row">
            <div class="bill-date">${escapeHtml((b.PROC_DT || '').slice(0,10))}</div>
            <div class="bill-name">${escapeHtml(b.BILL_NAME || b.BILL_NM || '')}</div>
            <div class="bill-result" style="color:${PROC_RESULT_COLOR[b.PROC_RESULT_CD] || 'var(--text-2)'}">${escapeHtml(b.PROC_RESULT_CD || '—')}</div>
          </div>
        `).join('')}

            <div class="d-grid">

              ${bornYear ? `<div class="d-stat"><div class="d-stat-label">생년 (만)</div><div class="d-stat-value">${bornYear} (${age})</div></div>` : ''}
              ${m.SEX_GBN_NM ? `<div class="d-stat"><div class="d-stat-label">성별</div><div class="d-stat-value">${escapeHtml(m.SEX_GBN_NM)}</div></div>` : ''}
              ${m.CMIT_NM ? `<div class="d-stat"><div class="d-stat-label">상임위·역할</div><div class="d-stat-value">${escapeHtml(m.CMIT_NM)}</div></div>` : ''}
            </div>

      <div class="d-body">

// ============================================================
// Filter bar (party chips)
// ============================================================
function renderFilters() {
  state.partyCounts.clear();
  for (const m of state.members) {
    const p = m.POLY_NM || '무소속';
    state.partyCounts.set(p, (state.partyCounts.get(p) || 0) + 1);
  }
  // sort by count desc
  const parties = [...state.partyCounts.entries()].sort((a,b) => b[1] - a[1]);
  const total = state.members.length;
  const html = [
    `<span class="filter-label">정당</span>`,
    `<span class="chip ${state.filterParty === null ? 'active' : ''}" data-party="">전체 <span class="cnt">${total}</span></span>`,
    ...parties.map(([p, n]) => `
      <span class="chip ${state.filterParty === p ? 'active' : ''}" data-party="${escapeHtml(p)}">
        <span class="dot" style="background:${partyColor(p)}"></span>
        ${escapeHtml(p)} <span class="cnt">${n}</span>
      </span>
    `),
  ].join('');
  document.getElementById('filter-bar').innerHTML = html;
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      const p = el.dataset.party;
      if (!p) {
        state.filterParty = null;
        location.hash = '';
        renderFilters(); route();
      } else {
        location.hash = `#/party/${encodeURIComponent(p)}`;
      }
    });
  });
}

// ============================================================
// Routing
// ============================================================
function route() {
  const view = document.getElementById('view');
  const hash = location.hash || '';
  const filterBar = document.getElementById('filter-bar');
  const navStats = document.querySelector('.nav-stats');
  // 페이지 전환 시 잔존 툴팁 강제 숨김 (자동완성은 hashchange 핸들러에서 별도 close)
  const _tip = document.getElementById('rel-tooltip');
  if (_tip) _tip.style.display = 'none';

  // 위원회 상세
  const cMatch = hash.match(/^#\/committee\/(.+)$/);
  if (cMatch) {
    const cmtName = decodeURIComponent(cMatch[1]);
    view.innerHTML = renderCommitteeDetail(cmtName);
    document.getElementById('back-cmt')?.addEventListener('click', () => { location.hash = '#/committees'; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    return;
  }
  // 위원회 목록
  if (hash === '#/committees') {
    view.innerHTML = renderCommitteesPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.cmt-card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/committee/${encodeURIComponent(el.dataset.cmt)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    return;
  }
  // 의안 통계
  if (hash === '#/bills') {
    view.innerHTML = renderBillsPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    // 데이터가 아직 로드 중이면 5초 후 재렌더 시도
    if (!state.bills.length) {
      const tryRender = () => {
        if (location.hash !== '#/bills') return;
        if (state.bills.length) {
          view.innerHTML = renderBillsPage();
          document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
        } else setTimeout(tryRender, 2000);
      };
      setTimeout(tryRender, 1500);
    }
    return;
  }
  // 정당사 타임라인
  if (hash === '#/history/parties') {
    view.innerHTML = renderPartyHistoryPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    loadPartyHistory().then(() => {
      view.innerHTML = renderPartyHistoryPage();
      document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
      // 막대 클릭 → 위키 이동
      view.querySelectorAll('.ph-bar, .ph-list-row').forEach(el => {
        el.addEventListener('click', () => {
          const wiki = el.dataset.wiki;
          if (wiki) window.open('https://ko.wikipedia.org/wiki/' + encodeURIComponent(wiki), '_blank', 'noopener');
        });
      });
    });
    return;
  }
  // 정치 분포 지도 페이지
  if (hash === '#/map') {
    view.innerHTML = renderMapPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    setTimeout(initMap, 100);
    return;
  }
  // 관계도 페이지
  if (hash === '#/relations') {
    view.innerHTML = renderRelationsPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    setTimeout(initRelationsGraph, 100);
    return;
  }
  // 정당 페이지
  const pMatch = hash.match(/^#\/party\/(.+)$/);
  if (pMatch) {
    const partyName = decodeURIComponent(pMatch[1]);
    view.innerHTML = renderPartyPage(partyName);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => m.POLY_NM === partyName && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    return;
  }
  // 그룹 페이지
  const gMatch = hash.match(/^#\/group\/(\w+)$/);
  if (gMatch) {
    const gid = gMatch[1];
    view.innerHTML = renderGroupPage(gid);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => (m._group || 'legislative') === gid && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    // historical 그룹: 2~21대 역대 의원 전부 lazy load (단계별 — 5천명 이상)
    if (gid === 'historical') {
      ensureHistoricalAssemblies([21, 20, 19, 18, 17, 16, 15, 14, 13]).then(changed => {
        if (changed && location.hash === `#/group/historical`) route();
        ensureHistoricalAssemblies([12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2]).then(c2 => {
          if (c2 && location.hash === `#/group/historical`) route();
        });
      });
    }
    return;
  }
  const m = hash.match(/^#\/m\/(.+)$/);
  if (m) {
    const memberId = decodeURIComponent(m[1]);
    view.innerHTML = renderDetail(memberId);
    document.getElementById('back-btn')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.col-card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    window.scrollTo(0, 0);
    // Bio 데이터 (사진 + 위키 요약) 없으면 비동기 fetch + 재렌더
    const member = state.members.find(x => x.MONA_CD === memberId);
    if (member) {
      const cached = state.photos.get(member.MONA_CD);
      const needsFetch = !cached || (cached.extract == null && !cached.miss);
      if (needsFetch) {
        ensurePhoto(member).then(() => {
          if (location.hash.endsWith(memberId)) route();
        });
      }
    }
    // 같은 위원회 동료들의 사진도 백그라운드 프리페치
    if (member?.CMIT_NM) {
      const cols = state.members.filter(x => x.CMIT_NM === member.CMIT_NM && !state.photos.has(x.MONA_CD)).slice(0, 12);
      prefetchPhotos(cols, 3);
    }
  } else {
    // 홈 = 조직도 또는 검색 시 그리드
    if (state.search.trim() || state.filterParty) {
      view.innerHTML = renderGrid();
      document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
      });
      const visible = state.members
        .filter(m => !state.filterParty || m.POLY_NM === state.filterParty)
        .filter(m => !state.photos.has(m.MONA_CD))
        .slice(0, 30);
      prefetchPhotos(visible, 3);
      if (filterBar) filterBar.style.display = '';
    } else {
      view.innerHTML = renderHome();
      document.querySelectorAll('.grpbox, .org-box').forEach(el => {
        el.addEventListener('click', () => {
          if (el.dataset.group) location.hash = `#/group/${el.dataset.group}`;
        });
      });
      document.querySelectorAll('.party-link').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          location.hash = `#/party/${encodeURIComponent(el.dataset.party)}`;
        });
      });
      // 도넛 차트 클릭 (segment + legend row)
      document.querySelectorAll('.donut-seg, .donut-leg-row').forEach(el => {
        el.addEventListener('click', () => {
          const p = el.dataset.party;
          if (p) location.hash = `#/party/${encodeURIComponent(p)}`;
        });
      });
      // 각 그룹의 상위 6명 사진 프리페치
      const byG = groupMembers();
      const prefetch = [];
      for (const gid of GROUP_ORDER) {
        const arr = (byG[gid] || []).slice(0, 6);
        for (const m of arr) if (!state.photos.has(m.MONA_CD)) prefetch.push(m);
      }
      prefetchPhotos(prefetch, 3);
      if (filterBar) filterBar.style.display = 'none';
    }
  }
}

// ============================================================
// Autocomplete (search dropdown)
// ============================================================
const AC = (() => {
  const $input = document.getElementById('search');
  const $drop = document.getElementById('ac-dropdown');
  let activeIdx = -1;
  let items = [];

  function hl(text, q) {
    if (!q || !text) return escapeHtml(text || '');
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx < 0) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(text.slice(idx + q.length));
  }

  function score(m, q) {
    const name = (m.HG_NM || '').toLowerCase();
    if (name === q) return 1000;
    if (name.startsWith(q)) return 500;
    if (name.includes(q)) return 200;
    if ((m.ORIG_NM || '').toLowerCase().includes(q)) return 80;
    if ((m.POLY_NM || '').toLowerCase().includes(q)) return 50;
    if ((m.role || '').toLowerCase().includes(q)) return 60;
    if ((m.region || '').toLowerCase().includes(q)) return 70;
    if ((m.CMIT_NM || '').toLowerCase().includes(q)) return 30;
    if ((m._type_label || '').toLowerCase().includes(q)) return 20;
    return 0;
  }

  function search(q) {
    q = q.trim().toLowerCase();
    if (!q) return { members: [], parties: [], groups: [] };
    // Members (top 8)
    const scored = state.members.map(m => ({ m, s: score(m, q) })).filter(x => x.s > 0);
    scored.sort((a, b) => b.s - a.s || (a.m.HG_NM||'').localeCompare(b.m.HG_NM||'', 'ko'));
    const members = scored.slice(0, 8).map(x => x.m);
    // Parties (max 4)
    const partySet = new Set();
    for (const m of state.members) {
      const p = m.POLY_NM;
      if (p && p.toLowerCase().includes(q)) partySet.add(p);
    }
    const parties = [...partySet].slice(0, 4);
    // Groups (max 3)
    const groups = GROUP_ORDER.filter(gid => {
      const g = GROUPS[gid];
      return g.name.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q);
    }).slice(0, 3);
    return { members, parties, groups };
  }

  function memberRow(m, q) {
    const photo = state.photos.get(m.MONA_CD);
    const initial = (m.HG_NM || '?').charAt(0);
    const av = photo?.thumb
      ? `<img src="${escapeHtml(photo.thumb)}" alt="" loading="lazy" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
      : escapeHtml(initial);
    const sub = [m.POLY_NM, m.ORIG_NM || m.region || m.role, m._type_label].filter(Boolean).join(' · ');
    const color = partyColor(m.POLY_NM);
    return `
      <div class="ac-row" role="option" data-action="member" data-id="${escapeHtml(m.MONA_CD)}">
        <div class="ac-avatar">${av}</div>
        <div class="ac-info">
          <div class="ac-name">${hl(m.HG_NM, q)}</div>
          <div class="ac-sub">${hl(sub, q)}</div>
        </div>
        <span class="ac-badge" style="background:${color}">${escapeHtml(m.POLY_NM || m._type_label || '')}</span>
      </div>`;
  }
  function partyRow(p, q) {
    const cnt = state.members.filter(m => m.POLY_NM === p).length;
    const color = partyColor(p);
    return `
      <div class="ac-row" role="option" data-action="party" data-party="${escapeHtml(p)}">
        <div class="ac-avatar" style="background:${color}; color:#fff">●</div>
        <div class="ac-info">
          <div class="ac-name">${hl(p, q)}</div>
          <div class="ac-sub">정당 · ${cnt}명 등록</div>
        </div>
        <span class="ac-badge" style="background:${color}">정당</span>
      </div>`;
  }
  function groupRow(gid, q) {
    const g = GROUPS[gid];
    const cnt = state.members.filter(m => (m._group || 'legislative') === gid).length;
    return `
      <div class="ac-row" role="option" data-action="group" data-gid="${escapeHtml(gid)}">
        <div class="ac-avatar" style="background:${g.color}; color:#fff">${g.icon}</div>
        <div class="ac-info">
          <div class="ac-name">${hl(g.name, q)}</div>
          <div class="ac-sub">${hl(g.desc, q)} · ${cnt}명</div>
        </div>
        <span class="ac-badge">분류</span>
      </div>`;
  }

  function render(q) {
    const { members, parties, groups } = search(q);
    items = [];
    let html = '';
    if (groups.length) {
      html += '<div class="ac-section-h">분류</div>';
      for (const gid of groups) { items.push({ action: 'group', gid }); html += groupRow(gid, q); }
    }
    if (parties.length) {
      html += '<div class="ac-section-h">정당</div>';
      for (const p of parties) { items.push({ action: 'party', party: p }); html += partyRow(p, q); }
    }
    if (members.length) {
      html += `<div class="ac-section-h">인물 · ${members.length}건${members.length === 8 ? ' (상위 8)' : ''}</div>`;
      for (const m of members) { items.push({ action: 'member', id: m.MONA_CD }); html += memberRow(m, q); }
    }
    if (!items.length) {
      html = '<div class="ac-empty">결과 없음</div>';
    } else {
      html += `<div class="ac-foot"><span class="ac-kbd">↑↓</span> 이동 · <span class="ac-kbd">Enter</span> 선택 · <span class="ac-kbd">Esc</span> 닫기</div>`;
    }
    $drop.innerHTML = html;
    $drop.classList.add('open');
    activeIdx = -1;
  }
  function close() {
    $drop.classList.remove('open');
    activeIdx = -1;
  }
  function setActive(idx) {
    const rows = $drop.querySelectorAll('.ac-row');
    rows.forEach(r => r.classList.remove('ac-active'));
    if (idx < 0 || idx >= rows.length) { activeIdx = -1; return; }
    activeIdx = idx;
    rows[idx].classList.add('ac-active');
    rows[idx].scrollIntoView({ block: 'nearest' });
  }
  function go(item) {
    if (!item) return;
    close();
    $input.blur();
    if (item.action === 'member') location.hash = `#/m/${encodeURIComponent(item.id)}`;
    else if (item.action === 'party') location.hash = `#/party/${encodeURIComponent(item.party)}`;
    else if (item.action === 'group') location.hash = `#/group/${item.gid}`;
  }

  $input.addEventListener('input', e => {
    state.search = e.target.value;
    const q = e.target.value.trim();
    if (q.length === 0) { close(); if (!location.hash) route(); return; }
    render(q);
    if (!location.hash) route();
  });
  $input.addEventListener('focus', () => {
    const q = $input.value.trim();
    if (q.length > 0) render(q);
  });
  $input.addEventListener('keydown', e => {
    if (!$drop.classList.contains('open')) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(Math.min(activeIdx + 1, items.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(Math.max(activeIdx - 1, -1)); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0) go(items[activeIdx]);
      else if (items.length) go(items[0]);
    }
    else if (e.key === 'Escape') { close(); }
  });
  $drop.addEventListener('mousedown', e => {
    const row = e.target.closest('.ac-row');
    if (!row) return;
    e.preventDefault();
    const idx = [...$drop.querySelectorAll('.ac-row')].indexOf(row);
    go(items[idx]);
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) close();
  });
  return { close };
})();

// 다크 모드 토글
const THEME_KEY = 'politik:theme';
function applyTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  document.getElementById('theme-toggle').textContent = name === 'dark' ? '☀' : '🌙';
  localStorage.setItem(THEME_KEY, name);
}
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) applyTheme(saved);
  else applyTheme(matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});

// ============================================================
// Boot
// ============================================================
(async () => {
  loadPhotoCache();
  loadWikiOverrides(); // 백그라운드 — 첫 진입 시 위키 카테고리 fetch
  try {
    const { data, syncedAt } = await loadMembers();
    // 국회 외 인물 합치기 (대통령·시도지사·사법부 등)
    const extras = await loadExtraPoliticians();
    // 의원에도 _group 부여
    const members = data.map(m => ({ ...m, _group: 'legislative', _type: 'assembly_member', _type_label: '국회의원' }));
    state.members = [...extras, ...members];
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('last-sync').textContent = new Date(syncedAt).toLocaleDateString('ko-KR');
    const fy = document.getElementById('foot-year');
    if (fy) fy.textContent = `v2.1 · ${new Date().getFullYear()}`;
    renderFilters();
    route();
    // 의안은 백그라운드 로드 (홈 표시 후)
    loadProcessedBills().then(bills => {
      state.bills = bills;
      state.billsByCommittee = new Map();
      for (const b of bills) {
        const c = b.CURR_COMMITTEE || '미상';
        if (!state.billsByCommittee.has(c)) state.billsByCommittee.set(c, []);
        state.billsByCommittee.get(c).push(b);
      }
      // 정렬 (최신순)
      for (const arr of state.billsByCommittee.values()) {
        arr.sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));
      }
      // 상세 페이지 중이면 재렌더
      if (location.hash.startsWith('#/m/')) route();
    }).catch(e => console.warn('bills load failed:', e.message));
  } catch (e) {
    document.getElementById('view').innerHTML = `<div class="empty">데이터 로드 실패: ${escapeHtml(e.message)}<br><br>국회 OPEN API가 일시적으로 응답하지 않거나, 브라우저 네트워크 문제일 수 있습니다.</div>`;
  }
})();
</script>
