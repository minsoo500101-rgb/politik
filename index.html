  '경상북도':'경북', '경상남도':'경남', '제주특별자치도':'제주',
};

function renderMapPage() {
  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="map-head">
      <h1>정치 분포 지도</h1>
      <div class="map-sub">17개 광역단체장의 정당색으로 본 대한민국 (2022~2026 임기). 시도 클릭 → 광역단체장 상세</div>
      <div class="map-tabs">
        <button class="map-tab active" data-layer="province">시도 (17)</button>
        <button class="map-tab" data-layer="muni">시군구 (250)</button>
      </div>
    </div>
    <div class="map-wrap">
      <div class="map-container" id="map-container">
        <div class="rel-loading"><span class="loading-spinner"></span>지도 그리는 중…</div>
        <div class="map-zoom-ctrl" id="map-zoom-ctrl"></div>
      </div>
      <div class="map-legend" id="map-legend"></div>
    </div>
  `;
}

let _mapData = { province: null, muni: null };
let _mapCurrentLayer = 'province';

async function loadMapData(layer) {
  if (_mapData[layer]) return _mapData[layer];
  const file = layer === 'province' ? 'skorea-provinces-2018-geo.json' : 'skorea-municipalities-2018-geo.json';
  const r = await fetch(`https://cdn.jsdelivr.net/gh/southkorea/southkorea-maps@master/kostat/2018/json/${file}`);
  if (!r.ok) throw new Error('지도 데이터 fetch 실패');
  _mapData[layer] = await r.json();
  return _mapData[layer];
}

async function initMap() {
  if (typeof d3 === 'undefined') { setTimeout(initMap, 200); return; }
  const container = document.getElementById('map-container');
  if (!container) return;
  try {
    const geo = await loadMapData(_mapCurrentLayer);
    drawMap(geo, _mapCurrentLayer);
    // 레이어 토글 핸들러
    document.querySelectorAll('.map-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _mapCurrentLayer = btn.dataset.layer;
        container.innerHTML = '<div class="rel-loading"><span class="loading-spinner"></span>지도 그리는 중…</div>';
        loadMapData(_mapCurrentLayer).then(g => drawMap(g, _mapCurrentLayer));
      });
    });
  } catch (e) {
    container.innerHTML = `<div class="empty">지도 로드 실패: ${escapeHtml(e.message)}</div>`;
  }
}

function drawMap(geo, layer) {
  const container = document.getElementById('map-container');
  if (!container) return;
  container.innerHTML = '';
  const w = container.clientWidth || 800;
  const h = 700;
  const svg = d3.select(container).append('svg')
    .attr('width', w).attr('height', h)
    .attr('class', 'kr-map-svg');

  const projection = d3.geoMercator().fitSize([w - 40, h - 40], geo);
  const path = d3.geoPath(projection);

  // 광역단체장 region → 정당색 매핑
  const lgByRegion = new Map();
  for (const m of state.members) {
    if (m._type === 'local_gov_head') lgByRegion.set(m.ORIG_NM, m);
  }
  // 기초단체장 region → 단체장 매핑 ("광역 + 시군구" 키로 통일)
  // GeoJSON code 앞 2자리 → 광역 이름 매핑
  const PROV_BY_CODE = {
    '11':'서울','21':'부산','22':'대구','23':'인천','24':'광주','25':'대전','26':'울산','29':'세종',
    '31':'경기','32':'강원','33':'충북','34':'충남','35':'전북','36':'전남','37':'경북','38':'경남','39':'제주',
  };
  // 행정구 → 모시 (자치 X 일반시 행정구는 시장 1명이 관할)
  const ADMIN_DISTRICT_TO_CITY = {
    // 경기
    '수원시장안구':'수원시','수원시권선구':'수원시','수원시팔달구':'수원시','수원시영통구':'수원시',
    '성남시수정구':'성남시','성남시중원구':'성남시','성남시분당구':'성남시',
    '안양시만안구':'안양시','안양시동안구':'안양시',
    '안산시상록구':'안산시','안산시단원구':'안산시',
    '고양시덕양구':'고양시','고양시일산동구':'고양시','고양시일산서구':'고양시',
    '용인시처인구':'용인시','용인시기흥구':'용인시','용인시수지구':'용인시',
    '부천시오정구':'부천시','부천시소사구':'부천시','부천시원미구':'부천시',
    // 충북
    '청주시상당구':'청주시','청주시서원구':'청주시','청주시흥덕구':'청주시','청주시청원구':'청주시',
    // 충남
    '천안시동남구':'천안시','천안시서북구':'천안시',
    // 전북
    '전주시완산구':'전주시','전주시덕진구':'전주시',
    // 경북
    '포항시남구':'포항시','포항시북구':'포항시',
    // 경남
    '창원시의창구':'창원시','창원시성산구':'창원시','창원시마산합포구':'창원시','창원시마산회원구':'창원시','창원시진해구':'창원시',
    // 인천 — 2018년 개명
    '남구':'미추홀구',
  };
  // 제주 행정시 → 광역단체장 (제주특별자치도지사)
  const PROV_FALLBACK = new Set(['세종시','제주시','서귀포시']);

  function muniMatchKey(feature) {
    const code = (feature.properties.code || '').toString();
    const prov = PROV_BY_CODE[code.slice(0,2)];
    let name = feature.properties.name;
    // 행정구 → 모시 변환
    if (ADMIN_DISTRICT_TO_CITY[name]) name = ADMIN_DISTRICT_TO_CITY[name];
    return prov ? `${prov} ${name}` : name;
  }
  // 행정구인지 여부 (true면 모시 시장의 정당 사용, 라벨은 행정구 이름 유지)
  function isAdminDistrict(feature) {
    return !!ADMIN_DISTRICT_TO_CITY[feature.properties.name];
  }
  function isProvFallback(feature) {
    return PROV_FALLBACK.has(feature.properties.name);
  }
  // member region이 prefix 있으면 그대로, 없으면 광역 추정
  const muniByName = new Map();
  for (const m of state.members) {
    if (m._type !== 'local_gov_muni') continue;
    let key = m.ORIG_NM;
    // role에서 광역 추정 (예: "서울특별시 종로구청장" → "서울 종로구")
    if (key && !/(^|\s)(서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)\s/.test(key)) {
      const rm = (m.MEM_TITLE || m.CMIT_NM || '').match(/(서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)/);
      if (rm) key = rm[1] + ' ' + m.ORIG_NM;
    }
    muniByName.set(key, m);
  }

  // 시도 -> 정당 매핑 (시군구 색칠용)
  // 시군구 코드 앞 2자리 = 시도 코드
  function getRegionForFeature(f) {
    const name = f.properties.name;
    if (REGION_MAP[name]) return REGION_MAP[name];
    // 시군구의 경우: 한국 행정구역 코드 첫 2자리로 광역 추정
    const code = f.properties.code || '';
    const cMap = {
      '11':'서울','21':'부산','22':'대구','23':'인천','24':'광주','25':'대전','26':'울산','29':'세종',
      '31':'경기','32':'강원','33':'충북','34':'충남','35':'전북','36':'전남','37':'경북','38':'경남','39':'제주',
    };
    return cMap[code.slice(0,2)] || null;
  }

  const g = svg.append('g').attr('transform', 'translate(20, 20)');
  const paths = g.selectAll('path').data(geo.features).join('path')
    .attr('d', path)
    .attr('fill', d => {
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        const muni = muniByName.get(key);
        if (muni) return partyColor(muni.POLY_NM);
        // fallback: 광역단체장 색 (행정구·세종·제주 등)
        const r = getRegionForFeature(d);
        const lg = r ? lgByRegion.get(r) : null;
        return lg ? partyColor(lg.POLY_NM) : 'var(--bg-elev)';
      }
      const r = getRegionForFeature(d);
      const lg = r ? lgByRegion.get(r) : null;
      return lg ? partyColor(lg.POLY_NM) : 'var(--bg-elev)';
    })
    .attr('fill-opacity', d => {
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        if (muniByName.has(key)) return 0.85;
        // 행정구는 모시 시장 색을 0.65로 표시 (자치 X 표시)
        if (isAdminDistrict(d)) return 0.65;
        // 세종/제주는 0.5 (광역단체장 색)
        if (isProvFallback(d)) return 0.5;
        return 0.25;
      }
      return 0.85;
    })
    .attr('stroke', 'var(--bg-card)')
    .attr('stroke-width', layer === 'province' ? 1.5 : 0.4)
    .style('cursor', 'pointer')
    .on('mouseenter', function(e, d) {
      d3.select(this).attr('stroke-width', layer === 'province' ? 2 : 1.4);
      const tip = document.getElementById('rel-tooltip');
      if (!tip) return;
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        const muni = muniByName.get(key);
        // 표시명: 행정구는 원래 이름 (수원시장안구), 일반 시군구는 광역 + 시군구
        const provName = PROV_BY_CODE[(d.properties.code||'').slice(0,2)] || '';
        const origName = d.properties.name;
        const dispName = `${provName} ${origName}`.trim();
        const adminCity = ADMIN_DISTRICT_TO_CITY[origName];
        if (muni) {
          // 행정구는 "모시 시장이 관할" 표시
          const adminNote = adminCity ? `<br><span style="color:var(--warn);font-size:10px">⚠ 행정구 (자치 X) — ${escapeHtml(adminCity)} 시장이 관할</span>` : '';
          tip.innerHTML = `<b>${escapeHtml(dispName)}</b><br>${escapeHtml(muni.HG_NM)} (${escapeHtml(muni.POLY_NM)})<br><span style="color:var(--dim);font-size:10px">${escapeHtml(muni.CMIT_NM || muni.ELECT_GBN_NM || '')}</span>${adminNote}`;
          tip.style.borderColor = partyColor(muni.POLY_NM);
        } else if (isProvFallback(d)) {
          // 세종·제주: 광역단체장 정보
          const r = getRegionForFeature(d);
          const lg = r ? lgByRegion.get(r) : null;
          if (lg) {
            tip.innerHTML = `<b>${escapeHtml(dispName)}</b><br><span style="color:var(--text-2)">단층제 — 광역단체장</span><br>${escapeHtml(lg.HG_NM)} (${escapeHtml(lg.POLY_NM)})`;
            tip.style.borderColor = partyColor(lg.POLY_NM);
          } else {
            tip.innerHTML = `<b>${escapeHtml(dispName)}</b><br><span style="color:var(--dim)">데이터 준비 중</span>`;
            tip.style.borderColor = 'var(--border-strong)';
          }
        } else {
          tip.innerHTML = `<b>${escapeHtml(dispName)}</b><br><span style="color:var(--dim)">기초단체장 데이터 준비 중</span>`;
          tip.style.borderColor = 'var(--border-strong)';
        }
      } else {
        const r = getRegionForFeature(d);
        const lg = r ? lgByRegion.get(r) : null;
        tip.innerHTML = lg
          ? `<b>${escapeHtml(d.properties.name)}</b><br>${escapeHtml(lg.HG_NM)} (${escapeHtml(lg.POLY_NM)})<br><span style="color:var(--dim);font-size:10px">${escapeHtml(lg.CMIT_NM || lg.ELECT_GBN_NM)}</span>`
          : `<b>${escapeHtml(d.properties.name)}</b><br><span style="color:var(--dim)">데이터 없음</span>`;
        tip.style.borderColor = lg ? partyColor(lg.POLY_NM) : 'var(--border-strong)';
      }
      tip.style.display = 'block';
    })
    .on('mousemove', function(e) {
      const tip = document.getElementById('rel-tooltip');
      if (tip) {
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top  = (e.clientY + 14) + 'px';
      }
    })
    .on('mouseleave', function() {
      d3.select(this).attr('stroke-width', layer === 'province' ? 1.5 : 0.4);
      const tip = document.getElementById('rel-tooltip');
      if (tip) tip.style.display = 'none';
    })
    .on('click', (e, d) => {
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        const muni = muniByName.get(key);
        if (muni) location.hash = `#/m/${encodeURIComponent(muni.MONA_CD)}`;
        return;
      }
      const r = getRegionForFeature(d);
      const lg = r ? lgByRegion.get(r) : null;
      if (lg) location.hash = `#/m/${encodeURIComponent(lg.MONA_CD)}`;
    });

  // 시도 라벨 (province 레이어만)
  if (layer === 'province') {
    g.selectAll('text').data(geo.features).join('text')
      .attr('x', d => path.centroid(d)[0])
      .attr('y', d => path.centroid(d)[1])
      .attr('text-anchor', 'middle')
      .attr('font-size', 10)
      .attr('font-weight', 600)
      .attr('fill', '#fff')
      .style('text-shadow', '0 0 4px rgba(0,0,0,0.6)')
      .style('pointer-events', 'none')
      .text(d => REGION_MAP[d.properties.name] || '');
  }

  // 줌 — translateExtent로 화면 밖 드래그 방지
  const zoom = d3.zoom()
    .scaleExtent([1, 8])
    .translateExtent([[-w * 0.15, -h * 0.15], [w * 1.15, h * 1.15]])
    .on('zoom', e => g.attr('transform', `translate(20, 20) ${e.transform.toString()}`));
  svg.call(zoom);

  // 줌 컨트롤 (UI 버튼) — container.innerHTML='' 이후이므로 매번 새로 생성
  const ctrl = document.createElement('div');
  ctrl.className = 'map-zoom-ctrl';
  ctrl.innerHTML = `
    <button class="mz-btn" data-act="in"  title="확대">＋</button>
    <button class="mz-btn" data-act="out" title="축소">−</button>
    <button class="mz-btn" data-act="reset" title="원위치">⤾</button>
  `;
  container.appendChild(ctrl);
  ctrl.querySelector('[data-act="in"]').onclick    = () => svg.call(zoom.scaleBy, 1.5);
  ctrl.querySelector('[data-act="out"]').onclick   = () => svg.call(zoom.scaleBy, 1/1.5);
  ctrl.querySelector('[data-act="reset"]').onclick = () => svg.call(zoom.transform, d3.zoomIdentity);

  // 범례 갱신
  renderMapLegend();
}

function renderMapLegend() {
  const legend = document.getElementById('map-legend');
  if (!legend) return;
  const lgs = state.members.filter(m => m._type === 'local_gov_head');
  const byParty = new Map();
  for (const m of lgs) byParty.set(m.POLY_NM, (byParty.get(m.POLY_NM)||0)+1);
  legend.innerHTML = `
    <h3>범례 — 광역단체장 정당</h3>
    ${[...byParty.entries()].sort((a,b) => b[1]-a[1]).map(([p, c]) => `
      <div class="legend-row" data-party="${escapeHtml(p)}" style="cursor:pointer">
        <span class="leg-dot" style="background:${partyColor(p)}"></span>
        <span class="leg-name">${escapeHtml(p)}</span>
        <span class="leg-count">${c}</span>
      </div>`).join('')}
    <div class="map-foot">데이터: <a href="https://github.com/southkorea/southkorea-maps" target="_blank">southkorea-maps</a> · 2018 기준</div>
  `;
  legend.querySelectorAll('.legend-row').forEach(el => {
    el.addEventListener('click', () => location.hash = `#/party/${encodeURIComponent(el.dataset.party)}`);
  });
}

if (!state.relFilter) state.relFilter = { topic: 'all', minWeight: 1 };

// 위원회 클러스터 + 대표발의 활동 네트워크 (캐시)
let _proposerActivityCache = null;
function buildProposerActivity(topicId) {
  const cacheKey = topicId || 'all';
  if (_proposerActivityCache && _proposerActivityCache[cacheKey]) return _proposerActivityCache[cacheKey];
  if (!_proposerActivityCache) _proposerActivityCache = {};
  const mps = state.members.filter(m => m._group === 'legislative' && m.HG_NM && m.POLY_NM);
  const mpByName = new Map();
  for (const m of mps) mpByName.set(m.HG_NM, m);
  // 의원별 대표발의 카운트, 통과 카운트, 분야 카운트
  const leadCount = new Map();  // name → total
  const passCount = new Map();  // name → passed
  const topicCount = new Map(); // name → Map(topic, n)
  const mpCmt = new Map();      // name → committee
  let billCount = 0;
  const allBills = state.bills || [];
  for (const b of allBills) {
    const info = getBillProposerInfo(b);
    if (info.kind !== 'mp' || !info.name) continue;
    if (topicId && topicId !== 'all' && getBillTopic(b).id !== topicId) continue;
    const m = mpByName.get(info.name);
    if (!m) continue;
    billCount++;
    leadCount.set(info.name, (leadCount.get(info.name) || 0) + 1);
    if (/가결/.test(b.PROC_RESULT_CD || '')) passCount.set(info.name, (passCount.get(info.name) || 0) + 1);
    const t = getBillTopic(b).id;
    if (!topicCount.has(info.name)) topicCount.set(info.name, new Map());
    topicCount.get(info.name).set(t, (topicCount.get(info.name).get(t) || 0) + 1);
    if (b.CURR_COMMITTEE) mpCmt.set(info.name, b.CURR_COMMITTEE);
  }
  const result = { leadCount, passCount, topicCount, mpCmt, billCount, mpByName, mps };
  _proposerActivityCache[cacheKey] = result;
  return result;
}

function initRelationsGraph() {
  if (typeof d3 === 'undefined') {
    setTimeout(initRelationsGraph, 200);
    return;
  }
  const container = document.getElementById('rel-container');
  if (!container) return;
  const proposersLoaded = Object.keys(state.billProposers || {}).length;
  if (proposersLoaded === 0) {
    container.innerHTML = '<div class="rel-loading"><span class="loading-spinner"></span>발의자 데이터 로드 중… 잠시 후 자동 표시</div>';
    setTimeout(() => { if (location.hash === '#/relations' && Object.keys(state.billProposers || {}).length > 0) initRelationsGraph(); }, 2000);
    return;
  }
  const f = state.relFilter || { topic: 'all', minWeight: 1 };
  const { leadCount, passCount, topicCount, mpCmt, billCount, mpByName, mps } = buildProposerActivity(f.topic);

  // 의원별 활동 노드 — minWeight 이상만
  const allActive = [];
  for (const [name, cnt] of leadCount) {
    if (cnt < (f.minWeight || 1)) continue;
    const m = mpByName.get(name);
    if (!m) continue;
    allActive.push({
      id: m.MONA_CD,
      name,
      party: m.POLY_NM,
      color: partyColor(m.POLY_NM),
      mid: m.MONA_CD,
      region: m.ORIG_NM,
      cmt: mpCmt.get(name) || m.CMIT_NM || '기타',
      leadCount: cnt,
      passCount: passCount.get(name) || 0,
      passRate: cnt > 0 ? ((passCount.get(name) || 0) / cnt * 100) : 0,
    });
  }
  const nodes = allActive.sort((a,b)=>b.leadCount-a.leadCount).slice(0, 250); // 너무 많으면 잘라냄

  // 위원회 anchor 생성
  const cmtSet = new Set();
  for (const n of nodes) cmtSet.add(n.cmt);
  const cmts = [...cmtSet];
  const w = Math.min(container.clientWidth || 1000, 1200);
  const h = 750;
  // 위원회를 원형으로 배치
  const cmtAngle = new Map();
  const radius = Math.min(w, h) * 0.35;
  cmts.forEach((c, i) => cmtAngle.set(c, (i / cmts.length) * 2 * Math.PI - Math.PI/2));
  for (const n of nodes) {
    const a = cmtAngle.get(n.cmt) || 0;
    n._cx = w/2 + radius * Math.cos(a);
    n._cy = h/2 + radius * Math.sin(a);
  }

  // 통계
  const statsEl = document.getElementById('rel-stats');
  const totalLead = nodes.reduce((s,n)=>s+n.leadCount, 0);
  const totalPass = nodes.reduce((s,n)=>s+n.passCount, 0);
  const partySet = new Map();
  for (const n of nodes) partySet.set(n.party, (partySet.get(n.party)||0)+1);
  const dom = [...partySet.entries()].sort((a,b)=>b[1]-a[1])[0];
  if (statsEl) {
    statsEl.innerHTML = `
      <div class="rel-stat"><b>${billCount.toLocaleString()}</b><span>분석 의안 ${f.topic !== 'all' ? '· ' + (BILL_TOPICS.find(t=>t.id===f.topic)?.label || '') : ''}</span></div>
      <div class="rel-stat"><b>${nodes.length}</b><span>활성 발의자</span></div>
      <div class="rel-stat"><b>${cmts.length}</b><span>위원회 클러스터</span></div>
      <div class="rel-stat"><b style="color:var(--ok)">${totalPass.toLocaleString()}</b><span>통과 (${totalLead ? ((totalPass/totalLead)*100).toFixed(1) : 0}%)</span></div>
      <div class="rel-stat"><b style="color:${partyColor(dom ? dom[0] : '')}">${dom ? dom[0] + ' ' + dom[1] + '명' : '—'}</b><span>최다 활성당</span></div>
    `;
  }

  if (nodes.length < 3) {
    container.innerHTML = '<div class="empty">필터 조건과 일치하는 발의 데이터 없음.</div>';
    const lg = document.getElementById('rel-legend'); if (lg) lg.innerHTML = '';
    return;
  }

  container.innerHTML = '';
  const svg = d3.select(container).append('svg')
    .attr('width', w).attr('height', h)
    .attr('class', 'rel-svg');

  const g = svg.append('g');
  const maxLead = Math.max(...nodes.map(n => n.leadCount), 1);
  const rScale = d3.scaleSqrt().domain([1, maxLead]).range([5, 28]);

  // 위원회 anchor 라벨 (배경 원호)
  g.append('g').selectAll('text').data(cmts).join('text')
    .attr('x', c => w/2 + (radius + 70) * Math.cos(cmtAngle.get(c)))
    .attr('y', c => h/2 + (radius + 70) * Math.sin(cmtAngle.get(c)))
    .attr('text-anchor', 'middle')
    .attr('dy', '0.3em')
    .attr('font-size', 11).attr('font-weight', 700)
    .attr('fill', 'var(--text-2)')
    .style('pointer-events', 'none')
    .text(c => c.length > 12 ? c.slice(0, 10) + '…' : c);

  const sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(-12))
    .force('collide', d3.forceCollide().radius(d => rScale(d.leadCount) + 1.5))
    .force('x', d3.forceX(d => d._cx).strength(0.18))
    .force('y', d3.forceY(d => d._cy).strength(0.18))
    .alphaDecay(0.04);

  const nodeSel = g.append('g').selectAll('g').data(nodes).join('g')
    .style('cursor', 'pointer')
    .on('mouseenter', function(e, d) {
      d3.select(this).raise();
      const tip = document.getElementById('rel-tooltip');
      if (tip) {
        tip.innerHTML = `<b>${escapeHtml(d.name)}</b><br><span style="color:${d.color}">${escapeHtml(d.party)}</span><br>${escapeHtml(d.region || '')}<br><span style="font-size:10px;color:var(--dim)">${escapeHtml(d.cmt || '')}</span><br><b style="color:var(--warn)">대표발의 ${d.leadCount}건</b> · 가결 ${d.passCount}건 (${d.passRate.toFixed(0)}%)`;
        tip.style.display = 'block';
        tip.style.borderColor = d.color;
      }
      // 같은 위원회 강조
      nodeSel.style('opacity', n2 => n2.cmt === d.cmt ? 1 : 0.22);
    })
    .on('mousemove', function(e) {
      const tip = document.getElementById('rel-tooltip');
      if (tip) { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY + 14) + 'px'; }
    })
    .on('mouseleave', function() {
      const tip = document.getElementById('rel-tooltip');
      if (tip) tip.style.display = 'none';
      nodeSel.style('opacity', null);
    })
    .on('click', (e, d) => location.hash = `#/m/${encodeURIComponent(d.mid)}`);

  nodeSel.append('circle')
    .attr('r', d => rScale(d.leadCount))
    .attr('fill', d => d.color)
    .attr('stroke', 'var(--bg-card)').attr('stroke-width', 1.5)
    .attr('fill-opacity', 0.92);

  // Top 20 이름 표시
  const topIds = new Set(nodes.slice().sort((a,b)=>b.leadCount-a.leadCount).slice(0, 20).map(n => n.id));
  nodeSel.filter(d => topIds.has(d.id)).append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', d => rScale(d.leadCount) + 11)
    .attr('font-size', 10)
    .attr('font-weight', 700)
    .style('pointer-events', 'none')
    .style('text-shadow', '0 0 3px var(--bg-card), 0 0 3px var(--bg-card)')
    .attr('fill', d => d.color)
    .text(d => d.name);

  sim.on('tick', () => {
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  svg.call(d3.zoom()
    .scaleExtent([0.3, 5])
    .translateExtent([[-w * 0.5, -h * 0.5], [w * 1.5, h * 1.5]])
    .on('zoom', e => g.attr('transform', e.transform)));

  function drag(simulation) {
    return d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end',   (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; });
  }
  nodeSel.call(drag(sim));

  // 범례
  const lg = document.getElementById('rel-legend');
  if (lg) {
    const partyArr = [...partySet.entries()].sort((a,b)=>b[1]-a[1]);
    // Top 8 발의왕
    const topMps = nodes.slice().sort((a,b)=>b.leadCount-a.leadCount).slice(0, 8);
    // 위원회 Top 5 (가장 활성)
    const cmtCount = new Map();
    for (const n of nodes) cmtCount.set(n.cmt, (cmtCount.get(n.cmt)||0)+n.leadCount);
    const topCmts = [...cmtCount.entries()].sort((a,b)=>b[1]-a[1]).slice(0, 5);
    lg.innerHTML = `
      <div class="rel-legend-section">
        <div class="rel-legend-h">정당별 활성 발의자</div>
        <div class="rel-legend-rows">
          ${partyArr.map(([p, n]) => `<div class="rel-legend-row"><span class="rl-dot" style="background:${partyColor(p)}"></span>${escapeHtml(p)} <b>${n}</b></div>`).join('')}
        </div>
      </div>
      <div class="rel-legend-section">
        <div class="rel-legend-h">발의왕 Top 8 (이번 필터)</div>
        <div class="rel-legend-rows">
          ${topMps.map(n => `<div class="rel-legend-row rl-clickable" data-mid="${escapeHtml(n.mid)}"><span class="rl-dot" style="background:${n.color}"></span>${escapeHtml(n.name)} <b>${n.leadCount}건</b></div>`).join('')}
        </div>
      </div>
      <div class="rel-legend-section">
        <div class="rel-legend-h">위원회별 발의량 Top 5</div>
        <div class="rel-legend-rows">
          ${topCmts.map(([c, n]) => `<div class="rel-legend-row"><span class="rl-dot" style="background:var(--text-2)"></span>${escapeHtml(c)} <b>${n}건</b></div>`).join('')}
        </div>
      </div>
    `;
    lg.querySelectorAll('.rl-clickable').forEach(el => {
      el.addEventListener('click', () => location.hash = `#/m/${encodeURIComponent(el.dataset.mid)}`);
    });
  }
}

function renderLocalDonut() {
  // 지방정부 정당 분포 — 광역단체장 + 기초단체장 + 광역의회의장 + 교육감
  const locals = state.members.filter(m =>
    m._type === 'local_gov_head' || m._type === 'local_gov_muni' ||
    m._type === 'local_council_speaker' || m._type === 'edu_superintendent'
  );
  if (locals.length < 10) return '';
  const byParty = new Map();
  for (const m of locals) byParty.set(m.POLY_NM || '무소속', (byParty.get(m.POLY_NM || '무소속') || 0) + 1);
  const arr = [...byParty.entries()].sort((a,b) => b[1]-a[1])
    .map(([name, count]) => ({ name, count, color: partyColor(name) }));
  const total = arr.reduce((s,p) => s+p.count, 0);

  // 카테고리별 카운트
  const cats = {
    광역단체장:  locals.filter(m => m._type === 'local_gov_head').length,
    기초단체장:  locals.filter(m => m._type === 'local_gov_muni').length,
    광역의회의장: locals.filter(m => m._type === 'local_council_speaker').length,
    교육감:      locals.filter(m => m._type === 'edu_superintendent').length,
  };

  const size = 240, R = 100, r = 64;
  const cx = size/2, cy = size/2;
  let angle = -Math.PI/2;
  const segs = arr.map(p => {
    const frac = p.count / total;
    const a0 = angle;
    angle += frac * 2 * Math.PI;
    const a1 = angle;
    const large = frac > 0.5 ? 1 : 0;
    const x0 = cx + R*Math.cos(a0), y0 = cy + R*Math.sin(a0);
    const x1 = cx + R*Math.cos(a1), y1 = cy + R*Math.sin(a1);
    const x2 = cx + r*Math.cos(a1), y2 = cy + r*Math.sin(a1);
    const x3 = cx + r*Math.cos(a0), y3 = cy + r*Math.sin(a0);
    const d = `M${x0.toFixed(2)},${y0.toFixed(2)} A${R},${R} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${x2.toFixed(2)},${y2.toFixed(2)} A${r},${r} 0 ${large} 0 ${x3.toFixed(2)},${y3.toFixed(2)} Z`;
    return { d, ...p, percent: (frac*100).toFixed(1) };
  });

  return `
    <div class="donut-section">
      <div class="donut-head">
        <h2>지방정부 정당 분포</h2>
        <div class="donut-sub">현재 등록 ${total}명 (광역 ${cats.광역단체장} · 기초 ${cats.기초단체장} · 의장 ${cats.광역의회의장} · 교육감 ${cats.교육감})</div>
      </div>
      <div class="donut-wrap">
        <svg viewBox="0 0 ${size} ${size}" class="donut" width="${size}" height="${size}">
          ${segs.map(s => `<path d="${s.d}" fill="${s.color}" stroke="var(--bg-card)" stroke-width="2" class="donut-seg" data-party="${escapeHtml(s.name)}"><title>${escapeHtml(s.name)}: ${s.count}명 (${s.percent}%)</title></path>`).join('')}
          <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="34" font-weight="800" style="fill:var(--text)">${total}</text>
          <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="11" fill="var(--dim)" letter-spacing="1">지방정부</text>
        </svg>
        <div class="donut-legend">
          ${segs.map(s => `
            <div class="donut-leg-row" data-party="${escapeHtml(s.name)}">
              <span class="leg-dot" style="background:${s.color}"></span>
              <span class="leg-name">${escapeHtml(s.name)}</span>
              <span class="leg-count">${s.count}</span>
              <span class="leg-pct">${s.percent}%</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderStats() {
  const mps = state.members.filter(m => m._group === 'legislative' || (!m._group && m.UNITS));
  if (mps.length < 100) return '';

  const now = new Date().getFullYear();
  const ages = mps.map(m => {
    const y = parseInt((m.BTH_DATE || '').slice(0,4), 10);
    return y ? now - y : null;
  }).filter(a => a != null);
  const avgAge = ages.reduce((s,a) => s+a, 0) / ages.length;
  const minAge = Math.min(...ages), maxAge = Math.max(...ages);

  const sex = { 남: 0, 여: 0 };
  for (const m of mps) {
    if (m.SEX_GBN_NM === '남') sex.남++;
    else if (m.SEX_GBN_NM === '여') sex.여++;
  }
  const totalSex = sex.남 + sex.여;

  const terms = new Map();
  for (const m of mps) terms.set(m.REELE_GBN_NM || '초선', (terms.get(m.REELE_GBN_NM || '초선') || 0) + 1);
  const TERM_ORDER = ['초선','재선','3선','4선','5선','6선','7선','8선'];
  const termArr = TERM_ORDER.filter(t => terms.has(t)).map(t => ({ t, c: terms.get(t) }));
  const maxTerm = Math.max(...termArr.map(t => t.c));

  const partyAge = new Map();
  for (const m of mps) {
    const y = parseInt((m.BTH_DATE || '').slice(0,4), 10);
    if (!y) continue;
    if (!partyAge.has(m.POLY_NM)) partyAge.set(m.POLY_NM, []);
    partyAge.get(m.POLY_NM).push(now - y);
  }
  const partyAvg = [...partyAge.entries()]
    .filter(([,arr]) => arr.length >= 3)
    .map(([p, arr]) => ({ p, avg: arr.reduce((s,a) => s+a, 0) / arr.length, count: arr.length }))
    .sort((a,b) => b.count - a.count);
  const maxAvgAge = Math.max(...partyAvg.map(p => p.avg));

  return `
    <div class="stats-section">
      <div class="stats-head">
        <h2>22대 국회 통계</h2>
        <div class="stats-sub">${mps.length}명 의원의 데이터 요약</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">평균 나이 (만)</div>
          <div class="stat-card-value">${avgAge.toFixed(1)}<span class="unit">세</span></div>
          <div class="stat-card-detail">최연소 <b>${minAge}</b> · 최고령 <b>${maxAge}</b></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">성별 분포</div>
          <div class="stat-card-rows">
            <div class="stat-row-item"><span class="sex-dot" style="background:#1e40af"></span><span class="sx-lbl">남</span><b>${sex.남}</b><span class="pct">${(sex.남/totalSex*100).toFixed(1)}%</span></div>
            <div class="stat-row-item"><span class="sex-dot" style="background:#db2777"></span><span class="sx-lbl">여</span><b>${sex.여}</b><span class="pct">${(sex.여/totalSex*100).toFixed(1)}%</span></div>
          </div>
        </div>
        <div class="stat-card stat-card-wide">
          <div class="stat-card-label">선수 분포</div>
          <div class="bar-chart">
            ${termArr.map(t => `
              <div class="bar-row">
                <div class="bar-label">${escapeHtml(t.t)}</div>
                <div class="bar-wrap"><div class="bar" style="width:${(t.c/maxTerm*100).toFixed(1)}%"></div></div>
                <div class="bar-count">${t.c}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="stat-card stat-card-wide">
          <div class="stat-card-label">정당별 평균 나이</div>
          <div class="bar-chart">
            ${partyAvg.slice(0, 6).map(p => `
              <div class="bar-row">
                <div class="bar-label" style="color:${partyColor(p.p)}">${escapeHtml(p.p)}</div>
                <div class="bar-wrap"><div class="bar" style="width:${(p.avg/maxAvgAge*100).toFixed(1)}%; background:${partyColor(p.p)}"></div></div>
                <div class="bar-count">${p.avg.toFixed(1)}세</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

        <div class="donut-sub">현재 등록 ${total}명 · 클릭하면 정당 페이지</div>

// NEC 프록시 설정 (localStorage 저장)
const NEC_PROXY_KEY = 'politik:necProxyUrl';
function getNecProxy() {
  try { return localStorage.getItem(NEC_PROXY_KEY) || ''; } catch { return ''; }
}
function setNecProxy(url) {
  try {
    if (url) localStorage.setItem(NEC_PROXY_KEY, url.replace(/\/$/, ''));
    else localStorage.removeItem(NEC_PROXY_KEY);
  } catch {}
}
async function necFetch(path) {
  const base = getNecProxy();
  if (!base) throw new Error('NEC 프록시 URL 미설정');
  const r = await fetch(base + path);
  if (!r.ok) throw new Error(`NEC API ${r.status}`);
  return r.json();
}

// 2026 지선 후보자 캐시 + 로드 (광역단체장 sgTypecode=3)
const CACHE_KEY_NEC_2026 = 'politik:nec2026Candidates:v1';
const NEC_CACHE_TTL = 3 * 3600 * 1000; // 3시간
async function loadNec2026Governors() {
  if (state.nec2026Governors) return state.nec2026Governors;
  // localStorage 캐시
  try {
    const raw = localStorage.getItem(CACHE_KEY_NEC_2026);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < NEC_CACHE_TTL) {
        state.nec2026Governors = c.data;
        return c.data;
      }
    }
  } catch {}
  if (!getNecProxy()) {
    state.nec2026Governors = { _noProxy: true, items: [] };
    return state.nec2026Governors;
  }
  try {
    // 광역단체장 (sgTypecode=3)
    const j = await necFetch('/candidates?sgId=20260603&sgTypecode=3&numOfRows=500');
    // 응답 정규화 (response → body → items → item)
    let items = j?.response?.body?.items?.item || j?.body?.items?.item || j?.items?.item || j?.item || [];
    if (!Array.isArray(items)) items = items ? [items] : [];
    state.nec2026Governors = { items, fetchedAt: Date.now() };
    try { localStorage.setItem(CACHE_KEY_NEC_2026, JSON.stringify({ t: Date.now(), data: state.nec2026Governors })); } catch {}
  } catch (e) {
    state.nec2026Governors = { _error: e.message, items: [] };
  }
  return state.nec2026Governors;
}

async function loadWorldCompare() {
  if (state.worldCompare) return state.worldCompare;
  try {
    const res = await fetch('data/world_compare.json', { cache: 'force-cache' });
    if (!res.ok) throw new Error('world_compare fetch failed');
    state.worldCompare = await res.json();
  } catch (e) {
    console.warn('world compare load failed', e);
    state.worldCompare = { metrics: [], countries: [] };
  }
  return state.worldCompare;
}

function renderWorldComparePage() {
  const wc = state.worldCompare;
  if (!wc) return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="loading"><span class="loading-spinner"></span>국제 비교 데이터 불러오는 중…</div>
  `;
  const { metrics, countries } = wc;

  // 각 metric별 best/worst 계산 (rank용)
  function rankClass(metricId, value, higher) {
    const vals = countries.map(c => c[metricId]).filter(v => v != null);
    if (!vals.length) return '';
    const max = Math.max(...vals), min = Math.min(...vals);
    if (higher === 'good') {
      if (value === max) return 'rank-best';
      if (value === min) return 'rank-worst';
    } else if (higher === 'low') {
      if (value === min) return 'rank-best';
      if (value === max) return 'rank-worst';
    }
    return '';
  }

  // 한국 강조 row 먼저, 나머지는 코드순
  const kr = countries.find(c => c.code === 'KR');
  const others = countries.filter(c => c.code !== 'KR');

  // KR vs 평균 KPI 4종
  function avg(metric) {
    const v = others.map(c => c[metric]).filter(x => x != null);
    if (!v.length) return null;
    return v.reduce((s, x) => s + x, 0) / v.length;
  }
  const krFemale = kr.female_pct, avgFemale = avg('female_pct');
  const krTurnout = kr.turnout, avgTurnout = avg('turnout');
  const krDemo = kr.democracy_idx, avgDemo = avg('democracy_idx');
  const krCorr = kr.corruption_idx, avgCorr = avg('corruption_idx');

  function pillColor(v) { return v > 0 ? 'pill-up' : v < 0 ? 'pill-down' : 'pill-flat'; }
  function diff(v1, v2, fmt = (x) => x.toFixed(1)) {
    if (v2 == null) return '';
    const d = v1 - v2;
    return `<span class="kpi-pill ${pillColor(d)}">${d > 0 ? '▲' : d < 0 ? '▼' : '='} ${fmt(Math.abs(d))}</span>`;
  }

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="world-page">
      <div class="world-hero">
        <div class="world-hero-eye">REPUBLIC OF KOREA · WORLD COMPARE</div>
        <h1>🌐 대한민국 vs 세계 ${countries.length - 1}개 민주국가</h1>
        <p>의원 수 · 여성 비율 · 투표율 · 민주주의 지수 · 부패인식 지수 한눈 비교 (2024-25 기준)</p>
      </div>

      <div class="dash-grid">
        <div class="dash-card col-3 kpi">
          <div class="kpi-label">여성 의원 비율</div>
          <div class="kpi-num">${krFemale}<span class="unit">%</span></div>
          <div class="kpi-trend">${countries.length - 1}개국 평균 ${avgFemale.toFixed(1)}% ${diff(krFemale, avgFemale)}</div>
        </div>
        <div class="dash-card col-3 kpi">
          <div class="kpi-label">총선 투표율</div>
          <div class="kpi-num">${krTurnout}<span class="unit">%</span></div>
          <div class="kpi-trend">평균 ${avgTurnout.toFixed(1)}% ${diff(krTurnout, avgTurnout)}</div>
        </div>
        <div class="dash-card col-3 kpi">
          <div class="kpi-label">민주주의 지수 (EIU)</div>
          <div class="kpi-num">${krDemo}<span class="unit">/10</span></div>
          <div class="kpi-trend">평균 ${avgDemo.toFixed(2)} ${diff(krDemo, avgDemo, x => x.toFixed(2))}</div>
        </div>
        <div class="dash-card col-3 kpi">
          <div class="kpi-label">부패인식 지수 (TI)</div>
          <div class="kpi-num">${krCorr}<span class="unit">/100</span></div>
          <div class="kpi-trend">평균 ${avgCorr.toFixed(1)} ${diff(krCorr, avgCorr)}</div>
        </div>

        <!-- 메트릭별 막대 -->
        ${['female_pct', 'turnout', 'democracy_idx', 'press_freedom', 'corruption_idx', 'seats_per_100k'].map(mid => {
          const meta = metrics.find(m => m.id === mid);
          if (!meta) return '';
          const sorted = countries.slice().sort((a, b) => {
            if (meta.higher === 'low') return a[mid] - b[mid];
            return b[mid] - a[mid];
          });
          const max = Math.max(...sorted.map(c => c[mid]));
          const min = Math.min(...sorted.map(c => c[mid]));
          return `
            <div class="dash-card col-6 chart-card">
              <div class="chart-head">
                <h3>${escapeHtml(meta.label)}</h3>
                <span class="chart-link">${escapeHtml(meta.unit)} · ${escapeHtml(meta.desc)}</span>
              </div>
              <div class="world-bars">
                ${sorted.map(c => {
                  const v = c[mid];
                  const pct = meta.higher === 'low'
                    ? (max === min ? 100 : ((max - v) / (max - min)) * 100)
                    : (max === min ? 100 : (v / max) * 100);
                  return `
                    <div class="world-bar-row ${c.code === 'KR' ? 'is-kr' : ''}">
                      <div class="wb-flag">${c.flag}</div>
                      <div class="wb-name">${escapeHtml(c.name)}</div>
                      <div class="wb-wrap"><div class="wb-bar" style="width:${pct.toFixed(1)}%; background:${c.code === 'KR' ? '#ef4444' : 'var(--text-2)'}"></div></div>
                      <div class="wb-val">${v}${escapeHtml(meta.unit === '%' ? '%' : '')}</div>
                    </div>`;
                }).join('')}
              </div>
            </div>`;
        }).join('')}

        <!-- 전체 비교 표 -->
        <div class="dash-card col-12 chart-card">
          <div class="chart-head">
            <h3>전체 데이터 표 (${countries.length}개국)</h3>
            <span class="chart-link">한국 강조 · 정렬 가능</span>
          </div>
          <div class="world-table-wrap">
            <table class="world-table">
              <thead>
                <tr>
                  <th>국가</th>
                  <th>의회 구조</th>
                  <th class="num">의원</th>
                  <th class="num">10만명당</th>
                  <th class="num">여성%</th>
                  <th class="num">평균연령</th>
                  <th class="num">투표율</th>
                  <th class="num">민주지수</th>
                  <th class="num">언론자유</th>
                  <th class="num">청렴도</th>
                </tr>
              </thead>
              <tbody>
                ${[kr, ...others].map(c => `
                  <tr class="${c.highlight ? 'is-kr-row' : ''}">
                    <td><span class="wt-flag">${c.flag}</span> <b>${escapeHtml(c.name)}</b></td>
                    <td class="wt-sys">${escapeHtml(c.system)}<br><span>${escapeHtml(c.election)}</span></td>
                    <td class="num">${c.seats}</td>
                    <td class="num">${c.seats_per_100k}</td>
                    <td class="num ${rankClass('female_pct', c.female_pct, 'good')}">${c.female_pct}%</td>
                    <td class="num">${c.avg_age}</td>
                    <td class="num ${rankClass('turnout', c.turnout, 'good')}">${c.turnout}%</td>
                    <td class="num ${rankClass('democracy_idx', c.democracy_idx, 'good')}">${c.democracy_idx}</td>
                    <td class="num ${rankClass('press_freedom', c.press_freedom, 'low')}">${c.press_freedom}위</td>
                    <td class="num ${rankClass('corruption_idx', c.corruption_idx, 'good')}">${c.corruption_idx}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- 출처 -->
        <div class="dash-card col-12">
          <div class="world-sources">
            <h3>📚 출처 · 방법론</h3>
            <ul>
              <li><b>IPU Parline</b> (data.ipu.org) — 의원 수·여성 비율·임기·선거 방식</li>
              <li><b>EIU Democracy Index 2024</b> — 167개국 0~10 점수 (5개 카테고리)</li>
              <li><b>RSF World Press Freedom Index 2024</b> — 180개국 순위</li>
              <li><b>Transparency International CPI 2024</b> — 부패인식 0~100 (높을수록 청렴)</li>
              <li><b>IDEA / OECD</b> — 투표율</li>
              <li><b>대한민국 데이터</b> — 22대 국회 직접 집계 · 중앙선거관리위원회 22대 총선 67.0%</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  `;
}

function getCommitteeMap() {
  // 모든 22대 의원의 CMIT_NM 집계
  const map = new Map();
  const mps = state.members.filter(m => (m._group === 'legislative' || (!m._group && m.UNITS)));
  for (const m of mps) {
    const c = (m.CMIT_NM || '').trim();
    if (!c || c === '—' || c === '비위원') continue;
    // 분할: "정무위원회, 예산결산특별위원회"
    for (const part of c.split(/[,·]/).map(s => s.trim())) {
      if (!part) continue;
      if (!map.has(part)) map.set(part, []);
      map.get(part).push(m);
    }
  }
  return map;
}

function renderCommitteesPage() {
  const cmtMap = getCommitteeMap();
  if (cmtMap.size === 0) {
    return `
      <div class="group-back" id="back-home">← 조직도</div>
      <div class="loading"><span class="loading-spinner"></span>위원회 데이터 준비 중…</div>
    `;
  }
  const arr = [...cmtMap.entries()].map(([name, members]) => {
    const billCount = (state.billsByCommittee?.get(name) || []).length;
    // 정당 분포
    const byParty = new Map();
    for (const m of members) byParty.set(m.POLY_NM, (byParty.get(m.POLY_NM) || 0) + 1);
    const partyArr = [...byParty.entries()].sort((a, b) => b[1] - a[1]);
    // 위원장 찾기 (JOB_RES_NM에 위원장 포함이면)
    const chair = members.find(m => /위원장/.test(m.JOB_RES_NM || ''));
    const isSpecial = /특별위원회|예산결산|윤리|정보/.test(name);
    return { name, members, billCount, partyArr, chair, isSpecial };
  }).sort((a, b) => {
    // 상임위 먼저, 그 다음 인원 많은 순
    if (a.isSpecial !== b.isSpecial) return a.isSpecial ? 1 : -1;
    return b.members.length - a.members.length;
  });
  const standing = arr.filter(c => !c.isSpecial);
  const special = arr.filter(c => c.isSpecial);

  function cardHtml(c) {
    const top3 = c.partyArr.slice(0, 3);
    const chairColor = c.chair ? partyColor(c.chair.POLY_NM) : 'var(--text-2)';
    return `
      <div class="cmt-card" data-cmt="${escapeHtml(c.name)}">
        <div class="cmt-card-head">
          <div class="cmt-card-name">${escapeHtml(c.name)}</div>
          ${c.isSpecial ? '<span class="cmt-card-tag">특별</span>' : ''}
        </div>
        <div class="cmt-card-stats">
          <div><b>${c.members.length}</b><span>명</span></div>
          <div><b>${c.billCount}</b><span>건 처리</span></div>
        </div>
        ${c.chair ? `<div class="cmt-card-chair">위원장 <b style="color:${chairColor}">${escapeHtml(c.chair.HG_NM)}</b> <span>${escapeHtml(c.chair.POLY_NM)}</span></div>` : '<div class="cmt-card-chair"><span>위원장 정보 없음</span></div>'}
        <div class="cmt-card-bars">
          ${top3.map(([p, n]) => `<div class="cmt-card-bar" style="flex:${n}; background:${partyColor(p)}" title="${escapeHtml(p)} ${n}명"></div>`).join('')}
        </div>
      </div>`;
  }

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="cmt-page">
      <div class="cmt-hero">
        <div class="cmt-hero-eye">POLITIK · 22대 국회 위원회</div>
        <h1>국회 위원회 ${arr.length}개</h1>
        <p>상임위원회 ${standing.length} · 특별위원회 ${special.length} · 클릭하면 위원 명단 + 처리 의안</p>
      </div>
      <div class="cmt-section">
        <h2>상임위원회 <span class="cnt">${standing.length}</span></h2>
        <div class="cmt-grid">${standing.map(cardHtml).join('')}</div>
      </div>
      ${special.length ? `
        <div class="cmt-section">
          <h2>특별위원회·기타 <span class="cnt">${special.length}</span></h2>
          <div class="cmt-grid">${special.map(cardHtml).join('')}</div>
        </div>` : ''}
    </div>
  `;
}

function renderCommitteeDetail(cmtName) {
  const cmtMap = getCommitteeMap();
  const members = cmtMap.get(cmtName) || [];
  if (!members.length) {
    return `
      <div class="group-back" id="back-home">← 위원회</div>
      <div class="empty">위원회 "${escapeHtml(cmtName)}"를 찾을 수 없습니다.</div>
    `;
  }
  const bills = state.billsByCommittee?.get(cmtName) || [];
  // 정당별 그룹
  const byParty = new Map();
  for (const m of members) {
    const p = m.POLY_NM || '무소속';
    if (!byParty.has(p)) byParty.set(p, []);
    byParty.get(p).push(m);
  }
  const sorted = [...byParty.entries()].sort((a, b) => b[1].length - a[1].length);
  const chair = members.find(m => /위원장/.test(m.JOB_RES_NM || ''));

  // 최근 처리 의안 10건
  const recentBills = bills.slice().sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || '')).slice(0, 10);
  const passed = bills.filter(b => /가결/.test(b.PROC_RESULT_CD || '')).length;
  const passRate = bills.length ? (passed/bills.length*100).toFixed(1) : '0';

  return `
    <div class="group-back" id="back-cmt">← 위원회</div>
    <div class="cmt-detail">
      <div class="cmt-detail-hero">
        <h1>${escapeHtml(cmtName)}</h1>

          <div><b>${members.length}</b><span>명</span></div>
          <div><b>${bills.length}</b><span>건 처리</span></div>
          <div><b>${passRate}<span style="font-size:13px">%</span></b><span>가결률</span></div>
          ${chair ? `<div><b style="color:${partyColor(chair.POLY_NM)}">${escapeHtml(chair.HG_NM)}</b><span>위원장 · ${escapeHtml(chair.POLY_NM)}</span></div>` : ''}
        </div>
      </div>

      ${sorted.map(([party, arr]) => `
        <div class="sub-section">
          <h2><span style="color:${partyColor(party)}">●</span> ${escapeHtml(party)} <span class="cnt">${arr.length}명</span></h2>
          <div class="grid">${arr.map(memberCardHTML).join('')}</div>
        </div>
      `).join('')}

      ${recentBills.length ? `
        <div class="sub-section">
          <h2>최근 처리 의안 <span class="cnt">${recentBills.length}건</span></h2>
          <div class="bills-recent">
            ${recentBills.map(b => {
              const color = PROC_RESULT_COLOR[b.PROC_RESULT_CD] || 'var(--text-2)';
              const name = b.BILL_NAME || b.BILL_NM || '—';
              const link = b.LINK_URL || (b.BILL_ID ? `https://likms.assembly.go.kr/bill/billDetail.do?billId=${b.BILL_ID}` : '');
              return `
                <div class="br-row"${link ? ` onclick="window.open('${link}','_blank','noopener')"` : ''} style="${link ? 'cursor:pointer' : ''}">
                  <div class="br-date">${escapeHtml((b.PROC_DT || '').slice(0,10))}</div>
                  <div class="br-name">${escapeHtml(name)}</div>
                  <div class="br-cmt">${escapeHtml(cmtName)}</div>
                  <div class="br-result" style="color:${color}">${escapeHtml(b.PROC_RESULT_CD || '—')}</div>
                </div>`;
            }).join('')}
          </div>
        </div>` : ''}
    </div>
  `;
}

// ============================================================
// Bills statistics page (22대 본회의 처리 의안)
// ============================================================
// 필터 state
if (!state.billsFilter) state.billsFilter = { result: 'all', kind: 'all', party: null, committee: null, topic: 'all', q: '', limit: 30 };
if (!state.homeFeedFilter) state.homeFeedFilter = { party: 'all' };

function applyBillsFilter(bills) {
  const f = state.billsFilter;
  return bills.filter(b => {
    if (f.result === 'pass' && !/가결/.test(b.PROC_RESULT_CD || '')) return false;
    if (f.result === 'orig' && b.PROC_RESULT_CD !== '원안가결') return false;
    if (f.result === 'amend' && b.PROC_RESULT_CD !== '수정가결') return false;
    if (f.result === 'reject' && b.PROC_RESULT_CD !== '부결') return false;
    if (f.kind !== 'all') {
      const info = getBillProposerInfo(b);
      if (info.kind !== f.kind) return false;
    }
    if (f.party) {
      const info = getBillProposerInfo(b);
      if (info.party !== f.party) return false;
    }
    if (f.committee && b.CURR_COMMITTEE !== f.committee) return false;
    if (f.topic && f.topic !== 'all') {
      if (getBillTopic(b).id !== f.topic) return false;
    }
    if (f.q) {
      const q = f.q.toLowerCase();
      const nm = (b.BILL_NAME || b.BILL_NM || '').toLowerCase();
      const cmt = (b.CURR_COMMITTEE || '').toLowerCase();
      const info = getBillProposerInfo(b);
      const proposerNm = (info.name || '').toLowerCase();
      if (!nm.includes(q) && !cmt.includes(q) && !proposerNm.includes(q)) return false;
    }
    return true;
  });
}

function patchRowHTML(b, freshIdx = -1) {
  const info = getBillProposerInfo(b);
  const topic = getBillTopic(b);
  const link = b.LINK_URL || (b.BILL_ID ? `https://likms.assembly.go.kr/bill/billDetail.do?billId=${b.BILL_ID}` : '');
  const partyColorCss = info.party ? partyColor(info.party) : 'var(--text-2)';
  const proposerHtml = info.kind === 'gov'
    ? `<span class="patch-by-gov">⚖ 정부</span>`
    : info.kind === 'chair'
      ? `<span class="patch-by-chair">🏢 ${escapeHtml(info.name)}${info.party ? ` <em style="color:${partyColorCss}">${escapeHtml(info.party)}</em>` : ''}</span>`
      : info.kind === 'mp' && info.name
        ? `<span class="patch-by-mp" ${info.member ? `data-mid="${escapeHtml(info.member.MONA_CD)}"` : ''} style="cursor:${info.member ? 'pointer':'default'}">👤 ${escapeHtml(info.name)}${info.count > 1 ? ` 외 ${info.count - 1}명` : ''}${info.party ? ` <em style="color:${partyColorCss}">${escapeHtml(info.party)}</em>` : ''}</span>`
        : `<span class="patch-by-unknown">발의자 정보 준비 중</span>`;
  const isFresh = freshIdx >= 0 && freshIdx < 2;
  const resultClass = b.PROC_RESULT_CD === '원안가결' ? 'patch-pass'
    : b.PROC_RESULT_CD === '수정가결' ? 'patch-amend'
    : b.PROC_RESULT_CD === '부결' ? 'patch-reject' : 'patch-other';
  const resultLabel = b.PROC_RESULT_CD === '원안가결' ? 'PASSED'
    : b.PROC_RESULT_CD === '수정가결' ? 'AMENDED'
    : b.PROC_RESULT_CD === '부결' ? 'REJECTED' : (b.PROC_RESULT_CD || '—');
  const y = parseInt(b.YES_TCNT,10), n = parseInt(b.NO_TCNT,10), bl = parseInt(b.BLANK_TCNT,10)||0;
  const ynRatio = y ? `<span class="patch-vote">${y}/${y+n+bl} 찬성${n ? ` · ${n} 반대` : ''}${bl ? ` · ${bl} 기권` : ''}</span>` : '';
  // 통과 속도 (발의일 → 처리일)
  let speedHtml = '';
  const proposers = state.billProposers?.[b.BILL_ID];
  if (proposers?.proposeDt && b.PROC_DT) {
    const d1 = new Date(proposers.proposeDt), d2 = new Date(b.PROC_DT);
    const days = Math.round((d2 - d1) / 86400000);
    if (days >= 0 && days < 5000) {
      speedHtml = `<span class="patch-speed" title="발의 ${proposers.proposeDt.slice(0,10)} → 처리 ${b.PROC_DT.slice(0,10)}">⏱ ${days < 30 ? `<b>${days}일</b>` : days < 365 ? `${days}일` : `${(days/365).toFixed(1)}년`}</span>`;
    }
  }
  return `
    <div class="patch-row${isFresh ? ' patch-fresh' : ''}"${link ? ` onclick="window.open('${link}','_blank','noopener')"` : ''} style="${link ? 'cursor:pointer' : ''}; border-left-color:${partyColorCss}">
      <div class="patch-meta">
        <span class="patch-tag ${resultClass}">${resultLabel}</span>
        <span class="patch-topic" style="color:${topic.color}; border-color:${topic.color}" title="${escapeHtml(topic.label)}">${topic.icon} ${escapeHtml(topic.label)}</span>
        <span class="patch-date">${escapeHtml((b.PROC_DT || '').slice(0,10))}</span>
        <span class="patch-num">#${escapeHtml(b.BILL_NO || '—')}</span>
        ${speedHtml}
        ${isFresh ? '<span class="patch-fresh-dot">NEW</span>' : ''}
      </div>
      <div class="patch-title">${escapeHtml(b.BILL_NAME || b.BILL_NM || '—')}</div>
      <div class="patch-by">
        ${proposerHtml}
        <span class="patch-cmt">${escapeHtml(b.CURR_COMMITTEE || '')}</span>
        ${ynRatio}
      </div>
    </div>`;
}

function renderBillsPage() {
  const bills = state.bills || [];
  if (!bills.length) {
    return `
      <div class="group-back" id="back-home">← 조직도</div>
      <div class="loading"><span class="loading-spinner"></span>22대 처리 의안 데이터 불러오는 중…<br><br>국회 OPEN API에서 ~1.6K 건 로드 중입니다.</div>
    `;
  }

  const f = state.billsFilter;
  const filtered = applyBillsFilter(bills).sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));
  const shown = filtered.slice(0, f.limit);

  // 정당·위원회 옵션
  const parties = new Set();
  const cmts = new Set();
  for (const b of bills) {
    const info = getBillProposerInfo(b);
    if (info.party) parties.add(info.party);
    if (b.CURR_COMMITTEE) cmts.add(b.CURR_COMMITTEE);
  }
  const partyOpts = [...parties].sort();
  const cmtOpts = [...cmts].sort();

  // 카운트 (필터 적용 전 vs 후)
  const totalCount = bills.length;
  const filteredCount = filtered.length;

  const total = totalCount;
  // 결과별 집계 (본회의 처리 의안만 — 원안가결·수정가결·부결·기타)
  const byResult = new Map();
  for (const b of bills) {
    const r = b.PROC_RESULT_CD || '기타';
    byResult.set(r, (byResult.get(r) || 0) + 1);
  }
  const passed = (byResult.get('원안가결') || 0) + (byResult.get('수정가결') || 0);
  const rejected = (byResult.get('부결') || 0);
  const passRate = total ? ((passed / total) * 100).toFixed(1) : '0';

  // 평균 투표 참여율 (출석/재적)
  let voteSum = 0, memberSum = 0, voteCount = 0;
  for (const b of bills) {
    const v = parseInt(b.VOTE_TCNT, 10);
    const mem = parseInt(b.MEMBER_TCNT, 10);
    if (v > 0 && mem > 0) { voteSum += v; memberSum += mem; voteCount++; }
  }
  const avgTurnout = voteCount ? (voteSum / memberSum * 100).toFixed(1) : '—';

  // 만장일치 (NO_TCNT===0 && BLANK_TCNT<=5 && YES_TCNT >= 200)
  const unanimous = bills.filter(b => {
    const y = parseInt(b.YES_TCNT, 10), n = parseInt(b.NO_TCNT, 10), bl = parseInt(b.BLANK_TCNT, 10);
    return y >= 200 && n === 0 && bl <= 5;
  });
  // 박빙 처리 (|yes - no| <= 30, yes > 0)
  const close = bills.filter(b => {
    const y = parseInt(b.YES_TCNT, 10), n = parseInt(b.NO_TCNT, 10);
    return y > 0 && n > 0 && Math.abs(y - n) <= 30;
  }).sort((a, b) => Math.abs(parseInt(a.YES_TCNT,10) - parseInt(a.NO_TCNT,10)) - Math.abs(parseInt(b.YES_TCNT,10) - parseInt(b.NO_TCNT,10))).slice(0, 10);

  // 위원회별 (Top 12)
  const byCmt = new Map();
  for (const b of bills) {
    const c = b.CURR_COMMITTEE || '미상';
    if (!byCmt.has(c)) byCmt.set(c, { total: 0, passed: 0 });
    const e = byCmt.get(c);
    e.total++;
    if (/가결/.test(b.PROC_RESULT_CD || '')) e.passed++;
  }
  const cmtArr = [...byCmt.entries()]
    .map(([n, v]) => ({ name: n, total: v.total, passed: v.passed, rate: v.total ? (v.passed/v.total*100).toFixed(1) : '0' }))
    .sort((a, b) => b.total - a.total)
    .slice(0, 12);
  const cmtMax = Math.max(...cmtArr.map(c => c.total));

  // 월별 처리 추이
  const byMonth = new Map();
  for (const b of bills) {
    const d = b.PROC_DT || '';
    if (!/^\d{4}-?\d{2}/.test(d)) continue;
    const ym = d.slice(0, 7).replace('-', '');
    const m = ym.slice(0,4) + '-' + ym.slice(4,6);
    byMonth.set(m, (byMonth.get(m) || 0) + 1);
  }
  const monthArr = [...byMonth.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  const monthMax = Math.max(1, ...monthArr.map(([, c]) => c));

  // 최근 처리 의안 20건
  const recent = bills.slice().sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || '')).slice(0, 20);

  const resultColors = {
    '원안가결': 'var(--ok)',

  // 발의자 종류별 카운트 (정부/위원장/의원)

  const topTopics = [...Object.entries(topicCounts)].filter(([id]) => id !== 'misc').sort((a,b)=>b[1]-a[1]).slice(0, 8);
  const topicPartyMap = {}; // topicId -> { party: count }

  for (const b of bills) {

    const p = info.party || (info.kind === 'gov' ? '정부' : info.kind === 'chair' ? '위원장' : '기타');
    topicPartyMap[tid].set(p, (topicPartyMap[tid].get(p) || 0) + 1);
  }

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="bills-page">
      <div class="bills-hero">
        <div class="bills-hero-eye">REPUBLIC OF KOREA · PATCH NOTES · v22</div>
        <h1>전체 패치 노트 ${totalCount.toLocaleString()}건</h1>
        <p>22대 국회 본회의 처리 의안 · 발의자 종류·정당·위원회·키워드로 필터링</p>
      </div>

      <!-- 필터 바 -->
      <div class="patch-filters">
        <div class="pf-group">
          <span class="pf-label">결과</span>
          <button class="pf-chip ${f.result==='all'?'active':''}" data-f="result" data-v="all">전체 <span class="cnt">${totalCount}</span></button>
          <button class="pf-chip ${f.result==='pass'?'active':''}" data-f="result" data-v="pass">가결 <span class="cnt">${passed}</span></button>
          <button class="pf-chip ${f.result==='orig'?'active':''}" data-f="result" data-v="orig">원안</button>
          <button class="pf-chip ${f.result==='amend'?'active':''}" data-f="result" data-v="amend">수정</button>
          <button class="pf-chip ${f.result==='reject'?'active':''}" data-f="result" data-v="reject">부결 <span class="cnt">${rejected}</span></button>
        </div>
        <div class="pf-group">
          <span class="pf-label">발의</span>
          <button class="pf-chip ${f.kind==='all'?'active':''}" data-f="kind" data-v="all">전체</button>
          <button class="pf-chip ${f.kind==='gov'?'active':''}" data-f="kind" data-v="gov">⚖ 정부 <span class="cnt">${kindCounts.gov||0}</span></button>
          <button class="pf-chip ${f.kind==='chair'?'active':''}" data-f="kind" data-v="chair">🏢 위원장 <span class="cnt">${kindCounts.chair||0}</span></button>
          <button class="pf-chip ${f.kind==='mp'?'active':''}" data-f="kind" data-v="mp">👤 의원 <span class="cnt">${kindCounts.mp||0}</span></button>

            <button class="pf-chip ${f.topic===t.id?'active':''}" data-f="topic" data-v="${t.id}" style="${f.topic===t.id?`background:${t.color};border-color:${t.color}`:''}">

function renderPartyHistoryPage() {
  const ph = state.partyHistory;
  if (!ph) return '<div class="loading"><span class="loading-spinner"></span>정당사 데이터 불러오는 중…</div>';

  const MIN_YEAR = 1945, MAX_YEAR = 2026;
  const SPAN = MAX_YEAR - MIN_YEAR;
  function yToX(y) { return ((y - MIN_YEAR) / SPAN * 100).toFixed(2) + '%'; }
  function dateToYear(d) {
    if (!d) return MAX_YEAR;
    const y = parseInt(d.slice(0, 4), 10);
    const m = parseInt((d.slice(5, 7) || '7'), 10);
    return y + (m - 1) / 12;
  }

  // 결정적 row assign per stream — 같은 시기 같은 stream 정당이 겹치지 않게
  const streamRows = new Map();
  for (const s of ph.streams) streamRows.set(s.id, []);
  const placed = []; // { party, row, fromY, toY }
  // 시간 순 정렬
  const parties = [...ph.parties].sort((a, b) => dateToYear(a.from) - dateToYear(b.from));
  for (const p of parties) {
    const fromY = dateToYear(p.from);
    const toY = dateToYear(p.to);
    const rows = streamRows.get(p.stream);
    let row = 0;
    while (true) {
      const conflict = placed.some(x => x.party.stream === p.stream && x.row === row && !(toY <= x.fromY || fromY >= x.toY));
      if (!conflict) break;
      row++;
    }
    placed.push({ party: p, row, fromY, toY });
    if (!rows.includes(row)) rows.push(row);
  }

  // Year markers (decade)
  const decades = [];
  for (let y = 1950; y <= 2020; y += 10) decades.push(y);

  // Group by stream
  const ROW_H = 32;
  const ROW_GAP = 4;
  const SECTION_GAP = 22;
  const HEADER_H = 26;
  const sections = ph.streams.map(s => {
    const sParties = placed.filter(x => x.party.stream === s.id);
    const rowCount = Math.max(1, ...sParties.map(x => x.row + 1));
    const bars = sParties.map(x => {
      const p = x.party;
      const left = yToX(x.fromY);
      const widthPct = ((x.toY - x.fromY) / SPAN * 100).toFixed(2) + '%';
      const top = (x.row * (ROW_H + ROW_GAP)) + 'px';
      const isActive = p.active === true;
      return `
        <div class="ph-bar${isActive ? ' ph-active' : ''}"
             style="left:${left}; width:${widthPct}; top:${top}; background:${s.color}"
             data-wiki="${escapeHtml(p.wiki || '')}"
             title="${escapeHtml(p.name)} (${p.from?.slice(0,4) || '?'} ~ ${p.to ? p.to.slice(0,4) : '현재'})${p.founder ? ' · ' + escapeHtml(p.founder) : ''}${p.fate ? ' · ' + escapeHtml(p.fate) : ''}">
          <span class="ph-bar-label">${escapeHtml(p.name)}</span>
        </div>`;
    }).join('');
    return `
      <div class="ph-section">
        <div class="ph-section-head" style="border-left:4px solid ${s.color}">
          <div class="ph-section-name">${escapeHtml(s.label)}</div>
          <div class="ph-section-desc">${escapeHtml(s.desc)}</div>
        </div>
        <div class="ph-lane" style="height:${rowCount * (ROW_H + ROW_GAP)}px">
          ${bars}
        </div>
      </div>`;
  }).join('');

  // List view (chronological)
  const listHtml = parties.slice().reverse().map(p => {
    const s = ph.streams.find(x => x.id === p.stream);
    const dur = p.to
      ? `${p.from.slice(0,4)} ~ ${p.to.slice(0,4)} (${Math.round(dateToYear(p.to) - dateToYear(p.from))}년)`
      : `${p.from.slice(0,4)} ~ 현재`;
    return `
      <div class="ph-list-row" data-wiki="${escapeHtml(p.wiki || '')}">
        <div class="ph-list-dot" style="background:${s?.color || '#888'}"></div>
        <div class="ph-list-info">
          <div class="ph-list-name">${escapeHtml(p.name)} ${p.active ? '<span class="ph-list-now">현재</span>' : ''}</div>
          <div class="ph-list-meta">${escapeHtml(s?.label || '')} · ${dur}${p.founder ? ' · ' + escapeHtml(p.founder) : ''}</div>
          ${p.fate ? `<div class="ph-list-fate">${escapeHtml(p.fate)}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="ph-page">
      <div class="ph-hero">
        <div class="ph-hero-eye">POLITIK · 정당사</div>
        <h1>대한민국 정당사 1948 → 2025</h1>
        <p>${ph.parties.length}개 주요 정당 · 5개 계열 · 막대를 클릭하면 위키 페이지로 이동합니다.</p>
      </div>

      <div class="ph-chart-wrap">
        <div class="ph-year-axis">
          ${decades.map(y => `<div class="ph-year-mark" style="left:${yToX(y)}"><span>${y}</span></div>`).join('')}
        </div>
        ${sections}
        <div class="ph-now-line" style="left:${yToX(2026)}"><span>2026</span></div>
      </div>

      <div class="ph-list">
        <h2>전체 정당 (시간 역순)</h2>
        ${listHtml}
      </div>

      <div class="ph-foot">출처: 위키백과 · 국회사 · 자체 정리. 주요 정당만 수록 (소수정당·교섭단체 미달 정당은 일부 생략).</div>
    </div>
  `;
}

function renderHome() {
  const groups = groupMembers();
  const totalCount = state.members.length;
  const mps = state.members.filter(m => m._group === 'legislative' || (!m._group && m.UNITS));
  const locals = state.members.filter(m =>
    m._type === 'local_gov_head' || m._type === 'local_gov_muni' ||
    m._type === 'local_council_speaker' || m._type === 'edu_superintendent'
  );

  // KPI 계산
  const now = new Date().getFullYear();
  const ages = mps.map(m => { const y = parseInt((m.BTH_DATE||'').slice(0,4),10); return y ? now-y : null; }).filter(a => a != null);
  const avgAge = ages.length ? (ages.reduce((s,a) => s+a, 0) / ages.length).toFixed(1) : '—';
  const female = mps.filter(m => m.SEX_GBN_NM === '여').length;
  const femalePct = mps.length ? (female/mps.length*100).toFixed(1) : '0';

  // 그룹별 미리보기
  function topPreview(arr, n = 5) {
    const withPhoto = arr.filter(m => state.photos.get(m.MONA_CD)?.thumb);
    const rest = arr.filter(m => !state.photos.get(m.MONA_CD)?.thumb);
    return [...withPhoto, ...rest].slice(0, n);
  }

  // 4부 박스 (컴팩트)
  const groupBoxes = GROUP_ORDER.map(gid => {
    const g = GROUPS[gid];
    const members = groups[gid] || [];
    const previews = topPreview(members, 4);
    return `
      <div class="dash-card grpbox" data-group="${gid}">
        <div class="grpbox-top">
          <div class="grpbox-icon" style="background:${g.color}">${g.icon}</div>
          <div class="grpbox-name">${g.name}</div>
        </div>
        <div class="grpbox-num">${members.length}<span class="unit">명</span></div>
        <div class="grpbox-desc">${g.desc}</div>
        <div class="grpbox-avatars">
          ${previews.map(m => {
            const photo = state.photos.get(m.MONA_CD);
            const initial = (m.HG_NM||'?').charAt(0);
            return `<div class="org-preview-avatar" title="${escapeHtml(m.HG_NM)}">${photo?.thumb ? `<img src="${escapeHtml(photo.thumb)}" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">` : escapeHtml(initial)}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  // 정당별 의석 (메인 미니 정렬)
  const byParty = new Map();
  for (const m of mps) byParty.set(m.POLY_NM, (byParty.get(m.POLY_NM)||0)+1);
  const partyArr = [...byParty.entries()].sort((a,b) => b[1]-a[1])
    .map(([n,c]) => ({ name:n, count:c, color: partyColor(n) }));
  const partyMax = Math.max(...partyArr.map(p => p.count));

  // 선수 분포
  const terms = new Map();
  for (const m of mps) terms.set(m.REELE_GBN_NM || '초선', (terms.get(m.REELE_GBN_NM || '초선')||0)+1);
  const TERM_ORDER = ['초선','재선','3선','4선','5선','6선','7선','8선'];
  const termArr = TERM_ORDER.filter(t => terms.has(t)).map(t => ({ t, c: terms.get(t) }));
  const termMax = Math.max(...termArr.map(t => t.c));

  // 지방 정당 분포 (mini)
  const locByParty = new Map();
  for (const m of locals) locByParty.set(m.POLY_NM || '무소속', (locByParty.get(m.POLY_NM || '무소속')||0)+1);
  const locArr = [...locByParty.entries()].sort((a,b) => b[1]-a[1])
    .map(([n,c]) => ({ name:n, count:c, color: partyColor(n) }));

  // 최근 통과 법안 (패치 노트 피드용) — 가결된 의안만 최신순
  const allPassed = (state.bills || []).filter(b => /가결/.test(b.PROC_RESULT_CD || ''))
    .sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));

  // 정당 필터 (홈 피드 전용)
  const homeF = state.homeFeedFilter || { party: 'all' };
  // 정당별 카운트 (가결 의안 기준)
  const homePartyCounts = new Map();
  for (const b of allPassed) {
    const info = getBillProposerInfo(b);
    if (info.kind === 'mp' && info.party) {
      homePartyCounts.set(info.party, (homePartyCounts.get(info.party) || 0) + 1);
    } else if (info.kind === 'gov') {
      homePartyCounts.set('__gov__', (homePartyCounts.get('__gov__') || 0) + 1);
    } else if (info.kind === 'chair') {
      homePartyCounts.set('__chair__', (homePartyCounts.get('__chair__') || 0) + 1);
    }
  }
  const homePartyChips = [
    { id: 'all', label: '전체', count: allPassed.length, color: 'var(--text)' },
    ...[...homePartyCounts.entries()]
      .filter(([id]) => !['__gov__', '__chair__'].includes(id))
      .sort((a, b) => b[1] - a[1])

    { id: 'chair', label: '🏢 위원장', count: homePartyCounts.get('__chair__') || 0, color: '#94a3b8' },
  ];

  // 필터 적용 + 다양성 (필터 'all'일 때만)
  const filteredAllPassed = allPassed.filter(b => {
    if (homeF.party === 'all') return true;
    const info = getBillProposerInfo(b);
    if (homeF.party === 'gov') return info.kind === 'gov';
    if (homeF.party === 'chair') return info.kind === 'chair';

      return info.kind === 'mp' && info.party === p;
    }
    return true;
  });
  const passedBills = [];
  const recentCmts = []; const recentKinds = [];
  for (const b of filteredAllPassed) {
    if (passedBills.length >= 8) break;
    if (homeF.party !== 'all') {
      passedBills.push(b);  // 필터 적용 시 단순 최신순

      if (passedBills.length >= 8) break;

function renderGroupPage(gid) {
  const g = GROUPS[gid];
  if (!g) return '<div class="empty">알 수 없는 그룹</div>';
  const groups = groupMembers();
  const members = groups[gid] || [];

  let body = '';
  if (gid === 'legislative') {
    // 정당별 sub-section
    const byParty = new Map();
    for (const m of members) {
      const p = m.POLY_NM || '무소속';
      if (!byParty.has(p)) byParty.set(p, []);
      byParty.get(p).push(m);
    }
    const sorted = [...byParty.entries()].sort((a,b) => b[1].length - a[1].length);
    body = sorted.map(([party, arr]) => `
      <div class="sub-section">
        <h2><span style="color:${partyColor(party)}">●</span> ${escapeHtml(party)} <span class="cnt">${arr.length}명</span></h2>
        <div class="grid">${arr.map(memberCardHTML).join('')}</div>
      </div>
    `).join('');
  } else {
    // type별 sub-section (역대 의원은 age별로 더 세분화)
    const byType = new Map();
    for (const m of members) {
      let t = m._type || 'misc';
      if (m._type === 'former_member' && m._age) t = `former_member_${m._age}`;
      if (!byType.has(t)) byType.set(t, []);
      byType.get(t).push(m);
    }
    // 정렬: TYPE_ORDER 기반 + 역대 의원은 대수 큰 순 (최근부터)
    const baseOrder = TYPE_ORDER[gid] || [];
    let order = [];
    for (const t of baseOrder) {
      if (t === 'former_member') {
        // age별 키들을 큰 순으로
        const ages = [...byType.keys()].filter(k => k.startsWith('former_member_'))
          .map(k => parseInt(k.split('_')[2], 10))
          .sort((a, b) => b - a);
        for (const a of ages) order.push(`former_member_${a}`);
      } else if (byType.has(t)) {
        order.push(t);
      }
    }
    // 누락된 type 추가
    for (const t of byType.keys()) {
      if (!order.includes(t)) order.push(t);
    }
    body = order.filter(t => byType.has(t)).map(t => {
      const arr = byType.get(t);
      let label = TYPE_GROUP_LABEL[t] || t;
      if (t.startsWith('former_member_')) label = `제${t.split('_')[2]}대 국회의원`;
      // 역대 의원은 처음 50명만 표시 (성능)
      const shown = t.startsWith('former_member_') ? arr.slice(0, 50) : arr;
      const remainder = arr.length - shown.length;
      return `
        <div class="sub-section">
          <h2>${escapeHtml(label)} <span class="cnt">${arr.length}명</span></h2>
          <div class="grid">${shown.map(memberCardHTML).join('')}</div>
          ${remainder > 0 ? `<div style="text-align:center;color:var(--dim);padding:12px;font-size:11px">…외 ${remainder}명 (이름순 첫 50명만 표시)</div>` : ''}
        </div>
      `;
    }).join('');
  }

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="group-header">
      <div class="icon" style="background:${g.color}">${g.icon}</div>
      <div style="flex:1">
        <h1>${g.name}</h1>
        <div class="sub">${g.desc}</div>
        <div class="counts"><b>${members.length}</b>명 등록</div>
      </div>
    </div>
    ${body}
  `;
}

function renderPartyPage(partyName) {

  // 의원·비의원 구분

  const leaders = (PARTY_ROLES[partyName] || []).map(r => {
    const matched = mps.find(m => m.HG_NM === r.mp_name) || others.find(m => m.HG_NM === r.mp_name);

  const leadersHtml = leaders.length ? `

      <div class="grid">${leaders.map(r => {
        const m = r.member;
        const initial = (m.HG_NM || '?').charAt(0);

          ? `<img src="${escapeHtml(photo.thumb)}" loading="lazy" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`

                <div class="card-name">${escapeHtml(m.HG_NM)}</div>

            <div class="card-foot">

      <div class="grid">${restOthers.map(memberCardHTML).join('')}</div>

  const partyMpNames = new Set(mps.map(m => m.HG_NM));

          <div class="kpi-label">평균/인</div>

          <div class="chart-head"><h3>발의 Top 8 의원</h3></div>

            ${topProposers.map(([name, cnt]) => {
              const mem = mps.find(x => x.HG_NM === name);

          <div class="chart-head"><h3>최근 발의 → 처리</h3></div>
          <div class="patch-list" style="max-height:320px;overflow-y:auto">

  const info = PARTY_INFO[partyName];
  const infoBox = info ? `

function renderGrid() {
  const q = state.search.trim().toLowerCase();
  const filtered = state.members.filter(m => {
    if (state.filterParty && m.POLY_NM !== state.filterParty) return false;
    if (!q) return true;
    return (
      (m.HG_NM || '').toLowerCase().includes(q) ||
      (m.ORIG_NM || '').toLowerCase().includes(q) ||
      (m.POLY_NM || '').toLowerCase().includes(q) ||
      (m.CMIT_NM || '').toLowerCase().includes(q) ||
      (m._type_label || '').toLowerCase().includes(q)
    );
  });

  document.getElementById('stat-shown').textContent = filtered.length;

  if (filtered.length === 0) {
    return '<div class="empty">검색 결과가 없습니다.</div>';
  }

  // 검색 모드에선 그룹별로 묶기
  if (q) {
    const byGroup = new Map();
    for (const m of filtered) {
      const g = m._group || 'legislative';
      if (!byGroup.has(g)) byGroup.set(g, []);
      byGroup.get(g).push(m);
    }
    const sections = GROUP_ORDER.filter(g => byGroup.has(g)).map(g => {
      const arr = byGroup.get(g);
      const gInfo = GROUPS[g];
      return `
        <div class="sub-section">
          <h2><span style="opacity:0.5">${gInfo.icon}</span> ${escapeHtml(gInfo.name)} <span class="cnt">${arr.length}명</span></h2>
          <div class="grid">${arr.slice(0, 30).map(memberCardHTML).join('')}</div>
          ${arr.length > 30 ? `<div style="text-align:center;color:var(--dim);padding:10px;font-size:11px">…외 ${arr.length - 30}명</div>` : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="result-meta">"<b>${escapeHtml(state.search)}</b>" 검색 — ${filtered.length}건</div>
      ${sections}
    `;
  }

  const cards = filtered.map(m => {
    const color = partyColor(m.POLY_NM);
    const initial = (m.HG_NM || '?').charAt(0);
    const photo = state.photos.get(m.MONA_CD);
    const avatar = (photo && photo.thumb)
      ? `<img src="${escapeHtml(photo.thumb)}" loading="lazy" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
      : escapeHtml(initial);
    return `
      <div class="card" data-id="${escapeHtml(m.MONA_CD)}">
        <div class="card-bar" style="background:${color}"></div>
        <div class="card-body">
          <div class="avatar">${avatar}</div>
          <div class="card-meta">
            <div class="card-name">${escapeHtml(m.HG_NM)}</div>
            <div class="card-party" style="color:${color}">${escapeHtml(m.POLY_NM || '—')}</div>
            <div class="card-sub">${escapeHtml(m.ORIG_NM || '—')}</div>
          </div>
        </div>
        <div class="card-foot">
          <span>${escapeHtml(m.REELE_GBN_NM || '')}</span>
          <span class="badge">${escapeHtml(m.CMIT_NM || '비위원')}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="result-meta"><b>${filtered.length}</b>명 표시 (전체 <b>${state.members.length}</b>명)</div>
    <div class="grid">${cards}</div>
  `;
}
