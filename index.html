<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Politik · 한눈국회</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🏛%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #fafafa;
    --bg-card: #ffffff;
    --bg-elev: #f4f5f7;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text: #111827;
    --text-2: #4b5563;
    --dim: #9ca3af;
    --accent: #111827;
    --link: #1e40af;
    --ok: #059669;
    --warn: #d97706;

    /* 정당 색 */
    --party-민주: #004EA2;
    --party-국힘: #E61E2B;
    --party-조국: #082B5C;
    --party-개혁: #FF7920;
    --party-진보: #D6001C;
    --party-미래: #00B5E2;
    --party-기사자: #FED73B;
    --party-사회민주: #43A5DC;
    --party-기타: #6b7280;
    --party-무소속: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============ Header ============ */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .h-inner {
    max-width: 1280px; margin: 0 auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px; align-items: center;
  }
  .brand {
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .brand-logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #111827, #4b5563);
    border-radius: 6px;
    color: #fff; display: grid; place-items: center;
    font-size: 14px; font-weight: 900;
  }
  .brand-sub {
    font-size: 11px; color: var(--dim);
    font-weight: 500; letter-spacing: 0.5px;
  }
  .search-wrap {
    position: relative; max-width: 480px;
    width: 100%;
  }
  .search {
    width: 100%; padding: 9px 14px 9px 36px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font: inherit; font-size: 13px;
    background: var(--bg-card);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(17,24,39,0.08); }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--dim); pointer-events: none;
  }
  .nav-stats {
    display: flex; gap: 16px; font-size: 11px; color: var(--dim);
  }
  .nav-stats b { color: var(--text); font-weight: 600; font-size: 13px; }

  /* ============ Filters ============ */
  .filter-bar {
    max-width: 1280px; margin: 0 auto;
    padding: 14px 24px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 11px; color: var(--dim);
    letter-spacing: 1px; text-transform: uppercase;
    margin-right: 4px;
  }
  .chip {
    padding: 5px 11px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    border-radius: 20px;
    font: inherit; font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.12s;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chip .cnt { color: var(--dim); font-size: 10px; }
  .chip.active .cnt { color: rgba(255,255,255,0.6); }

  /* ============ Main ============ */
  main { max-width: 1280px; margin: 0 auto; padding: 20px 24px 80px; }
  .result-meta {
    color: var(--dim); font-size: 12px;
    margin: 6px 0 18px; letter-spacing: 0.3px;
  }
  .result-meta b { color: var(--text); font-weight: 600; }

  /* ============ Grid ============ */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    display: flex; flex-direction: column;
    position: relative;
  }
  .card:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    border-color: var(--border-strong);
  }
  .card-bar {
    height: 4px; width: 100%;
    background: var(--party-기타);
  }
  .card-body { padding: 14px 14px 12px; flex: 1; display: flex; gap: 12px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--bg-elev);
    display: grid; place-items: center;
    font-size: 18px; font-weight: 600;
    color: var(--text-2);
    flex-shrink: 0;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .d-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px; font-weight: 700;
    margin-bottom: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-sub {
    font-size: 11px; color: var(--text-2);
    line-height: 1.4;
  }
  .card-party {
    font-weight: 600; font-size: 11px;
    margin-bottom: 2px;
  }
  .card-foot {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--dim);
    letter-spacing: 0.3px;
  }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    background: var(--bg-elev);
    border-radius: 3px;
    font-size: 9px;
    color: var(--text-2);
    font-weight: 600;
  }

  /* ============ Org chart (home) ============ */
  .org {
    padding: 8px 0 0;
  }
  .org-hero {
    text-align: center;
    padding: 28px 16px 32px;
    margin-bottom: 8px;
  }
  .org-hero h1 {
    font-size: 32px; font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .org-hero .sub {
    font-size: 13px; color: var(--text-2);
    letter-spacing: 0.3px;
  }
  .org-hero .meta {
    margin-top: 14px; font-size: 11px; color: var(--dim);
  }
  .org-hero .meta b { color: var(--text); font-weight: 600; font-size: 13px; margin: 0 4px; }
  .org-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }
  .org-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    display: flex; flex-direction: column;
  }
  .org-box:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    border-color: var(--border-strong);
  }
  .org-box-head {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 14px; align-items: center;
  }
  .org-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-2) 100%);
    color: #fff;
    display: grid; place-items: center;
    font-size: 26px;
  }
  .org-name {
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.3px;
  }
  .org-desc {
    font-size: 11px; color: var(--text-2);
    margin-top: 2px;
  }
  .org-count {
    font-size: 24px; font-weight: 800;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .org-count-unit { font-size: 10px; color: var(--dim); display: block; text-align: right; }
  .org-box-body { padding: 14px 16px 14px; flex: 1; }
  .org-sub-list {
    display: grid; gap: 6px;
    font-size: 11px;
    margin-bottom: 12px;
  }
  .org-sub-list .sub-row {
    display: flex; justify-content: space-between;
    color: var(--text-2);
  }
  .org-sub-list .sub-row b { color: var(--text); font-weight: 600; }
  .org-preview {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding-top: 8px; border-top: 1px solid var(--border);
  }
  .org-preview-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-elev);
    overflow: hidden;
    border: 1px solid var(--border);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
    color: var(--text-2);
  }
  .org-preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .org-box-foot {
    padding: 12px 18px;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-2);
  }
  .org-box-foot .arrow { color: var(--accent); font-weight: 600; }

  /* Group page header */
  .group-header {
    padding: 8px 0 18px;
    display: flex; gap: 16px; align-items: flex-start;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .group-header .icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--text); color: #fff;
    display: grid; place-items: center; font-size: 26px;
    flex-shrink: 0;
  }
  .group-header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .group-header .sub { font-size: 12px; color: var(--dim); }
  .group-header .counts { margin-top: 6px; font-size: 11px; color: var(--text-2); }
  .group-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-2); font-size: 13px;
    margin-bottom: 14px;
  }
  .group-back:hover { color: var(--text); }
  .sub-section { margin-bottom: 36px; }
  .sub-section h2 {
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--dim); font-weight: 600;
    padding-bottom: 8px; margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .sub-section h2 .cnt { color: var(--text-2); font-size: 11px; font-weight: 500; letter-spacing: 0.5px; }

  /* ============ Detail ============ */
  .detail {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .d-hero {
    padding: 32px 32px 28px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 28px; align-items: flex-start;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .d-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: var(--party-기타);
  }
  .d-avatar {
    width: 110px; height: 110px; border-radius: 50%;
    background: var(--bg-elev);
    display: grid; place-items: center;
    font-size: 44px; font-weight: 600;
    color: var(--text-2);
    border: 2px solid var(--border);
    overflow: hidden;
  }
  .d-info h1 {
    font-size: 30px; font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 4px;
    display: flex; align-items: baseline; gap: 12px;
  }
  .d-info h1 .hj {
    font-size: 16px; color: var(--dim); font-weight: 400;
  }
  .d-info .d-party {
    font-size: 14px; font-weight: 700; margin-bottom: 12px;
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }
  .role-badge {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid currentColor;
    border-radius: 11px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.3px;
    background: rgba(0,0,0,0.02);
  }
  .d-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    margin-top: 16px;
  }
  .d-stat {
    background: var(--bg-elev);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .d-stat-label {
    font-size: 10px; color: var(--dim);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 2px;
  }
  .d-stat-value {
    font-size: 15px; font-weight: 600; color: var(--text);
  }
  .d-body { padding: 28px 32px; }
  .d-section { margin-bottom: 32px; }
  .d-section h2 {
    font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--dim); font-weight: 600;
    padding-bottom: 8px; margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .d-list { display: grid; gap: 8px; font-size: 13px; }
  .d-row { display: grid; grid-template-columns: 100px 1fr; gap: 16px; }
  .d-row .k { color: var(--dim); font-size: 12px; }
  .d-row .v { color: var(--text); }
  .d-career {
    font-size: 13px; line-height: 1.7;
    color: var(--text-2);
    white-space: pre-wrap;
  }
  .d-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-2); font-size: 13px;
    margin-bottom: 18px;
    cursor: pointer;
  }
  .d-back:hover { color: var(--text); }
  .colleagues {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }
  .col-card {
    padding: 10px;
    background: var(--bg-elev);
    border-radius: 8px;
    display: flex; gap: 10px; align-items: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .col-card:hover { background: var(--border); }
  .col-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-card);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
  }
  .col-info { min-width: 0; flex: 1; }
  .col-name { font-size: 12px; font-weight: 600; }
  .col-party { font-size: 10px; color: var(--dim); }
  .bill-row {
    display: grid; grid-template-columns: 90px 1fr 90px; gap: 12px;
    align-items: baseline; padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .bill-row:last-child { border-bottom: 0; }
  .bill-date { color: var(--dim); font-size: 11px; font-variant-numeric: tabular-nums; }
  .bill-name { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bill-result { font-size: 11px; font-weight: 600; text-align: right; }

  /* ============ Loading / Empty ============ */
  .loading, .empty {
    padding: 80px 20px; text-align: center;
    color: var(--dim); font-size: 13px;
  }
  .loading-spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--text);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 10px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px;
    text-align: center; font-size: 11px;
    color: var(--dim);
    margin-top: 60px;
  }
  footer a { color: var(--text-2); }

  @media (max-width: 600px) {
    .h-inner { grid-template-columns: 1fr; gap: 10px; }
    .nav-stats { justify-content: flex-end; }
    .d-hero { grid-template-columns: 1fr; padding: 24px 20px; }
    .d-avatar { width: 80px; height: 80px; font-size: 32px; }
    .d-info h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<header>
  <div class="h-inner">
    <div class="brand" id="brand">
      <span class="brand-logo">P</span>
      <div>
        Politik
        <div class="brand-sub">한눈국회 · v0.1</div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search" id="search" placeholder="이름·지역구·정당으로 검색...">
    </div>
    <div class="nav-stats">
      <div><b id="stat-total">—</b> 등록</div>
      <div><b id="stat-shown">—</b> 표시</div>
    </div>
  </div>
</header>
<div class="filter-bar" id="filter-bar"></div>

<main id="view">
  <div class="loading"><span class="loading-spinner"></span>국회 데이터 불러오는 중…</div>
</main>

<footer>
  데이터: <a href="https://open.assembly.go.kr" target="_blank">국회 OPEN API</a> · 위키미디어 ·
  마지막 동기화 <span id="last-sync">—</span> ·
  본 사이트는 객관 수치만 표시하며 평가/의견을 포함하지 않습니다.
</footer>

<script>
'use strict';

// ============================================================
// 국회 OPEN API — Service IDs (모두 KEY 필요)
// ============================================================
const API_KEY = '3aac055cce1641f2b5f1b9b359ec5957';
const API_HOST = 'https://open.assembly.go.kr/portal/openapi';
const SVC = {
  members:        'nwvrqwxyaytdsfvhu', // 국회의원 인적사항 (현직)
  committees:     'nktulghcadyhmiqxi', // 위원회 명단
  bills:          'nzmimeepazxkubdpn', // 의안 정보 (AGE 필수)
  bills_processed:'ncocpgfiaoituanbr', // 본회의 처리 의안 (AGE 필수)
};
const ASSEMBLY_AGE = 22;
const CACHE_KEY_MEMBERS = 'politik:members:v2';
const CACHE_KEY_BILLS   = 'politik:bills:v2';
const CACHE_KEY_PHOTOS  = 'politik:photos:v2';
const CACHE_TTL = 24 * 3600 * 1000; // 24h

// 통합 schema 변환
function normalizeAssemblyMember(m) {
  return {
    id: 'kr.assembly.22.' + m.MONA_CD,
    type: 'assembly_member',
    type_label: '국회의원',
    name_ko: m.HG_NM,
    name_hj: m.HJ_NM,
    name_en: m.ENG_NM,
    party: m.POLY_NM,
    role: '제22대 국회의원',
    region: m.ORIG_NM,
    committee: m.CMIT_NM,
    term_label: m.REELE_GBN_NM,
    elect_kind: m.ELECT_GBN_NM,
    bth_date: m.BTH_DATE,
    sex: m.SEX_GBN_NM,
    email: m.E_MAIL,
    phone: m.TEL_NO,
    homepage: m.HOMEPAGE,
    addr: m.ASSEM_ADDR,
    staff: m.STAFF,
    secretary: m.SECRETARY,
    secretary2: m.SECRETARY2,
    career: m.MEM_TITLE,
    mona_cd: m.MONA_CD,
    wiki: m.HG_NM,
    _raw: m,
  };
}
function normalizeExtraPerson(p) {
  return {
    ...p,
    name_ko: p.name_ko,
    party: p.party || null,
    wiki: p.wiki || p.name_ko,
  };
}

function apiUrl(serviceId, params = {}) {
  const qs = new URLSearchParams({ KEY: API_KEY, Type: 'json', pIndex: '1', pSize: '1000', ...params });
  return `${API_HOST}/${serviceId}?${qs}`;
}
async function fetchService(serviceId, params = {}) {
  const r = await fetch(apiUrl(serviceId, params));
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  const root = j[serviceId];
  if (!root) throw new Error('unexpected shape');
  const result = root[0]?.head?.[0]?.RESULT;
  if (result && result.CODE !== 'INFO-000') throw new Error(result.MESSAGE);
  return {
    rows: root[1]?.row || [],
    total: root[0]?.head?.[0]?.list_total_count || 0,
  };
}

// 정당명 → 색 변수 매핑
const PARTY_COLOR = {
  '더불어민주당': 'var(--party-민주)',
  '국민의힘':      'var(--party-국힘)',
  '조국혁신당':    'var(--party-조국)',
  '개혁신당':      'var(--party-개혁)',
  '진보당':        'var(--party-진보)',
  '새로운미래':    'var(--party-미래)',

async function loadMembers() {
  try {
    const raw = localStorage.getItem(CACHE_KEY_MEMBERS);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < CACHE_TTL) return { data: c.data, fromCache: true, syncedAt: c.t };
    }
  } catch {}
  // 키 있으면 1회 호출로 전체
  const { rows } = await fetchService(SVC.members);
  const seen = new Set();
  const data = rows.filter(m => {
    if (!m.MONA_CD || seen.has(m.MONA_CD)) return false;
    seen.add(m.MONA_CD); return true;
  });
  try { localStorage.setItem(CACHE_KEY_MEMBERS, JSON.stringify({ t: Date.now(), data })); } catch {}
  return { data, fromCache: false, syncedAt: Date.now() };
}

// 역대 국회의원 (위키 카테고리에서 lazy load)
async function loadHistoricalAssembly(age) {
  const cat = `Category:대한민국의_제${age}대_국회의원`;
  const url = `https://ko.wikipedia.org/w/api.php?action=query&list=categorymembers&cmtitle=${encodeURIComponent(cat)}&cmlimit=500&format=json&origin=*`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const j = await r.json();
    return (j.query?.categorymembers || [])
      .filter(m => m.ns === 0 && !m.title.endsWith('목록') && !m.title.endsWith('선거'))
      .map(m => {
        const name = m.title.replace(/_?\(.+\)$/, '').trim();
        return {
          MONA_CD: `kr.assembly.${age}.${m.title.replace(/\s/g, '_')}`,
          HG_NM: name,
          HJ_NM: '',
          ENG_NM: '',
          POLY_NM: '—',
          ORIG_NM: `제${age}대 국회의원`,
          CMIT_NM: '',
          REELE_GBN_NM: '역대',
          ELECT_GBN_NM: '역대 의원',
          BTH_DATE: '',
          SEX_GBN_NM: '',
          MEM_TITLE: `대한민국 제${age}대 국회의원 (위키미디어 분류 기반)`,
          TEL_NO: '', E_MAIL: '', HOMEPAGE: '', ASSEM_ADDR: '',
          STAFF: '', SECRETARY: '', SECRETARY2: '',
          UNITS: '',
          _type: 'former_member',
          _type_label: `제${age}대 의원`,
          _group: 'historical',
          _wiki: m.title.replace(/\s/g, '_'),
          _age: age,
        };
      });
  } catch { return []; }
}

let _historicalLoaded = new Set();
async function ensureHistoricalAssemblies(ages = []) {
  let changed = false;
  for (const age of ages) {
    if (_historicalLoaded.has(age)) continue;
    const arr = await loadHistoricalAssembly(age);
    if (arr.length) {
      state.members = state.members.concat(arr);
      _historicalLoaded.add(age);
      changed = true;
    }
  }
  return changed;
}

// 본회의 처리 의안 (22대) — 의원/위원회 페이지에서 사용
async function loadProcessedBills() {
  try {
    const raw = localStorage.getItem(CACHE_KEY_BILLS);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < CACHE_TTL) return c.data;
    }
  } catch {}
  // 데이터가 ~1.6K 건 → pSize 1000으로 2 페이지면 충분
  const p1 = await fetchService(SVC.bills_processed, { AGE: ASSEMBLY_AGE, pIndex: 1, pSize: 1000 });
  let all = p1.rows.slice();
  if (p1.total > 1000) {
    const pages = Math.ceil(p1.total / 1000);
    const more = await Promise.all(
      Array.from({length: pages - 1}, (_, i) =>
        fetchService(SVC.bills_processed, { AGE: ASSEMBLY_AGE, pIndex: i + 2, pSize: 1000 }).then(r => r.rows).catch(() => [])
      )
    );
    all = all.concat(more.flat());
  }
  try { localStorage.setItem(CACHE_KEY_BILLS, JSON.stringify({ t: Date.now(), data: all })); } catch {}
  return all;
}

// 위키미디어에서 인물 사진 찾기 (제목 일치 검증으로 노이즈 거름)
async function findPortrait(hgnm) {
  // hgnm은 이름 또는 위키 슬러그 ("이재명_(1964년)" 같이 disambiguation 포함 가능)
  const baseName = hgnm.replace(/_?\(.+\)$/, '').trim();
  function titleMatches(pageTitle) {
    if (!pageTitle) return false;
    const t = pageTitle.trim();
    return t === baseName || t === hgnm || t.startsWith(baseName + ' (') || t.startsWith(baseName + '_(');
  }
  // 1) 직접 페이지 (full slug 시도)
  try {
    const url = `https://ko.wikipedia.org/w/api.php?action=query&prop=pageimages&piprop=thumbnail&pithumbsize=240&titles=${encodeURIComponent(hgnm)}&format=json&origin=*&redirects=1`;
    const j = await (await fetch(url)).json();
    for (const k of Object.keys(j.query?.pages || {})) {
      const p = j.query.pages[k];
      if (p.thumbnail?.source && titleMatches(p.title)) return { thumb: p.thumbnail.source, title: p.title };
    }
  } catch {}
  // 2) 검색에서 제목 정확 일치한 페이지
  try {
    const url = `https://ko.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(baseName + ' 정치인')}&gsrlimit=8&prop=pageimages&piprop=thumbnail&pithumbsize=240&format=json&origin=*`;
    const j = await (await fetch(url)).json();
    for (const k of Object.keys(j.query?.pages || {})) {
      const p = j.query.pages[k];
      if (p.thumbnail?.source && titleMatches(p.title)) return { thumb: p.thumbnail.source, title: p.title };
    }
  } catch {}
  return null;
}

async function ensurePhoto(member) {
  if (!member?.MONA_CD || !member?.HG_NM) return null;
  if (state.photos.has(member.MONA_CD)) return state.photos.get(member.MONA_CD);
  const wikiQuery = member._wiki || member.HG_NM;
  const r = await findPortrait(wikiQuery);
  const entry = r || { miss: true, t: Date.now() };
  state.photos.set(member.MONA_CD, entry);
  // throttled save
  clearTimeout(savePhotoCache._t);
  savePhotoCache._t = setTimeout(savePhotoCache, 1500);
  return entry;
}

// 화면에 보이는 카드들의 사진 백그라운드 프리페치 (3 concurrent)
async function prefetchPhotos(members, concurrency = 3) {
  let i = 0;
  async function worker() {
    while (i < members.length) {
      const idx = i++;
      const m = members[idx];
      if (!m || state.photos.has(m.MONA_CD)) continue;
      try {
        await ensurePhoto(m);
        const cardImg = document.querySelector(`.card[data-id="${m.MONA_CD}"] .avatar img`);
        const entry = state.photos.get(m.MONA_CD);
        if (cardImg && entry?.thumb) cardImg.src = entry.thumb;
      } catch {}
    }
  }
  await Promise.all(Array.from({length: concurrency}, worker));
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}
function termAbbr(reele) {
  if (!reele) return '';
  return reele.replace(/^([가-힣])선$/, '$1선');
}
function regionShort(orig) {
  if (!orig) return '';
  if (orig === '비례대표') return '비례';
  return orig.replace(/[광역시도시군구]/g, '').slice(0, 10) || orig;
}

function groupMembers() {
  const groups = {};
  for (const m of state.members) {
    const g = m._group || 'legislative';
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  }
  return groups;
}

  // 그룹별 미리보기 아바타 5명 추출 (사진 있는 우선)
  function topPreview(arr, n = 6) {
    const withPhoto = arr.filter(m => state.photos.get(m.MONA_CD)?.thumb);
    const rest = arr.filter(m => !state.photos.get(m.MONA_CD)?.thumb);
    return [...withPhoto, ...rest].slice(0, n);

  const boxes = GROUP_ORDER.map(gid => {
    const g = GROUPS[gid];

    const previews = topPreview(members);

    if (gid === 'legislative') {
      const byParty = new Map();
      for (const m of members) byParty.set(m.POLY_NM, (byParty.get(m.POLY_NM)||0)+1);
      const top = [...byParty.entries()].sort((a,b) => b[1]-a[1]).slice(0, 4);
      subList = top.map(([p, c]) => `<div class="sub-row party-link" data-party="${escapeHtml(p)}" style="cursor:pointer"><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${partyColor(p)};margin-right:6px;vertical-align:middle"></span>${escapeHtml(p)}</span><b>${c}</b></div>`).join('');

      for (const m of members) byType.set(m._type, (byType.get(m._type)||0)+1);
      subList = (TYPE_ORDER[gid] || [...byType.keys()])
        .filter(t => byType.has(t))
        .map(t => `<div class="sub-row"><span>${escapeHtml(TYPE_GROUP_LABEL[t]||t)}</span><b>${byType.get(t)}명</b></div>`).join('');

      <div class="org-box" data-group="${gid}">

          <div>

          <div>
            <div class="org-count">${members.length}</div>

      byParty.get(p).push(m);

  const avatar = (photo && photo.thumb)
    ? `<img src="${escapeHtml(photo.thumb)}" loading="lazy" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
    : escapeHtml(initial);
  return `
    <div class="card" data-id="${escapeHtml(m.MONA_CD)}">
      <div class="card-bar" style="background:${color}"></div>
      <div class="card-body">
        <div class="avatar">${avatar}</div>
        <div class="card-meta">
          <div class="card-name">${escapeHtml(m.HG_NM)}</div>
          <div class="card-party" style="color:${color}">${escapeHtml(m.POLY_NM || '—')}</div>
          <div class="card-sub">${escapeHtml(m.ORIG_NM || '—')}</div>
        </div>
      </div>
      <div class="card-foot">
        <span>${escapeHtml(m.REELE_GBN_NM || m._type_label || '')}</span>
        <span class="badge">${escapeHtml(m.CMIT_NM || '—')}</span>
      </div>
    </div>
  `;
}

function renderGrid() {
  const q = state.search.trim().toLowerCase();
  const filtered = state.members.filter(m => {
    if (state.filterParty && m.POLY_NM !== state.filterParty) return false;
    if (!q) return true;
    return (
      (m.HG_NM || '').toLowerCase().includes(q) ||
      (m.ORIG_NM || '').toLowerCase().includes(q) ||
      (m.POLY_NM || '').toLowerCase().includes(q) ||
      (m.CMIT_NM || '').toLowerCase().includes(q)
    );
  });

  document.getElementById('stat-shown').textContent = filtered.length;

  if (filtered.length === 0) {
    return '<div class="empty">검색 결과가 없습니다.</div>';
  }

  const cards = filtered.map(m => {
    const color = partyColor(m.POLY_NM);
    const initial = (m.HG_NM || '?').charAt(0);
    const photo = state.photos.get(m.MONA_CD);
    const avatar = (photo && photo.thumb)
      ? `<img src="${escapeHtml(photo.thumb)}" loading="lazy" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
      : escapeHtml(initial);
    return `
      <div class="card" data-id="${escapeHtml(m.MONA_CD)}">
        <div class="card-bar" style="background:${color}"></div>
        <div class="card-body">
          <div class="avatar">${avatar}</div>
          <div class="card-meta">
            <div class="card-name">${escapeHtml(m.HG_NM)}</div>
            <div class="card-party" style="color:${color}">${escapeHtml(m.POLY_NM || '—')}</div>
            <div class="card-sub">${escapeHtml(m.ORIG_NM || '—')}</div>
          </div>
        </div>
        <div class="card-foot">
          <span>${escapeHtml(m.REELE_GBN_NM || '')}</span>
          <span class="badge">${escapeHtml(m.CMIT_NM || '비위원')}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="result-meta"><b>${filtered.length}</b>명 표시 (전체 <b>${state.members.length}</b>명)</div>
    <div class="grid">${cards}</div>
  `;
}

// ============================================================
// Render: Detail
// ============================================================
function renderDetail(id) {
  const m = state.members.find(x => x.MONA_CD === id);
  if (!m) return '<div class="empty">해당 의원을 찾을 수 없습니다.</div>';

  const color = partyColor(m.POLY_NM);
  const initial = (m.HG_NM || '?').charAt(0);
  const bornYear = (m.BTH_DATE || '').slice(0, 4);
  const age = bornYear ? new Date().getFullYear() - parseInt(bornYear, 10) : '—';
  const photo = state.photos.get(m.MONA_CD);
  const dAvatarInner = (photo && photo.thumb)
    ? `<img src="${escapeHtml(photo.thumb)}" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
    : escapeHtml(initial);

  // 정당 직책 확인 (mp_name 일치)
  const partyRolesForThis = [];
  if (m.POLY_NM && PARTY_ROLES[m.POLY_NM]) {
    for (const r of PARTY_ROLES[m.POLY_NM]) {
      if (r.mp_name === m.HG_NM) partyRolesForThis.push(r);
    }
  }

  // 동료 (같은 상임위)
  const colleagues = state.members.filter(x =>
    x.MONA_CD !== m.MONA_CD &&
    x.CMIT_NM === m.CMIT_NM &&
    m.CMIT_NM
  ).slice(0, 12);

  const colleaguesHtml = colleagues.length ? `
    <div class="d-section">
      <h2>같은 상임위 (${escapeHtml(m.CMIT_NM)}) · ${colleagues.length}명</h2>
      <div class="colleagues">
        ${colleagues.map(c => `
          <div class="col-card" data-id="${escapeHtml(c.MONA_CD)}">
            <div class="col-avatar" style="color:${partyColor(c.POLY_NM)}">${escapeHtml((c.HG_NM||'?').charAt(0))}</div>
            <div class="col-info">
              <div class="col-name">${escapeHtml(c.HG_NM)}</div>
              <div class="col-party">${escapeHtml(c.POLY_NM || '—')}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  // 위원회별 본회의 처리 법안
  const cmtBills = m.CMIT_NM ? (state.billsByCommittee.get(m.CMIT_NM) || []) : [];
  const passed = cmtBills.filter(b => /가결/.test(b.PROC_RESULT_CD || '')).length;
  const rejected = cmtBills.filter(b => /부결|폐기/.test(b.PROC_RESULT_CD || '')).length;
  const billsHtml = cmtBills.length ? `
    <div class="d-section">
      <h2>${escapeHtml(m.CMIT_NM)}가 22대에 본회의 처리 — ${cmtBills.length}건</h2>
      <div class="d-grid" style="margin-bottom:14px;">
        <div class="d-stat"><div class="d-stat-label">가결</div><div class="d-stat-value" style="color:var(--ok)">${passed}</div></div>
        <div class="d-stat"><div class="d-stat-label">부결·폐기</div><div class="d-stat-value" style="color:#c0392b">${rejected}</div></div>
        <div class="d-stat"><div class="d-stat-label">기타</div><div class="d-stat-value">${cmtBills.length - passed - rejected}</div></div>
      </div>
      <div class="d-list">
        ${cmtBills.slice(0, 10).map(b => `
          <div class="bill-row">
            <div class="bill-date">${escapeHtml((b.PROC_DT || '').slice(0,10))}</div>
            <div class="bill-name">${escapeHtml(b.BILL_NAME || b.BILL_NM || '')}</div>
            <div class="bill-result" style="color:${PROC_RESULT_COLOR[b.PROC_RESULT_CD] || 'var(--text-2)'}">${escapeHtml(b.PROC_RESULT_CD || '—')}</div>
          </div>
        `).join('')}
      </div>
      ${cmtBills.length > 10 ? `<div style="font-size:11px;color:var(--dim);margin-top:8px;text-align:right">…외 ${cmtBills.length - 10}건</div>` : ''}
    </div>
  ` : '';

  return `
    <div class="d-back" id="back-btn">← 의원 목록</div>
    <div class="detail">
      <div class="d-hero">
        <div class="d-bar" style="background:${color}"></div>
        <div class="d-avatar">${dAvatarInner}</div>
        <div class="d-info">
          <h1>${escapeHtml(m.HG_NM)} <span class="hj">${escapeHtml(m.HJ_NM || '')}</span></h1>
          <div class="d-party" style="color:${color}">
            ${escapeHtml(m.POLY_NM || '—')}
            ${partyRolesForThis.map(r => `<span class="role-badge" style="border-color:${color};color:${color}">${escapeHtml(r.role)}</span>`).join('')}
          </div>
          <div class="d-grid">
            <div class="d-stat"><div class="d-stat-label">지역구</div><div class="d-stat-value">${escapeHtml(m.ORIG_NM || '—')}</div></div>
            <div class="d-stat"><div class="d-stat-label">선거구분</div><div class="d-stat-value">${escapeHtml(m.ELECT_GBN_NM || '—')}</div></div>
            <div class="d-stat"><div class="d-stat-label">선수</div><div class="d-stat-value">${escapeHtml(m.REELE_GBN_NM || '—')}</div></div>
            <div class="d-stat"><div class="d-stat-label">생년 (만)</div><div class="d-stat-value">${bornYear || '—'} (${age})</div></div>
            <div class="d-stat"><div class="d-stat-label">성별</div><div class="d-stat-value">${escapeHtml(m.SEX_GBN_NM || '—')}</div></div>
            <div class="d-stat"><div class="d-stat-label">상임위</div><div class="d-stat-value">${escapeHtml(m.CMIT_NM || '—')}</div></div>
          </div>
        </div>
      </div>
      <div class="d-body">
        <div class="d-section">
          <h2>연락처 · 사무실</h2>
          <div class="d-list">
            <div class="d-row"><span class="k">의원회관</span><span class="v">${escapeHtml(m.ASSEM_ADDR || '—')}</span></div>
            <div class="d-row"><span class="k">전화</span><span class="v">${escapeHtml(m.TEL_NO || '—')}</span></div>
            <div class="d-row"><span class="k">이메일</span><span class="v">${m.E_MAIL ? `<a href="mailto:${escapeHtml(m.E_MAIL)}">${escapeHtml(m.E_MAIL)}</a>` : '—'}</span></div>
            <div class="d-row"><span class="k">홈페이지</span><span class="v">${m.HOMEPAGE ? `<a href="${escapeHtml(m.HOMEPAGE)}" target="_blank" rel="noopener">${escapeHtml(m.HOMEPAGE)}</a>` : '—'}</span></div>
          </div>
        </div>
        ${m.STAFF || m.SECRETARY || m.SECRETARY2 ? `
        <div class="d-section">
          <h2>보좌진</h2>
          <div class="d-list">
            ${m.STAFF      ? `<div class="d-row"><span class="k">보좌관</span><span class="v">${escapeHtml(m.STAFF)}</span></div>` : ''}
            ${m.SECRETARY  ? `<div class="d-row"><span class="k">선임비서관</span><span class="v">${escapeHtml(m.SECRETARY)}</span></div>` : ''}
            ${m.SECRETARY2 ? `<div class="d-row"><span class="k">비서</span><span class="v">${escapeHtml(m.SECRETARY2)}</span></div>` : ''}
          </div>
        </div>` : ''}
        ${m.MEM_TITLE ? `
        <div class="d-section">
          <h2>약력</h2>
          <div class="d-career">${escapeHtml(m.MEM_TITLE)}</div>
        </div>` : ''}
        ${billsHtml}
        ${colleaguesHtml}
        <div class="d-section">
          <h2>출처</h2>
          <div class="d-list">
            <div class="d-row"><span class="k">기본 정보</span><span class="v"><a href="https://open.assembly.go.kr" target="_blank">국회 OPEN API · 국회의원 인적사항</a></span></div>
            <div class="d-row"><span class="k">위키</span><span class="v"><a href="https://ko.wikipedia.org/wiki/${encodeURIComponent(m.HG_NM)}" target="_blank">한국어 위키 검색 →</a></span></div>
            <div class="d-row"><span class="k">의원 코드</span><span class="v" style="font-family:monospace;font-size:11px;color:var(--dim)">${escapeHtml(m.MONA_CD)}</span></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// Filter bar (party chips)
// ============================================================
function renderFilters() {
  state.partyCounts.clear();
  for (const m of state.members) {
    const p = m.POLY_NM || '무소속';
    state.partyCounts.set(p, (state.partyCounts.get(p) || 0) + 1);
  }
  // sort by count desc
  const parties = [...state.partyCounts.entries()].sort((a,b) => b[1] - a[1]);
  const total = state.members.length;
  const html = [
    `<span class="filter-label">정당</span>`,
    `<span class="chip ${state.filterParty === null ? 'active' : ''}" data-party="">전체 <span class="cnt">${total}</span></span>`,
    ...parties.map(([p, n]) => `
      <span class="chip ${state.filterParty === p ? 'active' : ''}" data-party="${escapeHtml(p)}">
        <span class="dot" style="background:${partyColor(p)}"></span>
        ${escapeHtml(p)} <span class="cnt">${n}</span>
      </span>
    `),
  ].join('');
  document.getElementById('filter-bar').innerHTML = html;
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      const p = el.dataset.party;
      if (!p) {
        state.filterParty = null;
        location.hash = '';
        renderFilters(); route();
      } else {
        location.hash = `#/party/${encodeURIComponent(p)}`;
      }
    });
  });
}

// ============================================================
// Routing
// ============================================================
function route() {
  const view = document.getElementById('view');
  const hash = location.hash || '';
  const filterBar = document.getElementById('filter-bar');
  const navStats = document.querySelector('.nav-stats');

  // 정당 페이지
  const pMatch = hash.match(/^#\/party\/(.+)$/);
  if (pMatch) {
    const partyName = decodeURIComponent(pMatch[1]);
    view.innerHTML = renderPartyPage(partyName);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => m.POLY_NM === partyName && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    return;
  }
  // 그룹 페이지
  const gMatch = hash.match(/^#\/group\/(\w+)$/);
  if (gMatch) {
    const gid = gMatch[1];
    view.innerHTML = renderGroupPage(gid);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => (m._group || 'legislative') === gid && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    // historical 그룹: 위키에서 역대 의원 lazy load
    if (gid === 'historical') {
      ensureHistoricalAssemblies([21, 20]).then(changed => {
        if (changed && location.hash === `#/group/historical`) route();
      });
    }
    return;
  }
  const m = hash.match(/^#\/m\/(.+)$/);
  if (m) {
    const memberId = decodeURIComponent(m[1]);
    view.innerHTML = renderDetail(memberId);
    document.getElementById('back-btn')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.col-card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    window.scrollTo(0, 0);
    // 사진 없으면 비동기로 가져오고 재렌더
    const member = state.members.find(x => x.MONA_CD === memberId);
    if (member && !state.photos.has(member.MONA_CD)) {
      ensurePhoto(member).then(() => {
        if (location.hash.endsWith(memberId)) route();
      });
    }
    // 같은 위원회 동료들의 사진도 백그라운드 프리페치
    if (member?.CMIT_NM) {
      const cols = state.members.filter(x => x.CMIT_NM === member.CMIT_NM && !state.photos.has(x.MONA_CD)).slice(0, 12);
      prefetchPhotos(cols, 3);
    }
  } else {
    // 홈 = 조직도 또는 검색 시 그리드
    if (state.search.trim() || state.filterParty) {
      view.innerHTML = renderGrid();
      document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
      });
      const visible = state.members
        .filter(m => !state.filterParty || m.POLY_NM === state.filterParty)
        .filter(m => !state.photos.has(m.MONA_CD))
        .slice(0, 30);
      prefetchPhotos(visible, 3);
      if (filterBar) filterBar.style.display = '';
    } else {
      view.innerHTML = renderHome();
      document.querySelectorAll('.org-box').forEach(el => {
        el.addEventListener('click', () => { location.hash = `#/group/${el.dataset.group}`; });
      });
      document.querySelectorAll('.party-link').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          location.hash = `#/party/${encodeURIComponent(el.dataset.party)}`;
        });
      });
      // 각 그룹의 상위 6명 사진 프리페치
      const byG = groupMembers();
      const prefetch = [];
      for (const gid of GROUP_ORDER) {
        const arr = (byG[gid] || []).slice(0, 6);
        for (const m of arr) if (!state.photos.has(m.MONA_CD)) prefetch.push(m);
      }
      prefetchPhotos(prefetch, 3);
      if (filterBar) filterBar.style.display = 'none';
    }
  }
}

window.addEventListener('hashchange', route);
document.getElementById('brand').addEventListener('click', () => { location.hash = ''; });
document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  if (!location.hash) route();
});

// ============================================================
// Boot
// ============================================================
(async () => {
  loadPhotoCache();
  try {
    const { data, syncedAt } = await loadMembers();
    // 국회 외 인물 합치기 (대통령·시도지사·사법부 등)
    const extras = await loadExtraPoliticians();
    // 의원에도 _group 부여
    const members = data.map(m => ({ ...m, _group: 'legislative', _type: 'assembly_member', _type_label: '국회의원' }));
    state.members = [...extras, ...members];
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('last-sync').textContent = new Date(syncedAt).toLocaleDateString('ko-KR');
    renderFilters();
    route();
    // 의안은 백그라운드 로드 (홈 표시 후)
    loadProcessedBills().then(bills => {
      state.bills = bills;
      state.billsByCommittee = new Map();
      for (const b of bills) {
        const c = b.CURR_COMMITTEE || '미상';
        if (!state.billsByCommittee.has(c)) state.billsByCommittee.set(c, []);
        state.billsByCommittee.get(c).push(b);
      }
      // 정렬 (최신순)
      for (const arr of state.billsByCommittee.values()) {
        arr.sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));
      }
      // 상세 페이지 중이면 재렌더
      if (location.hash.startsWith('#/m/')) route();
    }).catch(e => console.warn('bills load failed:', e.message));
  } catch (e) {
    document.getElementById('view').innerHTML = `<div class="empty">데이터 로드 실패: ${escapeHtml(e.message)}<br><br>국회 OPEN API가 일시적으로 응답하지 않거나, 브라우저 네트워크 문제일 수 있습니다.</div>`;
  }
})();
</script>
</body>
</html>
