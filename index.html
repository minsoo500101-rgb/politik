<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Politik · 한눈정계</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E🏛%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js" defer></script>
<style>
  :root {
    --bg: #fafafa;
    --bg-card: #ffffff;
    --bg-elev: #f4f5f7;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text: #111827;
    --text-2: #4b5563;
    --dim: #9ca3af;
    --accent: #111827;
    --link: #1e40af;
    --ok: #059669;
    --warn: #d97706;

    /* 정당 색 */
    --party-민주: #004EA2;
    --party-국힘: #E61E2B;
    --party-조국: #082B5C;
    --party-개혁: #FF7920;
    --party-진보: #D6001C;
    --party-미래: #00B5E2;
    --party-기사자: #FED73B;
    --party-사회민주: #43A5DC;
    --party-기타: #6b7280;
    --party-무소속: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Pretendard Variable', 'Inter', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
    font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv11', 'ss01';
  }
  .num, .org-count, .d-stat-value, .stat b { font-variant-numeric: tabular-nums; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ============ Header ============ */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .h-inner {
    max-width: 1280px; margin: 0 auto;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px; align-items: center;
  }
  .brand {
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .brand-logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #111827, #4b5563);
    border-radius: 6px;
    color: #fff; display: grid; place-items: center;
    font-size: 14px; font-weight: 900;
  }
  .brand-sub {
    font-size: 11px; color: var(--dim);
    font-weight: 500; letter-spacing: 0.5px;
  }
  .search-wrap {
    position: relative; max-width: 480px;
    width: 100%;
  }
  .search {
    width: 100%; padding: 9px 14px 9px 36px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    font: inherit; font-size: 13px;
    background: var(--bg-card);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(17,24,39,0.08); }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--dim); pointer-events: none;
  }
  .nav-stats {
    display: flex; gap: 16px; font-size: 11px; color: var(--dim);
    align-items: center;
  }
  .nav-stats b { color: var(--text); font-weight: 600; font-size: 13px; }
  .theme-toggle {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 14px;
    display: grid; place-items: center;
    transition: all 0.2s;
  }
  .theme-toggle:hover { transform: rotate(20deg); background: var(--bg-card); }

  [data-theme="dark"] {
    --bg: #0a0e14;
    --bg-card: #11161e;
    --bg-elev: #161b24;
    --border: #21272f;
    --border-strong: #30373f;
    --text: #e6edf3;
    --text-2: #b8c1cc;
    --dim: #7d858f;
    --link: #6cb8ff;
    --ok: #3fb950;
    --warn: #d29922;
  }
  [data-theme="dark"] header {
    background: rgba(17,22,30,0.92);
  }
  [data-theme="dark"] .d-hero-overlay {
    background: linear-gradient(180deg, rgba(17,22,30,0) 0%, rgba(17,22,30,0.92) 100%);
  }
  [data-theme="dark"] .d-avatar { border-color: var(--bg-card); }
  [data-theme="dark"] .org-icon, [data-theme="dark"] .group-header .icon {
    color: #e6edf3;
    background: linear-gradient(135deg, #475569 0%, #334155 100%) !important;
  }
  /* 다크 모드 — 그라데이션 텍스트는 단색으로 (가독성) */
  [data-theme="dark"] .org-hero h1 {
    background: none;
    -webkit-background-clip: initial; background-clip: initial;
    -webkit-text-fill-color: var(--text);
    color: var(--text);
  }
  [data-theme="dark"] .brand-logo {
    background: linear-gradient(135deg, #475569 0%, #334155 100%);
  }
  /* 통계·도넛 — 카드 배경 더 명확하게 */
  [data-theme="dark"] .stat-card { background: rgba(255,255,255,0.04); }
  [data-theme="dark"] .bar-wrap { background: rgba(0,0,0,0.4); }
  [data-theme="dark"] .donut path[fill="var(--bg-card)"] { stroke: var(--bg-card); }
  /* SVG 텍스트 — currentColor 의존 제거, 다크에서 흰색 명시 */
  [data-theme="dark"] .donut text { fill: var(--text) !important; }
  [data-theme="dark"] .donut-sub { color: var(--text-2); }
  [data-theme="dark"] .stats-sub { color: var(--text-2); }
  /* 메인 페이지 hero 배경 그라데이션 — 다크에서 부드럽게 */
  [data-theme="dark"] .org-hero::before {
    background:
      radial-gradient(ellipse at 30% 0%, rgba(124,180,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 0%, rgba(248,113,113,0.06) 0%, transparent 50%);
  }
  /* 카드 hover 그림자 다크에서 강하게 */
  [data-theme="dark"] .card:hover { box-shadow: 0 14px 32px rgba(0,0,0,0.5); }
  [data-theme="dark"] .org-box:hover { box-shadow: 0 20px 48px rgba(0,0,0,0.6); }
  /* 입력창 다크 가독성 */
  [data-theme="dark"] .search { background: var(--bg-elev); color: var(--text); }
  [data-theme="dark"] .search:focus { box-shadow: 0 0 0 3px rgba(124,180,255,0.15); }
  /* 정당 색 칩 텍스트 가독 */
  [data-theme="dark"] .chip { background: var(--bg-elev); }
  [data-theme="dark"] .chip.active { background: var(--text); color: var(--bg-card); border-color: var(--text); }
  /* 지도 페이지 — 시도 라벨 다크에서 또렷하게 */
  [data-theme="dark"] .kr-map-svg text { text-shadow: 0 0 4px rgba(0,0,0,0.9); }

  /* ============ Filters ============ */
  .filter-bar {
    max-width: 1280px; margin: 0 auto;
    padding: 14px 24px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 11px; color: var(--dim);
    letter-spacing: 1px; text-transform: uppercase;
    margin-right: 4px;
  }
  .chip {
    padding: 5px 11px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    border-radius: 20px;
    font: inherit; font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.12s;
    user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chip .cnt { color: var(--dim); font-size: 10px; }
  .chip.active .cnt { color: rgba(255,255,255,0.6); }

  /* ============ Main ============ */
  main { max-width: 1280px; margin: 0 auto; padding: 20px 24px 80px; }
  .result-meta {
    color: var(--dim); font-size: 12px;
    margin: 6px 0 18px; letter-spacing: 0.3px;
  }
  .result-meta b { color: var(--text); font-weight: 600; }

  /* ============ Grid ============ */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s, border-color 0.2s;
    display: flex; flex-direction: column;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 32px rgba(0,0,0,0.10);
    border-color: var(--border-strong);
  }
  .card:hover .avatar img { transform: scale(1.08); }
  .avatar img { transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
  .card-bar {
    height: 4px; width: 100%;
    background: var(--party-기타);
  }
  .card-body { padding: 14px 14px 12px; flex: 1; display: flex; gap: 12px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--bg-elev);
    display: grid; place-items: center;
    font-size: 18px; font-weight: 600;
    color: var(--text-2);
    flex-shrink: 0;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .d-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px; font-weight: 700;
    margin-bottom: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-sub {
    font-size: 11px; color: var(--text-2);
    line-height: 1.4;
  }
  .card-party {
    font-weight: 600; font-size: 11px;
    margin-bottom: 2px;
  }
  .card-foot {
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--dim);
    letter-spacing: 0.3px;
  }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    background: var(--bg-elev);
    border-radius: 3px;
    font-size: 9px;
    color: var(--text-2);
    font-weight: 600;
  }

  /* ============ Org chart (home) ============ */
  .org {
    padding: 8px 0 0;
  }
  .org-hero {
    text-align: center;
    padding: 48px 16px 40px;
    margin-bottom: 12px;
    position: relative;
  }
  .org-hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 0%, rgba(31,41,55,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 0%, rgba(220,38,38,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
  }
  .org-hero .badge-line {
    display: inline-flex; gap: 6px; align-items: center;
    font-size: 10px; letter-spacing: 2px;
    color: var(--dim); text-transform: uppercase;
    margin-bottom: 16px;
  }
  .org-hero .badge-line::before, .org-hero .badge-line::after {
    content: ''; width: 24px; height: 1px; background: var(--border-strong);
  }
  .org-hero h1 {
    font-size: 48px; font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 12px;
    background: linear-gradient(180deg, var(--text) 0%, var(--text-2) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .org-hero .sub {
    font-size: 15px; color: var(--text-2);
    letter-spacing: -0.2px;
    max-width: 560px; margin: 0 auto;
  }
  .org-hero .stats-row {
    margin-top: 32px;
    display: flex; gap: 32px; justify-content: center; flex-wrap: wrap;
  }
  .org-hero .stat-item {
    display: flex; flex-direction: column; align-items: center;
  }
  .org-hero .stat-num {
    font-size: 28px; font-weight: 800; letter-spacing: -1px;
    color: var(--text); font-variant-numeric: tabular-nums;
  }
  .org-hero .stat-label {
    font-size: 10px; color: var(--dim); letter-spacing: 1px;
    text-transform: uppercase; margin-top: 2px;
  }
  .org-hero .meta {
    margin-top: 28px; font-size: 11px; color: var(--dim);
  }
  .org-hero .meta b { color: var(--text); font-weight: 600; font-size: 12px; margin: 0 4px; }
  .org-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }
  .org-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), box-shadow 0.28s, border-color 0.2s;
    display: flex; flex-direction: column;
    position: relative;
  }
  .org-box::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(31,41,55,0.04) 100%);
    pointer-events: none; border-radius: 16px;
  }
  .org-box:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 48px rgba(0,0,0,0.12);
    border-color: var(--border-strong);
  }
  .org-box-head {
    padding: 24px 22px 18px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 14px; align-items: center;
  }
  .org-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-2) 100%);
    color: #fff;
    display: grid; place-items: center;
    font-size: 26px;
  }
  .org-name {
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.3px;
  }
  .org-desc {
    font-size: 11px; color: var(--text-2);
    margin-top: 2px;
  }
  .org-count {
    font-size: 24px; font-weight: 800;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .org-count-unit { font-size: 10px; color: var(--dim); display: block; text-align: right; }
  .org-box-body { padding: 14px 16px 14px; flex: 1; }
  .org-sub-list {
    display: grid; gap: 6px;
    font-size: 11px;
    margin-bottom: 12px;
  }
  .org-sub-list .sub-row {
    display: flex; justify-content: space-between;
    color: var(--text-2);
  }
  .org-sub-list .sub-row b { color: var(--text); font-weight: 600; }
  .org-preview {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding-top: 8px; border-top: 1px solid var(--border);
  }
  .org-preview-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-elev);
    overflow: hidden;
    border: 1px solid var(--border);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
    color: var(--text-2);
  }
  .org-preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .org-box-foot {
    padding: 12px 18px;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-2);
  }
  .org-box-foot .arrow { color: var(--accent); font-weight: 600; }

  /* Donut chart (main page) */
  .donut-section {
    margin-top: 36px;
    padding: 28px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .donut-head {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .donut-head h2 {
    font-size: 18px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .donut-sub {
    font-size: 12px; color: var(--dim);
    letter-spacing: -0.1px;
    flex: 1;
  }
  .rel-link-btn {
    font-size: 12px; font-weight: 600;
    color: var(--text);
    background: var(--bg-elev);
    padding: 7px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .rel-link-btn:hover {
    background: var(--text);
    color: var(--bg-card);
    border-color: var(--text);
    text-decoration: none;
  }
  [data-theme="dark"] .rel-link-btn {
    background: rgba(255,255,255,0.06);
    color: #e6edf3;
    border-color: rgba(255,255,255,0.18);
  }
  [data-theme="dark"] .rel-link-btn:hover {
    background: #e6edf3;
    color: var(--bg);
    border-color: #e6edf3;
  }
  .donut-wrap {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px; align-items: center;
  }
  .donut { display: block; }
  .donut-seg {
    cursor: pointer;
    transition: opacity 0.18s, filter 0.18s;
  }
  .donut-seg:hover {
    opacity: 0.85;
    filter: brightness(1.1);
  }
  .donut-legend {
    display: grid; gap: 4px;
    font-size: 13px;
  }
  .donut-leg-row {
    display: grid;
    grid-template-columns: 14px 1fr auto auto;
    gap: 10px; align-items: center;
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .donut-leg-row:hover {
    background: var(--bg-elev);
  }
  .leg-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
  }
  .leg-name { color: var(--text); font-weight: 500; }
  .leg-count {
    color: var(--text); font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .leg-pct {
    color: var(--dim); font-size: 11px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    min-width: 50px;
  }
  @media (max-width: 720px) {
    .donut-wrap { grid-template-columns: 1fr; justify-items: center; }
  }

  /* Stats section */
  .stats-section {
    margin-top: 24px;
    padding: 28px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .stats-head h2 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .stats-sub { font-size: 12px; color: var(--dim); margin-bottom: 18px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .stat-card {
    background: var(--bg-elev);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-card-wide { grid-column: 1 / -1; }
  .stat-card-label {
    font-size: 11px; color: var(--dim);
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-card-value {
    font-size: 38px; font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1; margin-bottom: 6px;
    color: var(--text);
  }
  .stat-card-value .unit {
    font-size: 16px; font-weight: 500; color: var(--text-2);
    margin-left: 4px;
  }
  .stat-card-detail {
    font-size: 11px; color: var(--text-2);
  }
  .stat-card-detail b { font-weight: 700; color: var(--text); }
  .stat-card-rows { display: grid; gap: 10px; margin-top: 4px; }
  .stat-row-item {
    display: grid; grid-template-columns: 14px 30px 1fr auto;
    align-items: center; gap: 10px;
    font-size: 14px;
  }
  .stat-row-item b { font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; text-align: right; }
  .stat-row-item .sx-lbl { color: var(--text-2); }
  .stat-row-item .pct {
    color: var(--dim); font-size: 11px;
    font-variant-numeric: tabular-nums;
    min-width: 50px; text-align: right;
  }
  .sex-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .bar-chart { display: grid; gap: 6px; }
  .bar-row {
    display: grid; grid-template-columns: 80px 1fr 50px;
    align-items: center; gap: 12px;
    font-size: 12px;
  }
  .bar-label { color: var(--text-2); font-weight: 600; }
  .bar-wrap {

<script>
'use strict';

// ============================================================
// 국회 OPEN API — Service IDs (모두 KEY 필요)
// ============================================================
const API_KEY = '3aac055cce1641f2b5f1b9b359ec5957';
const API_HOST = 'https://open.assembly.go.kr/portal/openapi';
const SVC = {
  members:        'nwvrqwxyaytdsfvhu', // 국회의원 인적사항 (현직)
  committees:     'nktulghcadyhmiqxi', // 위원회 명단
  bills:          'nzmimeepazxkubdpn', // 의안 정보 (AGE 필수)
  bills_processed:'ncocpgfiaoituanbr', // 본회의 처리 의안 (AGE 필수)
};
const ASSEMBLY_AGE = 22;
const CACHE_KEY_MEMBERS = 'politik:members:v2';
const CACHE_KEY_BILLS   = 'politik:bills:v2';
const CACHE_KEY_PHOTOS  = 'politik:photos:v3';
const CACHE_KEY_WIKIMAP = 'politik:wikimap:v1';
const CACHE_TTL = 24 * 3600 * 1000; // 24h

// 통합 schema 변환
function normalizeAssemblyMember(m) {
  return {
    id: 'kr.assembly.22.' + m.MONA_CD,
    type: 'assembly_member',
    type_label: '국회의원',
    name_ko: m.HG_NM,
    name_hj: m.HJ_NM,
    name_en: m.ENG_NM,
    party: m.POLY_NM,
    role: '제22대 국회의원',
    region: m.ORIG_NM,
    committee: m.CMIT_NM,
    term_label: m.REELE_GBN_NM,
    elect_kind: m.ELECT_GBN_NM,
    bth_date: m.BTH_DATE,
    sex: m.SEX_GBN_NM,
    email: m.E_MAIL,
    phone: m.TEL_NO,
    homepage: m.HOMEPAGE,
    addr: m.ASSEM_ADDR,
    staff: m.STAFF,
    secretary: m.SECRETARY,
    secretary2: m.SECRETARY2,
    career: m.MEM_TITLE,
    mona_cd: m.MONA_CD,
    wiki: m.HG_NM,
    _raw: m,
  };
}
function normalizeExtraPerson(p) {
  return {
    ...p,
    name_ko: p.name_ko,
    party: p.party || null,
    wiki: p.wiki || p.name_ko,
  };
}

function apiUrl(serviceId, params = {}) {
  const qs = new URLSearchParams({ KEY: API_KEY, Type: 'json', pIndex: '1', pSize: '1000', ...params });
  return `${API_HOST}/${serviceId}?${qs}`;
}
async function fetchService(serviceId, params = {}) {
  const r = await fetch(apiUrl(serviceId, params));
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const j = await r.json();
  const root = j[serviceId];
  if (!root) throw new Error('unexpected shape');
  const result = root[0]?.head?.[0]?.RESULT;
  if (result && result.CODE !== 'INFO-000') throw new Error(result.MESSAGE);
  return {
    rows: root[1]?.row || [],
    total: root[0]?.head?.[0]?.list_total_count || 0,
  };
}

// 정당명 → 색 변수 매핑
const PARTY_COLOR = {
  '더불어민주당': 'var(--party-민주)',
  '국민의힘':      'var(--party-국힘)',
  '조국혁신당':    'var(--party-조국)',
  '개혁신당':      'var(--party-개혁)',
  '진보당':        'var(--party-진보)',
  '새로운미래':    'var(--party-미래)',
  '기본소득당':    'var(--party-기사자)',
  '사회민주당':    'var(--party-사회민주)',
  '무소속':        'var(--party-무소속)',
};
const partyColor = name => PARTY_COLOR[name] || 'var(--party-기타)';

// ============================================================
// Load + cache
// ============================================================
async function loadMembers() {
  try {
    const raw = localStorage.getItem(CACHE_KEY_MEMBERS);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < CACHE_TTL) return { data: c.data, fromCache: true, syncedAt: c.t };
    }
  } catch {}
  // 키 있으면 1회 호출로 전체
  const { rows } = await fetchService(SVC.members);
  const seen = new Set();
  const data = rows.filter(m => {
    if (!m.MONA_CD || seen.has(m.MONA_CD)) return false;
    seen.add(m.MONA_CD); return true;
  });
  try { localStorage.setItem(CACHE_KEY_MEMBERS, JSON.stringify({ t: Date.now(), data })); } catch {}
  return { data, fromCache: false, syncedAt: Date.now() };
}

// 역대 국회의원 (위키 카테고리에서 lazy load)
async function loadHistoricalAssembly(age) {
  const cat = `Category:대한민국의_제${age}대_국회의원`;
  const url = `https://ko.wikipedia.org/w/api.php?action=query&list=categorymembers&cmtitle=${encodeURIComponent(cat)}&cmlimit=500&format=json&origin=*`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const j = await r.json();
    return (j.query?.categorymembers || [])
      .filter(m => m.ns === 0 && !m.title.endsWith('목록') && !m.title.endsWith('선거'))
      .map(m => {
        const name = m.title.replace(/_?\(.+\)$/, '').trim();
        return {
          MONA_CD: `kr.assembly.${age}.${m.title.replace(/\s/g, '_')}`,
          HG_NM: name,
          HJ_NM: '',
          ENG_NM: '',
          POLY_NM: '—',
          ORIG_NM: `제${age}대 국회의원`,
          CMIT_NM: '',
          REELE_GBN_NM: '역대',
          ELECT_GBN_NM: '역대 의원',
          BTH_DATE: '',
          SEX_GBN_NM: '',
          MEM_TITLE: `대한민국 제${age}대 국회의원 (위키미디어 분류 기반)`,
          TEL_NO: '', E_MAIL: '', HOMEPAGE: '', ASSEM_ADDR: '',
          STAFF: '', SECRETARY: '', SECRETARY2: '',
          UNITS: '',
          _type: 'former_member',
          _type_label: `제${age}대 의원`,
          _group: 'historical',
          _wiki: m.title.replace(/\s/g, '_'),
          _age: age,
        };
      });
  } catch { return []; }
}

let _historicalLoaded = new Set();
async function ensureHistoricalAssemblies(ages = []) {
  const todo = ages.filter(a => !_historicalLoaded.has(a));
  if (!todo.length) return false;
  const results = await Promise.all(todo.map(age => loadHistoricalAssembly(age).then(arr => ({ age, arr }))));
  for (const { age, arr } of results) {
    if (arr.length) state.members = state.members.concat(arr);
    _historicalLoaded.add(age);
  }
  return results.some(r => r.arr.length > 0);
}

// 위키 슬러그 자동 매핑: 22대·21대 카테고리 → "이름 → 정확한 위키 슬러그"
// 동명이인 disambiguation (예: "김상훈" → "김상훈_(1963년)") 자동 처리.
let WIKI_OVERRIDES = {}; // HG_NM → wiki slug
async function loadWikiOverrides() {
  try {
    const raw = localStorage.getItem(CACHE_KEY_WIKIMAP);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < 7*24*3600*1000) { WIKI_OVERRIDES = c.data; return; }
    }
  } catch {}
  const cats = [
    'Category:대한민국의_제22대_국회의원',
    'Category:대한민국의_제21대_국회의원',
  ];
  const map = {};
  await Promise.all(cats.map(async cat => {
    try {
      const url = `https://ko.wikipedia.org/w/api.php?action=query&list=categorymembers&cmtitle=${encodeURIComponent(cat)}&cmlimit=500&format=json&origin=*`;
      const j = await (await fetch(url)).json();
      for (const m of j.query?.categorymembers || []) {
        if (m.ns !== 0 || m.title.endsWith('목록') || m.title.endsWith('선거')) continue;
        const base = m.title.replace(/_?\s?\(.+\)$/, '').trim();
        const slug = m.title.replace(/\s/g, '_');
        if (!map[base]) map[base] = slug;
      }
    } catch {}
  }));
  WIKI_OVERRIDES = map;
  try { localStorage.setItem(CACHE_KEY_WIKIMAP, JSON.stringify({ t: Date.now(), data: map })); } catch {}
}

// 본회의 처리 의안 (22대) — 의원/위원회 페이지에서 사용
async function loadProcessedBills() {
  try {
    const raw = localStorage.getItem(CACHE_KEY_BILLS);
    if (raw) {
      const c = JSON.parse(raw);
      if (Date.now() - c.t < CACHE_TTL) return c.data;
    }
  } catch {}
  // 데이터가 ~1.6K 건 → pSize 1000으로 2 페이지면 충분
  const p1 = await fetchService(SVC.bills_processed, { AGE: ASSEMBLY_AGE, pIndex: 1, pSize: 1000 });
  let all = p1.rows.slice();
  if (p1.total > 1000) {
    const pages = Math.ceil(p1.total / 1000);
    const more = await Promise.all(
      Array.from({length: pages - 1}, (_, i) =>
        fetchService(SVC.bills_processed, { AGE: ASSEMBLY_AGE, pIndex: i + 2, pSize: 1000 }).then(r => r.rows).catch(() => [])
      )
    );
    all = all.concat(more.flat());
  }
  try { localStorage.setItem(CACHE_KEY_BILLS, JSON.stringify({ t: Date.now(), data: all })); } catch {}
  return all;
}

// 위키미디어에서 인물 요약 fetch (사진 + 본문 + 출처 URL)
async function findBio(hgnm) {
  const baseName = hgnm.replace(/_?\(.+\)$/, '').trim();
  function titleMatches(pageTitle) {
    if (!pageTitle) return false;
    const t = pageTitle.trim();
    return t === baseName || t === hgnm || t.startsWith(baseName + ' (') || t.startsWith(baseName + '_(');
  }
  // 1) 직접 page summary
  try {
    const r = await fetch(`https://ko.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(hgnm)}?redirect=true`);
    if (r.ok) {
      const j = await r.json();
      if (j.type !== 'disambiguation' && (j.title === baseName || j.title === hgnm || j.titles?.canonical === hgnm.replace(/\s/g,'_'))) {
        return {
          thumb: j.thumbnail?.source || null,
          title: j.title,
          description: j.description || '',
          extract: j.extract || '',
          url: j.content_urls?.desktop?.page || `https://ko.wikipedia.org/wiki/${encodeURIComponent(hgnm)}`,
        };
      }
    }
  } catch {}
  // 2) 검색 fallback (제목 일치)
  try {
    const url = `https://ko.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(baseName + ' 정치인')}&gsrlimit=8&prop=pageimages|description|extracts&piprop=thumbnail&pithumbsize=320&exintro=1&explaintext=1&exsentences=4&format=json&origin=*`;
    const j = await (await fetch(url)).json();
    for (const k of Object.keys(j.query?.pages || {})) {
      const p = j.query.pages[k];
      if (titleMatches(p.title)) {
        return {
          thumb: p.thumbnail?.source || null,
          title: p.title,
          description: p.description || '',
          extract: (p.extract || '').slice(0, 600),
          url: `https://ko.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/\s/g,'_'))}`,
        };
      }
    }
  } catch {}
  return null;
}

// 위키미디어에서 인물 사진 찾기 (legacy — bio fetch가 사진 포함)
async function findPortrait(hgnm) {
  // hgnm은 이름 또는 위키 슬러그 ("이재명_(1964년)" 같이 disambiguation 포함 가능)
  const baseName = hgnm.replace(/_?\(.+\)$/, '').trim();
  function titleMatches(pageTitle) {
    if (!pageTitle) return false;
    const t = pageTitle.trim();
    return t === baseName || t === hgnm || t.startsWith(baseName + ' (') || t.startsWith(baseName + '_(');
  }
  // 1) 직접 페이지 (full slug 시도)
  try {
    const url = `https://ko.wikipedia.org/w/api.php?action=query&prop=pageimages&piprop=thumbnail&pithumbsize=240&titles=${encodeURIComponent(hgnm)}&format=json&origin=*&redirects=1`;
    const j = await (await fetch(url)).json();
    for (const k of Object.keys(j.query?.pages || {})) {
      const p = j.query.pages[k];
      if (p.thumbnail?.source && titleMatches(p.title)) return { thumb: p.thumbnail.source, title: p.title };
    }
  } catch {}
  // 2) 검색에서 제목 정확 일치한 페이지
  try {
    const url = `https://ko.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(baseName + ' 정치인')}&gsrlimit=8&prop=pageimages&piprop=thumbnail&pithumbsize=240&format=json&origin=*`;
    const j = await (await fetch(url)).json();
    for (const k of Object.keys(j.query?.pages || {})) {
      const p = j.query.pages[k];
      if (p.thumbnail?.source && titleMatches(p.title)) return { thumb: p.thumbnail.source, title: p.title };
    }
  } catch {}
  return null;
}

async function ensurePhoto(member) {
  // 이제 사진뿐 아니라 위키 요약·본문도 같이 캐시 (`bio`로 통합)
  if (!member?.MONA_CD || !member?.HG_NM) return null;
  const existing = state.photos.get(member.MONA_CD);
  if (existing && (existing.extract != null || existing.miss)) return existing;
  const wikiQuery = member._wiki || WIKI_OVERRIDES[member.HG_NM] || member.HG_NM;
  const r = await findBio(wikiQuery);
  const entry = r ? { ...r, t: Date.now() } : { miss: true, t: Date.now() };
  state.photos.set(member.MONA_CD, entry);
  clearTimeout(savePhotoCache._t);
  savePhotoCache._t = setTimeout(savePhotoCache, 1500);
  return entry;
}

// 화면에 보이는 카드들의 사진 백그라운드 프리페치 (3 concurrent)
async function prefetchPhotos(members, concurrency = 3) {
  let i = 0;
  async function worker() {
    while (i < members.length) {
      const idx = i++;
      const m = members[idx];
      if (!m || state.photos.has(m.MONA_CD)) continue;
      try {
        await ensurePhoto(m);
        const cardImg = document.querySelector(`.card[data-id="${m.MONA_CD}"] .avatar img`);
        const entry = state.photos.get(m.MONA_CD);
        if (cardImg && entry?.thumb) cardImg.src = entry.thumb;
      } catch {}
    }
  }
  await Promise.all(Array.from({length: concurrency}, worker));
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}
function termAbbr(reele) {
  if (!reele) return '';
  return reele.replace(/^([가-힣])선$/, '$1선');
}
function regionShort(orig) {
  if (!orig) return '';
  if (orig === '비례대표') return '비례';
  return orig.replace(/[광역시도시군구]/g, '').slice(0, 10) || orig;
}

let _mapData = { province: null, muni: null };
let _mapCurrentLayer = 'province';

async function loadMapData(layer) {
  if (_mapData[layer]) return _mapData[layer];
  const file = layer === 'province' ? 'skorea-provinces-2018-geo.json' : 'skorea-municipalities-2018-geo.json';
  const r = await fetch(`https://cdn.jsdelivr.net/gh/southkorea/southkorea-maps@master/kostat/2018/json/${file}`);
  if (!r.ok) throw new Error('지도 데이터 fetch 실패');
  _mapData[layer] = await r.json();
  return _mapData[layer];
}

async function initMap() {
  if (typeof d3 === 'undefined') { setTimeout(initMap, 200); return; }
  const container = document.getElementById('map-container');
  if (!container) return;
  try {
    const geo = await loadMapData(_mapCurrentLayer);
    drawMap(geo, _mapCurrentLayer);
    // 레이어 토글 핸들러
    document.querySelectorAll('.map-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.map-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _mapCurrentLayer = btn.dataset.layer;
        container.innerHTML = '<div class="rel-loading"><span class="loading-spinner"></span>지도 그리는 중…</div>';
        loadMapData(_mapCurrentLayer).then(g => drawMap(g, _mapCurrentLayer));
      });
    });
  } catch (e) {
    container.innerHTML = `<div class="empty">지도 로드 실패: ${escapeHtml(e.message)}</div>`;
  }
}

function drawMap(geo, layer) {
  const container = document.getElementById('map-container');
  if (!container) return;
  container.innerHTML = '';
  const w = container.clientWidth || 800;
  const h = 700;
  const svg = d3.select(container).append('svg')
    .attr('width', w).attr('height', h)
    .attr('class', 'kr-map-svg');

  const projection = d3.geoMercator().fitSize([w - 40, h - 40], geo);
  const path = d3.geoPath(projection);

  // 광역단체장 region → 정당색 매핑
  const lgByRegion = new Map();
  for (const m of state.members) {
    if (m._type === 'local_gov_head') lgByRegion.set(m.ORIG_NM, m);
  }
  // 기초단체장 region → 단체장 매핑 ("광역 + 시군구" 키로 통일)
  // GeoJSON code 앞 2자리 → 광역 이름 매핑
  const PROV_BY_CODE = {
    '11':'서울','21':'부산','22':'대구','23':'인천','24':'광주','25':'대전','26':'울산','29':'세종',
    '31':'경기','32':'강원','33':'충북','34':'충남','35':'전북','36':'전남','37':'경북','38':'경남','39':'제주',
  };
  function muniMatchKey(feature) {
    const code = (feature.properties.code || '').toString();
    const prov = PROV_BY_CODE[code.slice(0,2)];
    return prov ? `${prov} ${feature.properties.name}` : feature.properties.name;
  }
  // member region이 prefix 있으면 그대로, 없으면 광역 추정
  const muniByName = new Map();
  for (const m of state.members) {
    if (m._type !== 'local_gov_muni') continue;
    let key = m.ORIG_NM;
    // role에서 광역 추정 (예: "서울특별시 종로구청장" → "서울 종로구")
    if (key && !/(^|\s)(서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)\s/.test(key)) {
      const rm = (m.MEM_TITLE || m.CMIT_NM || '').match(/(서울|부산|대구|인천|광주|대전|울산|세종)/);
      if (rm) key = rm[1] + ' ' + m.ORIG_NM;
    }
    muniByName.set(key, m);
  }

  // 시도 -> 정당 매핑 (시군구 색칠용)
  // 시군구 코드 앞 2자리 = 시도 코드
  function getRegionForFeature(f) {
    const name = f.properties.name;
    if (REGION_MAP[name]) return REGION_MAP[name];
    // 시군구의 경우: 한국 행정구역 코드 첫 2자리로 광역 추정
    const code = f.properties.code || '';
    const cMap = {
      '11':'서울','21':'부산','22':'대구','23':'인천','24':'광주','25':'대전','26':'울산','29':'세종',
      '31':'경기','32':'강원','33':'충북','34':'충남','35':'전북','36':'전남','37':'경북','38':'경남','39':'제주',
    };
    return cMap[code.slice(0,2)] || null;
  }

  const g = svg.append('g').attr('transform', 'translate(20, 20)');
  const paths = g.selectAll('path').data(geo.features).join('path')
    .attr('d', path)
    .attr('fill', d => {
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        const muni = muniByName.get(key);
        if (muni) return partyColor(muni.POLY_NM);
        // 시군구장 데이터 없음 → 광역 색의 옅은 버전 (fallback)
        const r = getRegionForFeature(d);
        const lg = r ? lgByRegion.get(r) : null;
        return lg ? partyColor(lg.POLY_NM) : 'var(--bg-elev)';
      }
      const r = getRegionForFeature(d);
      const lg = r ? lgByRegion.get(r) : null;
      return lg ? partyColor(lg.POLY_NM) : 'var(--bg-elev)';
    })
    .attr('fill-opacity', d => {
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        return muniByName.has(key) ? 0.85 : 0.35;
      }
      return 0.85;
    })
    .attr('stroke', 'var(--bg-card)')
    .attr('stroke-width', layer === 'province' ? 1.5 : 0.4)
    .style('cursor', 'pointer')
    .on('mouseenter', function(e, d) {
      d3.select(this).attr('stroke-width', layer === 'province' ? 2 : 1.4);
      const tip = document.getElementById('rel-tooltip');
      if (!tip) return;
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        const muni = muniByName.get(key);
        const dispName = key.includes(' ') ? key : d.properties.name;
        if (muni) {
          tip.innerHTML = `<b>${escapeHtml(dispName)}</b><br>${escapeHtml(muni.HG_NM)} (${escapeHtml(muni.POLY_NM)})<br><span style="color:var(--dim);font-size:10px">${escapeHtml(muni.CMIT_NM || muni.ELECT_GBN_NM || '')}</span>`;
          tip.style.borderColor = partyColor(muni.POLY_NM);
        } else {
          tip.innerHTML = `<b>${escapeHtml(dispName)}</b><br><span style="color:var(--dim)">기초단체장 데이터 준비 중</span>`;
          tip.style.borderColor = 'var(--border-strong)';
        }
      } else {
        const r = getRegionForFeature(d);
        const lg = r ? lgByRegion.get(r) : null;
        tip.innerHTML = lg
          ? `<b>${escapeHtml(d.properties.name)}</b><br>${escapeHtml(lg.HG_NM)} (${escapeHtml(lg.POLY_NM)})<br><span style="color:var(--dim);font-size:10px">${escapeHtml(lg.CMIT_NM || lg.ELECT_GBN_NM)}</span>`
          : `<b>${escapeHtml(d.properties.name)}</b><br><span style="color:var(--dim)">데이터 없음</span>`;
        tip.style.borderColor = lg ? partyColor(lg.POLY_NM) : 'var(--border-strong)';
      }
      tip.style.display = 'block';
    })
    .on('mousemove', function(e) {
      const tip = document.getElementById('rel-tooltip');
      if (tip) {
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top  = (e.clientY + 14) + 'px';
      }
    })
    .on('mouseleave', function() {
      d3.select(this).attr('stroke-width', layer === 'province' ? 1.5 : 0.4);
      const tip = document.getElementById('rel-tooltip');
      if (tip) tip.style.display = 'none';
    })
    .on('click', (e, d) => {
      if (layer === 'muni') {
        const key = muniMatchKey(d);
        const muni = muniByName.get(key);
        if (muni) location.hash = `#/m/${encodeURIComponent(muni.MONA_CD)}`;
        return;
      }
      const r = getRegionForFeature(d);
      const lg = r ? lgByRegion.get(r) : null;
      if (lg) location.hash = `#/m/${encodeURIComponent(lg.MONA_CD)}`;
    });

  // 시도 라벨 (province 레이어만)
  if (layer === 'province') {
    g.selectAll('text').data(geo.features).join('text')
      .attr('x', d => path.centroid(d)[0])
      .attr('y', d => path.centroid(d)[1])
      .attr('text-anchor', 'middle')
      .attr('font-size', 10)
      .attr('font-weight', 600)
      .attr('fill', '#fff')
      .style('text-shadow', '0 0 4px rgba(0,0,0,0.6)')
      .style('pointer-events', 'none')
      .text(d => REGION_MAP[d.properties.name] || '');
  }

  // 줌
  svg.call(d3.zoom().scaleExtent([1, 6]).on('zoom', e => g.attr('transform', `translate(20, 20) ${e.transform.toString()}`)));

  // 범례 갱신
  renderMapLegend();
}

function initRelationsGraph() {
  if (typeof d3 === 'undefined') {
    setTimeout(initRelationsGraph, 200);
    return;
  }
  const container = document.getElementById('rel-container');
  if (!container) return;
  const mps = state.members.filter(m => m._group === 'legislative' && m.HG_NM && m.POLY_NM);
  if (mps.length < 50) {
    container.innerHTML = '<div class="empty">의원 데이터 로딩 중…</div>';
    return;
  }

  const w = Math.min(container.clientWidth || 1000, 1200);
  const h = 700;
  container.innerHTML = '';
  const svg = d3.select(container).append('svg')
    .attr('width', w).attr('height', h)
    .attr('class', 'rel-svg');

  const partyCounts = new Map();
  for (const m of mps) partyCounts.set(m.POLY_NM, (partyCounts.get(m.POLY_NM) || 0) + 1);
  const partyNodes = [...partyCounts.entries()].map(([p, n]) => ({
    id: 'P:' + p, name: p, isParty: true, count: n, color: partyColor(p),
  }));
  const mpNodes = mps.map(m => ({
    id: m.MONA_CD, name: m.HG_NM, party: m.POLY_NM, cmt: m.CMIT_NM,
    region: m.ORIG_NM, color: partyColor(m.POLY_NM), isParty: false,
  }));
  const nodes = [...partyNodes, ...mpNodes];
  const links = mpNodes.map(m => ({ source: m.id, target: 'P:' + m.party }));

  const sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(d => d.isParty ? -2500 : -28))
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.target.isParty ? 80 : 30).strength(0.4))
    .force('center', d3.forceCenter(w/2, h/2))
    .force('collide', d3.forceCollide().radius(d => d.isParty ? 32 : 7))
    .alphaDecay(0.04);

  const g = svg.append('g');
  const linkSel = g.append('g').attr('stroke-opacity', 0.12).attr('stroke-width', 0.6)
    .selectAll('line').data(links).join('line')
    .attr('stroke', d => partyColor((d.target && typeof d.target === 'object' ? d.target.name : d.target.replace('P:','')) || ''));

  const nodeSel = g.append('g').selectAll('g').data(nodes).join('g')
    .style('cursor', d => d.isParty ? 'default' : 'pointer')
    .on('mouseenter', function(e, d) {
      d3.select(this).raise();
      const tip = document.getElementById('rel-tooltip');
      if (tip) {
        tip.innerHTML = d.isParty
          ? `<b>${d.name}</b><br>${d.count}명`
          : `<b>${d.name}</b><br><span style="color:${d.color}">${d.party}</span><br>${d.region || ''}<br><span style="font-size:10px;color:var(--dim)">${d.cmt || ''}</span>`;
        tip.style.display = 'block';
        tip.style.borderColor = d.color;
      }
    })
    .on('mousemove', function(e) {
      const tip = document.getElementById('rel-tooltip');
      if (tip) {
        tip.style.left = (e.clientX + 14) + 'px';
        tip.style.top  = (e.clientY + 14) + 'px';
      }
    })
    .on('mouseleave', function() {
      const tip = document.getElementById('rel-tooltip');
      if (tip) tip.style.display = 'none';
    })
    .on('click', (e, d) => { if (!d.isParty) location.hash = `#/m/${encodeURIComponent(d.id)}`; });

  nodeSel.append('circle')
    .attr('r', d => d.isParty ? 28 : 5.5)
    .attr('fill', d => d.color)
    .attr('stroke', d => d.isParty ? 'var(--bg-card)' : 'rgba(255,255,255,0.2)')
    .attr('stroke-width', d => d.isParty ? 3 : 0.5)
    .style('filter', d => d.isParty ? `drop-shadow(0 0 12px ${d.color})` : '');

  nodeSel.filter(d => d.isParty).append('text')
    .attr('text-anchor', 'middle').attr('dy', 4)
    .attr('fill', '#fff').attr('font-size', 11).attr('font-weight', 700)
    .style('pointer-events', 'none')
    .text(d => d.count);

  nodeSel.filter(d => d.isParty).append('text')
    .attr('text-anchor', 'middle').attr('dy', 48)
    .attr('fill', d => d.color).attr('font-size', 11).attr('font-weight', 600)
    .style('pointer-events', 'none')
    .style('text-shadow', '0 0 4px var(--bg-card)')
    .text(d => d.name);

  sim.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  svg.call(d3.zoom().scaleExtent([0.5, 4]).on('zoom', e => g.attr('transform', e.transform)));

  // 드래그
  function drag(simulation) {
    return d3.drag()
      .on('start', (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end',   (event, d) => { if (!event.active) simulation.alphaTarget(0); if (!d.isParty) { d.fx = null; d.fy = null; } });
  }
  nodeSel.call(drag(sim));
}

function renderStats() {
  const mps = state.members.filter(m => m._group === 'legislative' || (!m._group && m.UNITS));
  if (mps.length < 100) return '';

  const now = new Date().getFullYear();
  const ages = mps.map(m => {
    const y = parseInt((m.BTH_DATE || '').slice(0,4), 10);
    return y ? now - y : null;
  }).filter(a => a != null);
  const avgAge = ages.reduce((s,a) => s+a, 0) / ages.length;
  const minAge = Math.min(...ages), maxAge = Math.max(...ages);

  const sex = { 남: 0, 여: 0 };
  for (const m of mps) {
    if (m.SEX_GBN_NM === '남') sex.남++;
    else if (m.SEX_GBN_NM === '여') sex.여++;
  }
  const totalSex = sex.남 + sex.여;

  const terms = new Map();
  for (const m of mps) terms.set(m.REELE_GBN_NM || '초선', (terms.get(m.REELE_GBN_NM || '초선') || 0) + 1);
  const TERM_ORDER = ['초선','재선','3선','4선','5선','6선','7선','8선'];
  const termArr = TERM_ORDER.filter(t => terms.has(t)).map(t => ({ t, c: terms.get(t) }));
  const maxTerm = Math.max(...termArr.map(t => t.c));

  const partyAge = new Map();
  for (const m of mps) {
    const y = parseInt((m.BTH_DATE || '').slice(0,4), 10);
    if (!y) continue;
    if (!partyAge.has(m.POLY_NM)) partyAge.set(m.POLY_NM, []);
    partyAge.get(m.POLY_NM).push(now - y);
  }
  const partyAvg = [...partyAge.entries()]
    .filter(([,arr]) => arr.length >= 3)
    .map(([p, arr]) => ({ p, avg: arr.reduce((s,a) => s+a, 0) / arr.length, count: arr.length }))
    .sort((a,b) => b.count - a.count);
  const maxAvgAge = Math.max(...partyAvg.map(p => p.avg));

  return `
    <div class="stats-section">
      <div class="stats-head">
        <h2>22대 국회 통계</h2>
        <div class="stats-sub">${mps.length}명 의원의 데이터 요약</div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-label">평균 나이 (만)</div>
          <div class="stat-card-value">${avgAge.toFixed(1)}<span class="unit">세</span></div>
          <div class="stat-card-detail">최연소 <b>${minAge}</b> · 최고령 <b>${maxAge}</b></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">성별 분포</div>
          <div class="stat-card-rows">
            <div class="stat-row-item"><span class="sex-dot" style="background:#1e40af"></span><span class="sx-lbl">남</span><b>${sex.남}</b><span class="pct">${(sex.남/totalSex*100).toFixed(1)}%</span></div>
            <div class="stat-row-item"><span class="sex-dot" style="background:#db2777"></span><span class="sx-lbl">여</span><b>${sex.여}</b><span class="pct">${(sex.여/totalSex*100).toFixed(1)}%</span></div>
          </div>
        </div>
        <div class="stat-card stat-card-wide">
          <div class="stat-card-label">선수 분포</div>
          <div class="bar-chart">
            ${termArr.map(t => `
              <div class="bar-row">
                <div class="bar-label">${escapeHtml(t.t)}</div>
                <div class="bar-wrap"><div class="bar" style="width:${(t.c/maxTerm*100).toFixed(1)}%"></div></div>
                <div class="bar-count">${t.c}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="stat-card stat-card-wide">
          <div class="stat-card-label">정당별 평균 나이</div>
          <div class="bar-chart">
            ${partyAvg.slice(0, 6).map(p => `
              <div class="bar-row">
                <div class="bar-label" style="color:${partyColor(p.p)}">${escapeHtml(p.p)}</div>
                <div class="bar-wrap"><div class="bar" style="width:${(p.avg/maxAvgAge*100).toFixed(1)}%; background:${partyColor(p.p)}"></div></div>
                <div class="bar-count">${p.avg.toFixed(1)}세</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderPartyDonut() {
  const mps = state.members.filter(m => m._group === 'legislative' || (!m._group && m.UNITS));
  const byParty = new Map();
  for (const m of mps) byParty.set(m.POLY_NM, (byParty.get(m.POLY_NM) || 0) + 1);
  const arr = [...byParty.entries()].sort((a,b) => b[1]-a[1])
    .map(([name, count]) => ({ name, count, color: partyColor(name) }));
  const total = arr.reduce((s,p) => s+p.count, 0);
  if (total === 0) return '';

  const size = 260, R = 110, r = 70;
  const cx = size/2, cy = size/2;
  let angle = -Math.PI/2;
  const segs = arr.map(p => {
    const frac = p.count / total;
    const a0 = angle;
    angle += frac * 2 * Math.PI;
    const a1 = angle;
    const large = frac > 0.5 ? 1 : 0;
    const x0 = cx + R*Math.cos(a0), y0 = cy + R*Math.sin(a0);
    const x1 = cx + R*Math.cos(a1), y1 = cy + R*Math.sin(a1);
    const x2 = cx + r*Math.cos(a1), y2 = cy + r*Math.sin(a1);
    const x3 = cx + r*Math.cos(a0), y3 = cy + r*Math.sin(a0);
    const d = `M${x0.toFixed(2)},${y0.toFixed(2)} A${R},${R} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${x2.toFixed(2)},${y2.toFixed(2)} A${r},${r} 0 ${large} 0 ${x3.toFixed(2)},${y3.toFixed(2)} Z`;
    return { d, ...p, percent: (frac*100).toFixed(1) };
  });

  return `
    <div class="donut-section">
      <div class="donut-head">
        <h2>22대 국회 정당별 의석</h2>
        <div class="donut-sub">현재 등록 ${total}명 · 클릭하면 정당 페이지</div>
        <a class="rel-link-btn" href="#/map">정치 분포 지도 🗺</a>
        <a class="rel-link-btn" href="#/relations">관계도 보기 →</a>
      </div>
      <div class="donut-wrap">
        <svg viewBox="0 0 ${size} ${size}" class="donut" width="${size}" height="${size}">
          ${segs.map(s => `<path d="${s.d}" fill="${s.color}" stroke="var(--bg-card)" stroke-width="2" class="donut-seg" data-party="${escapeHtml(s.name)}"><title>${escapeHtml(s.name)}: ${s.count}명 (${s.percent}%)</title></path>`).join('')}
          <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="36" font-weight="800" fill="currentColor" style="color:var(--text)">${total}</text>
          <text x="${cx}" y="${cy+18}" text-anchor="middle" font-size="11" fill="var(--dim)" letter-spacing="1">국회의원</text>
        </svg>
        <div class="donut-legend">
          ${segs.map(s => `
            <div class="donut-leg-row" data-party="${escapeHtml(s.name)}">
              <span class="leg-dot" style="background:${s.color}"></span>
              <span class="leg-name">${escapeHtml(s.name)}</span>
              <span class="leg-count">${s.count}</span>
              <span class="leg-pct">${s.percent}%</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
}

      const byParty = new Map();

      subList = top.map(([p, c]) => `<div class="sub-row party-link" data-party="${escapeHtml(p)}" style="cursor:pointer"><span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${partyColor(p)};margin-right:6px;vertical-align:middle"></span>${escapeHtml(p)}</span><b>${c}</b></div>`).join('');

      <div class="org-box" data-group="${gid}">
        <div class="org-box-head">
          <div class="org-icon" style="background:${g.color}">${g.icon}</div>
          <div>
            <div class="org-name">${g.name}</div>
            <div class="org-desc">${g.desc}</div>
          </div>
          <div>
            <div class="org-count">${members.length}</div>
            <div class="org-count-unit">명</div>
          </div>
        </div>
        <div class="org-box-body">

          <span class="arrow">→</span>
        </div>
      </div>

  // 통계 — 상위 핫 stats
  const statsRow = [
    { num: groups.legislative?.length || 0, label: '국회의원' },
    { num: groups.executive?.length || 0, label: '행정부' },
    { num: groups.judicial?.length || 0, label: '사법부' },
    { num: groups.local?.length || 0, label: '지방정부' },
    { num: groups.historical?.length || 0, label: '역사' },
  ];

  return `
    <div class="org">
      <div class="org-hero">
        <div class="badge-line">POLITIK · 한눈정계 v2</div>

        <div class="stats-row">

function renderGroupPage(gid) {
  const g = GROUPS[gid];
  if (!g) return '<div class="empty">알 수 없는 그룹</div>';
  const groups = groupMembers();
  const members = groups[gid] || [];

  let body = '';
  if (gid === 'legislative') {
    // 정당별 sub-section
    const byParty = new Map();
    for (const m of members) {
      const p = m.POLY_NM || '무소속';
      if (!byParty.has(p)) byParty.set(p, []);
      byParty.get(p).push(m);
    }
    const sorted = [...byParty.entries()].sort((a,b) => b[1].length - a[1].length);
    body = sorted.map(([party, arr]) => `
      <div class="sub-section">
        <h2><span style="color:${partyColor(party)}">●</span> ${escapeHtml(party)} <span class="cnt">${arr.length}명</span></h2>
        <div class="grid">${arr.map(memberCardHTML).join('')}</div>
      </div>
    `).join('');
  } else {
    // type별 sub-section (역대 의원은 age별로 더 세분화)
    const byType = new Map();
    for (const m of members) {
      let t = m._type || 'misc';
      if (m._type === 'former_member' && m._age) t = `former_member_${m._age}`;
      if (!byType.has(t)) byType.set(t, []);
      byType.get(t).push(m);
    }
    // 정렬: TYPE_ORDER 기반 + 역대 의원은 대수 큰 순 (최근부터)
    const baseOrder = TYPE_ORDER[gid] || [];
    let order = [];
    for (const t of baseOrder) {
      if (t === 'former_member') {
        // age별 키들을 큰 순으로
        const ages = [...byType.keys()].filter(k => k.startsWith('former_member_'))
          .map(k => parseInt(k.split('_')[2], 10))
          .sort((a, b) => b - a);
        for (const a of ages) order.push(`former_member_${a}`);
      } else if (byType.has(t)) {
        order.push(t);
      }
    }
    // 누락된 type 추가
    for (const t of byType.keys()) {
      if (!order.includes(t)) order.push(t);
    }
    body = order.filter(t => byType.has(t)).map(t => {
      const arr = byType.get(t);
      let label = TYPE_GROUP_LABEL[t] || t;
      if (t.startsWith('former_member_')) label = `제${t.split('_')[2]}대 국회의원`;
      // 역대 의원은 처음 50명만 표시 (성능)
      const shown = t.startsWith('former_member_') ? arr.slice(0, 50) : arr;
      const remainder = arr.length - shown.length;
      return `
        <div class="sub-section">
          <h2>${escapeHtml(label)} <span class="cnt">${arr.length}명</span></h2>
          <div class="grid">${shown.map(memberCardHTML).join('')}</div>
          ${remainder > 0 ? `<div style="text-align:center;color:var(--dim);padding:12px;font-size:11px">…외 ${remainder}명 (이름순 첫 50명만 표시)</div>` : ''}
        </div>
      `;
    }).join('');
  }

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="group-header">
      <div class="icon" style="background:${g.color}">${g.icon}</div>
      <div style="flex:1">
        <h1>${g.name}</h1>
        <div class="sub">${g.desc}</div>
        <div class="counts"><b>${members.length}</b>명 등록</div>
      </div>
    </div>
    ${body}
  `;
}

function renderPartyPage(partyName) {
  const members = state.members.filter(m => m.POLY_NM === partyName);
  if (members.length === 0) return `<div class="empty">${escapeHtml(partyName)} 인물 없음</div>`;
  const color = partyColor(partyName);
  // 의원·비의원 구분
  const mps = members.filter(m => m._group === 'legislative' || !m._group);
  const others = members.filter(m => !mps.includes(m));
  // 정당 지도부 (party_roles에서)
  const leaders = (PARTY_ROLES[partyName] || []).map(r => {
    const matched = mps.find(m => m.HG_NM === r.mp_name) || others.find(m => m.HG_NM === r.mp_name);
    return { ...r, member: matched };
  }).filter(r => r.member);

  const leadersHtml = leaders.length ? `
    <div class="sub-section">
      <h2>지도부 <span class="cnt">${leaders.length}명</span></h2>
      <div class="grid">${leaders.map(r => {
        const m = r.member;
        const initial = (m.HG_NM || '?').charAt(0);
        const photo = state.photos.get(m.MONA_CD);
        const avatar = photo?.thumb
          ? `<img src="${escapeHtml(photo.thumb)}" loading="lazy" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
          : escapeHtml(initial);
        return `
          <div class="card" data-id="${escapeHtml(m.MONA_CD)}">
            <div class="card-bar" style="background:${color}"></div>
            <div class="card-body">
              <div class="avatar">${avatar}</div>
              <div class="card-meta">
                <div class="card-name">${escapeHtml(m.HG_NM)}</div>
                <div class="card-party" style="color:${color}; font-size: 11px;">${escapeHtml(r.role)}</div>
                <div class="card-sub">${escapeHtml(m.ORIG_NM || '—')}</div>
              </div>
            </div>
            <div class="card-foot">
              <span>${escapeHtml(r.since || '')}</span>
              <span class="badge">당직</span>
            </div>
          </div>
        `;
      }).join('')}</div>
    </div>` : '';

  // 분류: 의원 vs 단체장/장관 등
  const leaderIds = new Set(leaders.map(r => r.member.MONA_CD));
  const restMps = mps.filter(m => !leaderIds.has(m.MONA_CD));
  const restOthers = others.filter(m => !leaderIds.has(m.MONA_CD));

  const mpsHtml = restMps.length ? `
    <div class="sub-section">
      <h2>22대 국회의원 <span class="cnt">${restMps.length}명</span></h2>
      <div class="grid">${restMps.map(memberCardHTML).join('')}</div>
    </div>` : '';
  const othersHtml = restOthers.length ? `
    <div class="sub-section">
      <h2>기타 직책 <span class="cnt">${restOthers.length}명</span></h2>
      <div class="grid">${restOthers.map(memberCardHTML).join('')}</div>
    </div>` : '';

  return `
    <div class="group-back" id="back-home">← 조직도</div>
    <div class="group-header">
      <div class="icon" style="background:${color}">●</div>
      <div style="flex:1">
        <h1>${escapeHtml(partyName)}</h1>
        <div class="sub">소속 ${members.length}명 · 지도부 ${leaders.length}명 · 22대 국회의원 ${mps.length}명</div>
      </div>
    </div>
    ${leadersHtml}
    ${mpsHtml}
    ${othersHtml}
  `;
}

function memberCardHTML(m) {

    <div class="card" data-id="${escapeHtml(m.MONA_CD)}">

          <div class="card-name">${escapeHtml(m.HG_NM)}</div>

function renderGrid() {
  const q = state.search.trim().toLowerCase();
  const filtered = state.members.filter(m => {
    if (state.filterParty && m.POLY_NM !== state.filterParty) return false;
    if (!q) return true;
    return (
      (m.HG_NM || '').toLowerCase().includes(q) ||
      (m.ORIG_NM || '').toLowerCase().includes(q) ||
      (m.POLY_NM || '').toLowerCase().includes(q) ||
      (m.CMIT_NM || '').toLowerCase().includes(q) ||
      (m._type_label || '').toLowerCase().includes(q)
    );
  });

  document.getElementById('stat-shown').textContent = filtered.length;

  if (filtered.length === 0) {
    return '<div class="empty">검색 결과가 없습니다.</div>';
  }

  // 검색 모드에선 그룹별로 묶기
  if (q) {
    const byGroup = new Map();
    for (const m of filtered) {
      const g = m._group || 'legislative';
      if (!byGroup.has(g)) byGroup.set(g, []);
      byGroup.get(g).push(m);
    }
    const sections = GROUP_ORDER.filter(g => byGroup.has(g)).map(g => {
      const arr = byGroup.get(g);
      const gInfo = GROUPS[g];
      return `
        <div class="sub-section">
          <h2><span style="opacity:0.5">${gInfo.icon}</span> ${escapeHtml(gInfo.name)} <span class="cnt">${arr.length}명</span></h2>
          <div class="grid">${arr.slice(0, 30).map(memberCardHTML).join('')}</div>
          ${arr.length > 30 ? `<div style="text-align:center;color:var(--dim);padding:10px;font-size:11px">…외 ${arr.length - 30}명</div>` : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="result-meta">"<b>${escapeHtml(state.search)}</b>" 검색 — ${filtered.length}건</div>
      ${sections}
    `;
  }

  const cards = filtered.map(m => {
    const color = partyColor(m.POLY_NM);
    const initial = (m.HG_NM || '?').charAt(0);
    const photo = state.photos.get(m.MONA_CD);
    const avatar = (photo && photo.thumb)
      ? `<img src="${escapeHtml(photo.thumb)}" loading="lazy" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
      : escapeHtml(initial);
    return `
      <div class="card" data-id="${escapeHtml(m.MONA_CD)}">
        <div class="card-bar" style="background:${color}"></div>
        <div class="card-body">
          <div class="avatar">${avatar}</div>
          <div class="card-meta">
            <div class="card-name">${escapeHtml(m.HG_NM)}</div>
            <div class="card-party" style="color:${color}">${escapeHtml(m.POLY_NM || '—')}</div>
            <div class="card-sub">${escapeHtml(m.ORIG_NM || '—')}</div>
          </div>
        </div>
        <div class="card-foot">
          <span>${escapeHtml(m.REELE_GBN_NM || '')}</span>
          <span class="badge">${escapeHtml(m.CMIT_NM || '비위원')}</span>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="result-meta"><b>${filtered.length}</b>명 표시 (전체 <b>${state.members.length}</b>명)</div>
    <div class="grid">${cards}</div>
  `;
}

// ============================================================
// Filter bar (party chips)
// ============================================================
function renderFilters() {
  state.partyCounts.clear();
  for (const m of state.members) {
    const p = m.POLY_NM || '무소속';
    state.partyCounts.set(p, (state.partyCounts.get(p) || 0) + 1);
  }
  // sort by count desc
  const parties = [...state.partyCounts.entries()].sort((a,b) => b[1] - a[1]);
  const total = state.members.length;
  const html = [
    `<span class="filter-label">정당</span>`,
    `<span class="chip ${state.filterParty === null ? 'active' : ''}" data-party="">전체 <span class="cnt">${total}</span></span>`,
    ...parties.map(([p, n]) => `
      <span class="chip ${state.filterParty === p ? 'active' : ''}" data-party="${escapeHtml(p)}">
        <span class="dot" style="background:${partyColor(p)}"></span>
        ${escapeHtml(p)} <span class="cnt">${n}</span>
      </span>
    `),
  ].join('');
  document.getElementById('filter-bar').innerHTML = html;
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      const p = el.dataset.party;
      if (!p) {
        state.filterParty = null;
        location.hash = '';
        renderFilters(); route();
      } else {
        location.hash = `#/party/${encodeURIComponent(p)}`;
      }
    });
  });
}

// ============================================================
// Routing
// ============================================================
function route() {
  const view = document.getElementById('view');
  const hash = location.hash || '';
  const filterBar = document.getElementById('filter-bar');
  const navStats = document.querySelector('.nav-stats');
  // 페이지 전환 시 잔존 툴팁 강제 숨김
  const _tip = document.getElementById('rel-tooltip');
  if (_tip) _tip.style.display = 'none';

  // 정치 분포 지도 페이지
  if (hash === '#/map') {
    view.innerHTML = renderMapPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    setTimeout(initMap, 100);
    return;
  }
  // 관계도 페이지
  if (hash === '#/relations') {
    view.innerHTML = renderRelationsPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    setTimeout(initRelationsGraph, 100);
    return;
  }
  // 정당 페이지
  const pMatch = hash.match(/^#\/party\/(.+)$/);
  if (pMatch) {
    const partyName = decodeURIComponent(pMatch[1]);
    view.innerHTML = renderPartyPage(partyName);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => m.POLY_NM === partyName && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    return;
  }
  // 그룹 페이지
  const gMatch = hash.match(/^#\/group\/(\w+)$/);
  if (gMatch) {
    const gid = gMatch[1];
    view.innerHTML = renderGroupPage(gid);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => (m._group || 'legislative') === gid && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    // historical 그룹: 2~21대 역대 의원 전부 lazy load (단계별 — 5천명 이상)
    if (gid === 'historical') {
      ensureHistoricalAssemblies([21, 20, 19, 18, 17, 16, 15, 14, 13]).then(changed => {
        if (changed && location.hash === `#/group/historical`) route();
        ensureHistoricalAssemblies([12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2]).then(c2 => {
          if (c2 && location.hash === `#/group/historical`) route();
        });
      });
    }
    return;
  }
  const m = hash.match(/^#\/m\/(.+)$/);
  if (m) {
    const memberId = decodeURIComponent(m[1]);
    view.innerHTML = renderDetail(memberId);
    document.getElementById('back-btn')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.col-card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    window.scrollTo(0, 0);
    // Bio 데이터 (사진 + 위키 요약) 없으면 비동기 fetch + 재렌더
    const member = state.members.find(x => x.MONA_CD === memberId);
    if (member) {
      const cached = state.photos.get(member.MONA_CD);
      const needsFetch = !cached || (cached.extract == null && !cached.miss);
      if (needsFetch) {
        ensurePhoto(member).then(() => {
          if (location.hash.endsWith(memberId)) route();
        });
      }
    }
    // 같은 위원회 동료들의 사진도 백그라운드 프리페치
    if (member?.CMIT_NM) {
      const cols = state.members.filter(x => x.CMIT_NM === member.CMIT_NM && !state.photos.has(x.MONA_CD)).slice(0, 12);
      prefetchPhotos(cols, 3);
    }
  } else {
    // 홈 = 조직도 또는 검색 시 그리드
    if (state.search.trim() || state.filterParty) {
      view.innerHTML = renderGrid();
      document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
      });
      const visible = state.members
        .filter(m => !state.filterParty || m.POLY_NM === state.filterParty)
        .filter(m => !state.photos.has(m.MONA_CD))
        .slice(0, 30);
      prefetchPhotos(visible, 3);
      if (filterBar) filterBar.style.display = '';
    } else {
      view.innerHTML = renderHome();
      document.querySelectorAll('.org-box').forEach(el => {
        el.addEventListener('click', () => { location.hash = `#/group/${el.dataset.group}`; });
      });
      document.querySelectorAll('.party-link').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          location.hash = `#/party/${encodeURIComponent(el.dataset.party)}`;
        });
      });
      // 도넛 차트 클릭 (segment + legend row)
      document.querySelectorAll('.donut-seg, .donut-leg-row').forEach(el => {
        el.addEventListener('click', () => {
          const p = el.dataset.party;
          if (p) location.hash = `#/party/${encodeURIComponent(p)}`;
        });
      });
      // 각 그룹의 상위 6명 사진 프리페치
      const byG = groupMembers();
      const prefetch = [];
      for (const gid of GROUP_ORDER) {
        const arr = (byG[gid] || []).slice(0, 6);
        for (const m of arr) if (!state.photos.has(m.MONA_CD)) prefetch.push(m);
      }
      prefetchPhotos(prefetch, 3);
      if (filterBar) filterBar.style.display = 'none';
    }
  }
}

window.addEventListener('hashchange', route);
document.getElementById('brand').addEventListener('click', () => { location.hash = ''; });
document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  if (!location.hash) route();
});

// 다크 모드 토글
const THEME_KEY = 'politik:theme';
function applyTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  document.getElementById('theme-toggle').textContent = name === 'dark' ? '☀' : '🌙';
  localStorage.setItem(THEME_KEY, name);
}
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) applyTheme(saved);
  else applyTheme(matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});

// ============================================================
// Boot
// ============================================================
(async () => {
  loadPhotoCache();
  loadWikiOverrides(); // 백그라운드 — 첫 진입 시 위키 카테고리 fetch
  try {
    const { data, syncedAt } = await loadMembers();
    // 국회 외 인물 합치기 (대통령·시도지사·사법부 등)
    const extras = await loadExtraPoliticians();
    // 의원에도 _group 부여
    const members = data.map(m => ({ ...m, _group: 'legislative', _type: 'assembly_member', _type_label: '국회의원' }));
    state.members = [...extras, ...members];
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('last-sync').textContent = new Date(syncedAt).toLocaleDateString('ko-KR');
    renderFilters();
    route();
    // 의안은 백그라운드 로드 (홈 표시 후)
    loadProcessedBills().then(bills => {
      state.bills = bills;
      state.billsByCommittee = new Map();
      for (const b of bills) {
        const c = b.CURR_COMMITTEE || '미상';
        if (!state.billsByCommittee.has(c)) state.billsByCommittee.set(c, []);
        state.billsByCommittee.get(c).push(b);
      }
      // 정렬 (최신순)
      for (const arr of state.billsByCommittee.values()) {
        arr.sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));
      }
      // 상세 페이지 중이면 재렌더
      if (location.hash.startsWith('#/m/')) route();
    }).catch(e => console.warn('bills load failed:', e.message));
  } catch (e) {
    document.getElementById('view').innerHTML = `<div class="empty">데이터 로드 실패: ${escapeHtml(e.message)}<br><br>국회 OPEN API가 일시적으로 응답하지 않거나, 브라우저 네트워크 문제일 수 있습니다.</div>`;
  }
})();
</script>
