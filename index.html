function renderDetail(id) {
  const m = state.members.find(x => x.MONA_CD === id);
  if (!m) return '<div class="empty">해당 의원을 찾을 수 없습니다.</div>';

  const color = partyColor(m.POLY_NM);
  const initial = (m.HG_NM || '?').charAt(0);
  const bornYear = (m.BTH_DATE || '').slice(0, 4);
  const age = bornYear ? new Date().getFullYear() - parseInt(bornYear, 10) : '—';
  const photo = state.photos.get(m.MONA_CD);
  const dAvatarInner = (photo && photo.thumb)
    ? `<img src="${escapeHtml(photo.thumb)}" alt="${escapeHtml(m.HG_NM)}" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
    : escapeHtml(initial);

  // 정당 직책 확인 (mp_name 일치)
  const partyRolesForThis = [];
  if (m.POLY_NM && PARTY_ROLES[m.POLY_NM]) {
    for (const r of PARTY_ROLES[m.POLY_NM]) {
      if (r.mp_name === m.HG_NM) partyRolesForThis.push(r);
    }
  }

  // 동료 (같은 상임위)
  const colleagues = state.members.filter(x =>
    x.MONA_CD !== m.MONA_CD &&
    x.CMIT_NM === m.CMIT_NM &&
    m.CMIT_NM
  ).slice(0, 12);

  const colleaguesHtml = colleagues.length ? `
    <div class="d-section">
      <h2>같은 상임위 (${escapeHtml(m.CMIT_NM)}) · ${colleagues.length}명</h2>
      <div class="colleagues">
        ${colleagues.map(c => `
          <div class="col-card" data-id="${escapeHtml(c.MONA_CD)}">
            <div class="col-avatar" style="color:${partyColor(c.POLY_NM)}">${escapeHtml((c.HG_NM||'?').charAt(0))}</div>
            <div class="col-info">
              <div class="col-name">${escapeHtml(c.HG_NM)}</div>
              <div class="col-party">${escapeHtml(c.POLY_NM || '—')}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  ` : '';

  // 본인이 대표발의한 처리 의안 (RST_PROPOSER === m.HG_NM)
  const mineBills = [];
  if (m.HG_NM && state.bills?.length && Object.keys(state.billProposers || {}).length) {
    for (const b of state.bills) {
      const info = getBillProposerInfo(b);
      if (info.kind === 'mp' && info.name === m.HG_NM) mineBills.push(b);
    }
    mineBills.sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));
  }
  const minePassed = mineBills.filter(b => /가결/.test(b.PROC_RESULT_CD || '')).length;
  const mineRejected = mineBills.filter(b => /부결|폐기/.test(b.PROC_RESULT_CD || '')).length;
  const minePassRate = mineBills.length ? (minePassed / mineBills.length * 100).toFixed(1) : '0';
  // 광역단체장이면 선거 결과 표시
  let electionHtml = '';
  if (m._type === 'local_gov_head' && state.localElections?.elections?.length) {
    const matches = [];
    for (const e of state.localElections.elections) {
      const g = e.governors.find(gv => gv.winner === m.HG_NM && (gv.region === m.ORIG_NM || gv.region === (m.region || ''))) ||
                e.governors.find(gv => gv.winner === m.HG_NM);
      if (g) matches.push({ e, g, role: 'winner' });
      else {
        const r = e.governors.find(gv => gv.runner_up === m.HG_NM);
        if (r) matches.push({ e, g: r, role: 'runner' });
      }
    }
    if (matches.length) {
      electionHtml = `
        <div class="d-section">
          <h2>🗳 지방선거 결과 — ${matches.length}회 출마</h2>
          ${matches.map(({e, g, role}) => {
            const isWinner = role === 'winner';
            const myPct = isWinner ? g.winner_pct : g.runner_up_pct;
            const myParty = isWinner ? g.winner_party : g.runner_up_party;
            const oppName = isWinner ? g.runner_up : g.winner;
            const oppParty = isWinner ? g.runner_up_party : g.winner_party;
            const oppPct = isWinner ? g.runner_up_pct : g.winner_pct;
            return `
              <div class="d-election-card ${isWinner ? 'd-election-won' : 'd-election-lost'}">
                <div class="d-election-head">
                  <span class="d-election-year">${e.date.slice(0,4)}</span>
                  <span class="d-election-name">${escapeHtml(e.name)}</span>
                  <span class="d-election-region">${escapeHtml(g.region)}</span>
                  <span class="d-election-badge ${isWinner ? 'won' : 'lost'}">${isWinner ? '당선' : '낙선'}</span>
                </div>
                <div class="d-election-vs">
                  <div class="d-election-me">
                    <b style="color:${partyColor(myParty)}">${escapeHtml(m.HG_NM)}</b>
                    <span>${escapeHtml(myParty)}</span>
                    <b class="d-election-pct">${myPct}%</b>
                  </div>
                  <div class="d-election-mid">vs</div>
                  <div class="d-election-opp">
                    <b style="color:${partyColor(oppParty)}">${escapeHtml(oppName)}</b>
                    <span>${escapeHtml(oppParty)}</span>
                    <b class="d-election-pct">${oppPct}%</b>
                  </div>
                </div>
                <div class="d-election-gap">격차 ${g.gap.toFixed(1)}%p · 투표율 ${g.turnout || '—'}%${g.highlight ? ` · ${escapeHtml(g.highlight)}` : ''}</div>
              </div>`;
          }).join('')}
        </div>`;
    }
  }

  const mineHtml = mineBills.length ? `
    <div class="d-section">
      <h2>📋 ${escapeHtml(m.HG_NM)} 의원 대표발의 → 본회의 처리 — ${mineBills.length}건</h2>
      <div class="d-grid" style="margin-bottom:14px;">
        <div class="d-stat"><div class="d-stat-label">가결</div><div class="d-stat-value" style="color:var(--ok)">${minePassed}</div></div>
        <div class="d-stat"><div class="d-stat-label">부결·폐기</div><div class="d-stat-value" style="color:#c0392b">${mineRejected}</div></div>
        <div class="d-stat"><div class="d-stat-label">통과율</div><div class="d-stat-value">${minePassRate}%</div></div>
      </div>
      <div class="patch-list">
        ${mineBills.slice(0, 10).map((b, idx) => patchRowHTML(b, -1)).join('')}
      </div>
      ${mineBills.length > 10 ? `<div style="font-size:11px;color:var(--dim);margin-top:8px;text-align:right">…외 ${mineBills.length - 10}건</div>` : ''}
    </div>
  ` : (m._group === 'legislative' || (!m._group && m.UNITS)) && Object.keys(state.billProposers || {}).length === 0
    ? `<div class="d-section"><h2>📋 대표발의 법안</h2><div style="font-size:12px;color:var(--dim);padding:14px 0">발의자 데이터 로드 중…</div></div>`
    : '';

  // 위원회별 본회의 처리 법안
  const cmtBills = m.CMIT_NM ? (state.billsByCommittee.get(m.CMIT_NM) || []) : [];
  const passed = cmtBills.filter(b => /가결/.test(b.PROC_RESULT_CD || '')).length;
  const rejected = cmtBills.filter(b => /부결|폐기/.test(b.PROC_RESULT_CD || '')).length;
  const billsHtml = cmtBills.length ? `
    <div class="d-section">
      <h2>${escapeHtml(m.CMIT_NM)}가 22대에 본회의 처리 — ${cmtBills.length}건</h2>
      <div class="d-grid" style="margin-bottom:14px;">
        <div class="d-stat"><div class="d-stat-label">가결</div><div class="d-stat-value" style="color:var(--ok)">${passed}</div></div>
        <div class="d-stat"><div class="d-stat-label">부결·폐기</div><div class="d-stat-value" style="color:#c0392b">${rejected}</div></div>
        <div class="d-stat"><div class="d-stat-label">기타</div><div class="d-stat-value">${cmtBills.length - passed - rejected}</div></div>
      </div>
      <div class="d-list">
        ${cmtBills.slice(0, 10).map(b => `
          <div class="bill-row">
            <div class="bill-date">${escapeHtml((b.PROC_DT || '').slice(0,10))}</div>
            <div class="bill-name">${escapeHtml(b.BILL_NAME || b.BILL_NM || '')}</div>
            <div class="bill-result" style="color:${PROC_RESULT_COLOR[b.PROC_RESULT_CD] || 'var(--text-2)'}">${escapeHtml(b.PROC_RESULT_CD || '—')}</div>
          </div>
        `).join('')}
      </div>
      ${cmtBills.length > 10 ? `<div style="font-size:11px;color:var(--dim);margin-top:8px;text-align:right">…외 ${cmtBills.length - 10}건</div>` : ''}
    </div>
  ` : '';

  const bg = (photo && photo.thumb) ? `<div class="d-hero-bg" style="background-image:url('${escapeHtml(photo.thumb)}')"></div><div class="d-hero-overlay"></div>` : '';
  const wikiExtract = (photo && photo.extract) ? photo.extract : '';
  const wikiDesc = (photo && photo.description) ? photo.description : '';
  const wikiUrl = (photo && photo.url) ? photo.url : `https://ko.wikipedia.org/wiki/${encodeURIComponent(m._wiki || m.HG_NM)}`;

  return `
    <div class="d-back" id="back-btn">← 돌아가기</div>
    <div class="detail">
      <div class="d-hero">
        ${bg}
        <div class="d-bar" style="background:${color}"></div>
        <div class="d-hero-content">
          <div class="d-avatar">${dAvatarInner}</div>
          <div class="d-info">
            <h1>${escapeHtml(m.HG_NM)} <span class="hj">${escapeHtml(m.HJ_NM || '')}</span></h1>
            <div class="d-party" style="color:${color}">
              ${escapeHtml(m.POLY_NM || '—')}
              ${partyRolesForThis.map(r => `<span class="role-badge" style="border-color:${color};color:${color}">${escapeHtml(r.role)}</span>`).join('')}
            </div>
            ${wikiDesc ? `<div class="d-wiki-desc">${escapeHtml(wikiDesc)}</div>` : ''}
            <div class="d-grid">
              <div class="d-stat"><div class="d-stat-label">${m._type === 'former_member' ? '대수' : '지역구'}</div><div class="d-stat-value">${escapeHtml(m.ORIG_NM || '—')}</div></div>
              <div class="d-stat"><div class="d-stat-label">구분</div><div class="d-stat-value">${escapeHtml(m.ELECT_GBN_NM || m._type_label || '—')}</div></div>
              <div class="d-stat"><div class="d-stat-label">선수</div><div class="d-stat-value">${escapeHtml(m.REELE_GBN_NM || '—')}</div></div>
              ${bornYear ? `<div class="d-stat"><div class="d-stat-label">생년 (만)</div><div class="d-stat-value">${bornYear} (${age})</div></div>` : ''}
              ${m.SEX_GBN_NM ? `<div class="d-stat"><div class="d-stat-label">성별</div><div class="d-stat-value">${escapeHtml(m.SEX_GBN_NM)}</div></div>` : ''}
              ${m.CMIT_NM ? `<div class="d-stat"><div class="d-stat-label">상임위·역할</div><div class="d-stat-value">${escapeHtml(m.CMIT_NM)}</div></div>` : ''}
            </div>
          </div>
        </div>
      </div>
      <div class="d-body">
        <div class="d-section">
          <h2>연락처 · 사무실</h2>
          <div class="d-list">
            <div class="d-row"><span class="k">의원회관</span><span class="v">${escapeHtml(m.ASSEM_ADDR || '—')}</span></div>
            <div class="d-row"><span class="k">전화</span><span class="v">${escapeHtml(m.TEL_NO || '—')}</span></div>
            <div class="d-row"><span class="k">이메일</span><span class="v">${m.E_MAIL ? `<a href="mailto:${escapeHtml(m.E_MAIL)}">${escapeHtml(m.E_MAIL)}</a>` : '—'}</span></div>
            <div class="d-row"><span class="k">홈페이지</span><span class="v">${m.HOMEPAGE ? `<a href="${escapeHtml(m.HOMEPAGE)}" target="_blank" rel="noopener">${escapeHtml(m.HOMEPAGE)}</a>` : '—'}</span></div>
          </div>
        </div>
        ${m.STAFF || m.SECRETARY || m.SECRETARY2 ? `
        <div class="d-section">
          <h2>보좌진</h2>
          <div class="d-list">
            ${m.STAFF      ? `<div class="d-row"><span class="k">보좌관</span><span class="v">${escapeHtml(m.STAFF)}</span></div>` : ''}
            ${m.SECRETARY  ? `<div class="d-row"><span class="k">선임비서관</span><span class="v">${escapeHtml(m.SECRETARY)}</span></div>` : ''}
            ${m.SECRETARY2 ? `<div class="d-row"><span class="k">비서</span><span class="v">${escapeHtml(m.SECRETARY2)}</span></div>` : ''}
          </div>
        </div>` : ''}
        ${(wikiExtract || (m.MEM_TITLE && m.MEM_TITLE.length > 5)) ? `
        <div class="d-section">
          <h2>약력 · 소개</h2>
          ${wikiExtract ? `<div class="d-bio-intro">${escapeHtml(wikiExtract)}</div>` : ''}
          ${(m.MEM_TITLE && m.MEM_TITLE.length > 5) ? `<div class="d-career">${escapeHtml(m.MEM_TITLE)}</div>` : ''}
          ${wikiExtract ? `<a href="${escapeHtml(wikiUrl)}" target="_blank" rel="noopener" class="d-wiki-link">한국어 위키에서 더 보기 →</a>` : ''}
        </div>` : `
        <div class="d-section">
          <h2>약력</h2>
          <div style="color:var(--dim);font-size:12px">위키미디어에서 추가 정보를 불러오는 중… 잠시 후 다시 확인해주세요.</div>
        </div>`}
        ${electionHtml}
        ${mineHtml}
        ${billsHtml}
        ${colleaguesHtml}
        <div class="d-section">
          <h2>출처</h2>
          <div class="d-list">
            <div class="d-row"><span class="k">기본 정보</span><span class="v"><a href="https://open.assembly.go.kr" target="_blank">국회 OPEN API · 국회의원 인적사항</a></span></div>
            <div class="d-row"><span class="k">위키</span><span class="v"><a href="https://ko.wikipedia.org/wiki/${encodeURIComponent(m.HG_NM)}" target="_blank">한국어 위키 검색 →</a></span></div>
            <div class="d-row"><span class="k">의원 코드</span><span class="v" style="font-family:monospace;font-size:11px;color:var(--dim)">${escapeHtml(m.MONA_CD)}</span></div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ============================================================
// Filter bar (party chips)
// ============================================================
function renderFilters() {
  state.partyCounts.clear();
  for (const m of state.members) {
    const p = m.POLY_NM || '무소속';
    state.partyCounts.set(p, (state.partyCounts.get(p) || 0) + 1);
  }
  // sort by count desc
  const parties = [...state.partyCounts.entries()].sort((a,b) => b[1] - a[1]);
  const total = state.members.length;
  const html = [
    `<span class="filter-label">정당</span>`,
    `<span class="chip ${state.filterParty === null ? 'active' : ''}" data-party="">전체 <span class="cnt">${total}</span></span>`,
    ...parties.map(([p, n]) => `
      <span class="chip ${state.filterParty === p ? 'active' : ''}" data-party="${escapeHtml(p)}">
        <span class="dot" style="background:${partyColor(p)}"></span>
        ${escapeHtml(p)} <span class="cnt">${n}</span>
      </span>
    `),
  ].join('');
  document.getElementById('filter-bar').innerHTML = html;
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', () => {
      const p = el.dataset.party;
      if (!p) {
        state.filterParty = null;
        location.hash = '';
        renderFilters(); route();
      } else {
        location.hash = `#/party/${encodeURIComponent(p)}`;
      }
    });
  });
}

// ============================================================
// Routing
// ============================================================
function route() {
  const view = document.getElementById('view');
  const hash = location.hash || '';
  const filterBar = document.getElementById('filter-bar');
  const navStats = document.querySelector('.nav-stats');
  // 페이지 전환 시 잔존 툴팁 강제 숨김 (자동완성은 hashchange 핸들러에서 별도 close)
  const _tip = document.getElementById('rel-tooltip');
  if (_tip) _tip.style.display = 'none';

  // 제9회 지방선거 (진행 중)
  if (hash === '#/election2026') {
    const renderE26 = () => {
      view.innerHTML = renderElection2026Page();
      document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
      // NEC 프록시 설정 버튼
      document.getElementById('nec-setup-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        const current = getNecProxy();
        const url = prompt('NEC 프록시 URL 입력\n예: https://nec-proxy.your-subdomain.workers.dev\n(worker/README.md 참조)', current);
        if (url !== null) {
          setNecProxy(url.trim());
          if (url.trim()) {
            // 즉시 로드 시도
            loadNec2026Governors().then(() => renderE26());
          } else {
            state.nec2026Governors = null;
            renderE26();
          }
        }
      });
      document.getElementById('nec-disconnect')?.addEventListener('click', (e) => {
        e.preventDefault();
        if (confirm('NEC 프록시 연결을 해제할까요?')) {
          setNecProxy('');
          state.nec2026Governors = null;
          try { localStorage.removeItem(CACHE_KEY_NEC_2026); } catch {}
          renderE26();
        }
      });
    };
    renderE26();
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    loadElection2026().then(() => {
      if (location.hash !== '#/election2026') return;
      renderE26();
    });
    // NEC 데이터 로드 (프록시 설정되어 있으면)
    if (getNecProxy()) {
      loadNec2026Governors().then(() => {
        if (location.hash !== '#/election2026') return;
        renderE26();
      });
    }
    return;
  }
  // 지방선거 (역대)
  if (hash === '#/elections') {
    view.innerHTML = renderLocalElectionsPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    loadLocalElections().then(() => {
      if (location.hash !== '#/elections') return;
      view.innerHTML = renderLocalElectionsPage();
      document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    });
    return;
  }
  // 국제 비교
  if (hash === '#/world') {
    view.innerHTML = renderWorldComparePage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    loadWorldCompare().then(() => {
      if (location.hash !== '#/world') return;
      view.innerHTML = renderWorldComparePage();
      document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    });
    return;
  }
  // 위원회 상세
  const cMatch = hash.match(/^#\/committee\/(.+)$/);
  if (cMatch) {
    const cmtName = decodeURIComponent(cMatch[1]);
    view.innerHTML = renderCommitteeDetail(cmtName);
    document.getElementById('back-cmt')?.addEventListener('click', () => { location.hash = '#/committees'; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    return;
  }
  // 위원회 목록
  if (hash === '#/committees') {
    view.innerHTML = renderCommitteesPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.cmt-card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/committee/${encodeURIComponent(el.dataset.cmt)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    return;
  }
  // 의안 통계
  if (hash === '#/bills') {
    const renderBills = () => {
      view.innerHTML = renderBillsPage();
      document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
      // Filter chips
      view.querySelectorAll('.pf-chip').forEach(el => {
        el.addEventListener('click', () => {
          state.billsFilter[el.dataset.f] = el.dataset.v === 'all' ? 'all' : el.dataset.v;
          state.billsFilter.limit = 30;
          renderBills();
        });
      });
      // 정당/위원회 selects
      view.querySelector('#pf-party-select')?.addEventListener('change', e => {
        state.billsFilter.party = e.target.value || null;
        state.billsFilter.limit = 30;
        renderBills();
      });
      view.querySelector('#pf-cmt-select')?.addEventListener('change', e => {
        state.billsFilter.committee = e.target.value || null;
        state.billsFilter.limit = 30;
        renderBills();
      });
      // 검색 (debounced)
      const $q = view.querySelector('#pf-search');
      if ($q) {
        let qTimer;
        $q.addEventListener('input', e => {
          clearTimeout(qTimer);
          qTimer = setTimeout(() => {
            state.billsFilter.q = e.target.value;
            state.billsFilter.limit = 30;
            renderBills();
            const ni = document.getElementById('pf-search');
            if (ni) { ni.focus(); ni.setSelectionRange(ni.value.length, ni.value.length); }
          }, 250);
        });
      }
      // Reset
      view.querySelector('#pf-reset')?.addEventListener('click', () => {
        state.billsFilter = { result: 'all', kind: 'all', party: null, committee: null, q: '', limit: 30 };
        renderBills();
      });
      // 더 보기
      view.querySelector('#pf-more')?.addEventListener('click', () => {
        state.billsFilter.limit += 50;
        renderBills();
      });
      // 발의자 클릭 → 상세
      view.querySelectorAll('.patch-by-mp[data-mid]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          location.hash = `#/m/${encodeURIComponent(el.dataset.mid)}`;
        });
      });
    };
    renderBills();
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    if (!state.bills.length) {
      const tryRender = () => {
        if (location.hash !== '#/bills') return;
        if (state.bills.length) renderBills();
        else setTimeout(tryRender, 2000);
      };
      setTimeout(tryRender, 1500);
    }
    return;
  }
  // 정당사 타임라인
  if (hash === '#/history/parties') {
    view.innerHTML = renderPartyHistoryPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    loadPartyHistory().then(() => {
      view.innerHTML = renderPartyHistoryPage();
      document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
      // 막대 클릭 → 위키 이동
      view.querySelectorAll('.ph-bar, .ph-list-row').forEach(el => {
        el.addEventListener('click', () => {
          const wiki = el.dataset.wiki;
          if (wiki) window.open('https://ko.wikipedia.org/wiki/' + encodeURIComponent(wiki), '_blank', 'noopener');
        });
      });
    });
    return;
  }
  // 정치 분포 지도 페이지
  if (hash === '#/map') {
    view.innerHTML = renderMapPage();
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    setTimeout(initMap, 100);
    return;
  }
  // 관계도 페이지
  if (hash === '#/relations') {
    const renderRel = () => {
      view.innerHTML = renderRelationsPage();
      document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
      // 분야 필터
      view.querySelectorAll('.pf-chip[data-rt]').forEach(el => {
        el.addEventListener('click', () => {
          state.relFilter.topic = el.dataset.rt;
          renderRel();
          setTimeout(initRelationsGraph, 50);
        });
      });
      // 최소 협력 필터
      view.querySelectorAll('.pf-chip[data-rw]').forEach(el => {
        el.addEventListener('click', () => {
          state.relFilter.minWeight = parseInt(el.dataset.rw, 10);
          renderRel();
          setTimeout(initRelationsGraph, 50);
        });
      });
    };
    renderRel();
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    setTimeout(initRelationsGraph, 100);
    return;
  }
  // 정당 페이지
  const pMatch = hash.match(/^#\/party\/(.+)$/);
  if (pMatch) {
    const partyName = decodeURIComponent(pMatch[1]);
    view.innerHTML = renderPartyPage(partyName);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => m.POLY_NM === partyName && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    return;
  }
  // 그룹 페이지
  const gMatch = hash.match(/^#\/group\/(\w+)$/);
  if (gMatch) {
    const gid = gMatch[1];
    view.innerHTML = renderGroupPage(gid);
    document.getElementById('back-home')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.card').forEach(el => {
      el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
    });
    if (filterBar) filterBar.style.display = 'none';
    window.scrollTo(0, 0);
    const visible = state.members.filter(m => (m._group || 'legislative') === gid && !state.photos.has(m.MONA_CD)).slice(0, 30);
    prefetchPhotos(visible, 3);
    // historical 그룹: 2~21대 역대 의원 전부 lazy load (단계별 — 5천명 이상)
    if (gid === 'historical') {
      ensureHistoricalAssemblies([21, 20, 19, 18, 17, 16, 15, 14, 13]).then(changed => {
        if (changed && location.hash === `#/group/historical`) route();
        ensureHistoricalAssemblies([12, 11, 10, 9, 8, 7, 6, 5, 4, 3, 2]).then(c2 => {
          if (c2 && location.hash === `#/group/historical`) route();
        });
      });
    }
    return;
  }
  const m = hash.match(/^#\/m\/(.+)$/);
  if (m) {
    const memberId = decodeURIComponent(m[1]);
    view.innerHTML = renderDetail(memberId);
    document.getElementById('back-btn')?.addEventListener('click', () => { location.hash = ''; });
    document.querySelectorAll('.col-card').forEach(el => {

    window.scrollTo(0, 0);
    // Bio 데이터 (사진 + 위키 요약) 없으면 비동기 fetch + 재렌더
    const member = state.members.find(x => x.MONA_CD === memberId);
    if (member) {
      const cached = state.photos.get(member.MONA_CD);
      const needsFetch = !cached || (cached.extract == null && !cached.miss);
      if (needsFetch) {
        ensurePhoto(member).then(() => {
          if (location.hash.endsWith(memberId)) route();
        });
      }
    }
    // 같은 위원회 동료들의 사진도 백그라운드 프리페치
    if (member?.CMIT_NM) {
      const cols = state.members.filter(x => x.CMIT_NM === member.CMIT_NM && !state.photos.has(x.MONA_CD)).slice(0, 12);
      prefetchPhotos(cols, 3);
    }
  } else {
    // 홈 = 조직도 또는 검색 시 그리드
    if (state.search.trim() || state.filterParty) {
      view.innerHTML = renderGrid();
      document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', () => { location.hash = `#/m/${encodeURIComponent(el.dataset.id)}`; });
      });
      const visible = state.members
        .filter(m => !state.filterParty || m.POLY_NM === state.filterParty)
        .filter(m => !state.photos.has(m.MONA_CD))
        .slice(0, 30);
      prefetchPhotos(visible, 3);
      if (filterBar) filterBar.style.display = '';
    } else {
      view.innerHTML = renderHome();
      document.querySelectorAll('.grpbox, .org-box').forEach(el => {
        el.addEventListener('click', () => {
          if (el.dataset.group) location.hash = `#/group/${el.dataset.group}`;
        });
      });
      document.querySelectorAll('.party-link').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          location.hash = `#/party/${encodeURIComponent(el.dataset.party)}`;
        });
      });
      // 패치 노트 발의자 클릭 → 상세
      document.querySelectorAll('.patch-by-mp[data-mid]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          location.hash = `#/m/${encodeURIComponent(el.dataset.mid)}`;
        });
      });
      // 홈 정당 필터 chip
      document.querySelectorAll('.home-fchip').forEach(el => {
        el.addEventListener('click', () => {
          state.homeFeedFilter.party = el.dataset.pid;

      // 소셜 공유 버튼
      document.getElementById('share-kakao')?.addEventListener('click', (e) => {

        // 카카오톡 공유 — Kakao SDK 없이 카카오톡 모바일 앱 직접 호출

        } else {

            alert('URL이 복사되었습니다. 카카오톡에 붙여넣기 해주세요:\n\n' + url);

      document.getElementById('share-copy')?.addEventListener('click', (e) => {

// ============================================================
// Autocomplete (search dropdown)
// ============================================================
const AC = (() => {
  const $input = document.getElementById('search');
  const $drop = document.getElementById('ac-dropdown');
  let activeIdx = -1;
  let items = [];

  function hl(text, q) {
    if (!q || !text) return escapeHtml(text || '');
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx < 0) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx)) + '<mark>' + escapeHtml(text.slice(idx, idx + q.length)) + '</mark>' + escapeHtml(text.slice(idx + q.length));
  }

  function score(m, q) {
    const name = (m.HG_NM || '').toLowerCase();
    if (name === q) return 1000;
    if (name.startsWith(q)) return 500;
    if (name.includes(q)) return 200;
    if ((m.ORIG_NM || '').toLowerCase().includes(q)) return 80;
    if ((m.POLY_NM || '').toLowerCase().includes(q)) return 50;
    if ((m.role || '').toLowerCase().includes(q)) return 60;
    if ((m.region || '').toLowerCase().includes(q)) return 70;
    if ((m.CMIT_NM || '').toLowerCase().includes(q)) return 30;
    if ((m._type_label || '').toLowerCase().includes(q)) return 20;
    return 0;
  }

  function search(q) {
    q = q.trim().toLowerCase();
    if (!q) return { members: [], parties: [], groups: [], bills: [] };
    // Members (top 8)
    const scored = state.members.map(m => ({ m, s: score(m, q) })).filter(x => x.s > 0);
    scored.sort((a, b) => b.s - a.s || (a.m.HG_NM||'').localeCompare(b.m.HG_NM||'', 'ko'));
    const members = scored.slice(0, 6).map(x => x.m);
    // Parties (max 3)
    const partySet = new Set();
    for (const m of state.members) {
      const p = m.POLY_NM;
      if (p && p.toLowerCase().includes(q)) partySet.add(p);
    }
    const parties = [...partySet].slice(0, 3);
    // Groups (max 2)
    const groups = GROUP_ORDER.filter(gid => {
      const g = GROUPS[gid];
      return g.name.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q);
    }).slice(0, 2);
    // Bills (max 4) — 법안명 또는 위원회 매칭, 최신순
    const bills = [];
    if (q.length >= 2 && state.bills?.length) {
      const matched = state.bills.filter(b => {
        const nm = (b.BILL_NAME || b.BILL_NM || '').toLowerCase();
        return nm.includes(q);
      });
      matched.sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));
      bills.push(...matched.slice(0, 4));
    }
    return { members, parties, groups, bills };
  }

  function memberRow(m, q) {
    const photo = state.photos.get(m.MONA_CD);
    const initial = (m.HG_NM || '?').charAt(0);
    const av = photo?.thumb
      ? `<img src="${escapeHtml(photo.thumb)}" alt="" loading="lazy" onerror="this.replaceWith(document.createTextNode('${escapeHtml(initial)}'))">`
      : escapeHtml(initial);
    const sub = [m.POLY_NM, m.ORIG_NM || m.region || m.role, m._type_label].filter(Boolean).join(' · ');
    const color = partyColor(m.POLY_NM);
    return `
      <div class="ac-row" role="option" data-action="member" data-id="${escapeHtml(m.MONA_CD)}">
        <div class="ac-avatar">${av}</div>
        <div class="ac-info">
          <div class="ac-name">${hl(m.HG_NM, q)}</div>
          <div class="ac-sub">${hl(sub, q)}</div>
        </div>
        <span class="ac-badge" style="background:${color}">${escapeHtml(m.POLY_NM || m._type_label || '')}</span>
      </div>`;
  }
  function partyRow(p, q) {
    const cnt = state.members.filter(m => m.POLY_NM === p).length;
    const color = partyColor(p);
    return `
      <div class="ac-row" role="option" data-action="party" data-party="${escapeHtml(p)}">
        <div class="ac-avatar" style="background:${color}; color:#fff">●</div>
        <div class="ac-info">
          <div class="ac-name">${hl(p, q)}</div>
          <div class="ac-sub">정당 · ${cnt}명 등록</div>
        </div>
        <span class="ac-badge" style="background:${color}">정당</span>
      </div>`;
  }
  function groupRow(gid, q) {
    const g = GROUPS[gid];
    const cnt = state.members.filter(m => (m._group || 'legislative') === gid).length;
    return `
      <div class="ac-row" role="option" data-action="group" data-gid="${escapeHtml(gid)}">
        <div class="ac-avatar" style="background:${g.color}; color:#fff">${g.icon}</div>
        <div class="ac-info">
          <div class="ac-name">${hl(g.name, q)}</div>
          <div class="ac-sub">${hl(g.desc, q)} · ${cnt}명</div>
        </div>
        <span class="ac-badge">분류</span>
      </div>`;
  }
  function billRow(b, q) {
    const info = getBillProposerInfo(b);
    const partyC = info.party ? partyColor(info.party) : 'var(--text-2)';
    const link = b.LINK_URL || (b.BILL_ID ? `https://likms.assembly.go.kr/bill/billDetail.do?billId=${b.BILL_ID}` : '');
    const tagColor = b.PROC_RESULT_CD === '원안가결' || b.PROC_RESULT_CD === '수정가결' ? 'var(--ok)' :
                     b.PROC_RESULT_CD === '부결' ? '#c0392b' : 'var(--text-2)';
    return `
      <div class="ac-row" role="option" data-action="bill" data-link="${escapeHtml(link)}">
        <div class="ac-avatar" style="background:${partyC}; color:#fff">📋</div>
        <div class="ac-info">
          <div class="ac-name">${hl(b.BILL_NAME || b.BILL_NM || '—', q)}</div>
          <div class="ac-sub">${escapeHtml((b.PROC_DT || '').slice(0,10))} · ${escapeHtml(b.CURR_COMMITTEE || '—')} · ${info.kind === 'mp' && info.name ? escapeHtml(info.name) : info.kind === 'chair' ? '위원장' : info.kind === 'gov' ? '정부' : ''}</div>
        </div>
        <span class="ac-badge" style="background:${tagColor}">${escapeHtml(b.PROC_RESULT_CD || '의안')}</span>
      </div>`;
  }

  function render(q) {
    const { members, parties, groups, bills } = search(q);
    items = [];
    let html = '';
    if (groups.length) {
      html += '<div class="ac-section-h">분류</div>';
      for (const gid of groups) { items.push({ action: 'group', gid }); html += groupRow(gid, q); }
    }
    if (parties.length) {
      html += '<div class="ac-section-h">정당</div>';
      for (const p of parties) { items.push({ action: 'party', party: p }); html += partyRow(p, q); }
    }
    if (members.length) {
      html += `<div class="ac-section-h">인물 · ${members.length}건${members.length >= 6 ? ' (상위 6)' : ''}</div>`;
      for (const m of members) { items.push({ action: 'member', id: m.MONA_CD }); html += memberRow(m, q); }
    }
    if (bills.length) {
      html += `<div class="ac-section-h">법안 · ${bills.length}건${bills.length >= 4 ? ' (상위 4)' : ''}</div>`;
      for (const b of bills) { items.push({ action: 'bill', link: b.LINK_URL || (b.BILL_ID ? `https://likms.assembly.go.kr/bill/billDetail.do?billId=${b.BILL_ID}` : '') }); html += billRow(b, q); }
    }
    if (!items.length) {
      html = '<div class="ac-empty">결과 없음</div>';
    } else {
      html += `<div class="ac-foot"><span class="ac-kbd">↑↓</span> 이동 · <span class="ac-kbd">Enter</span> 선택 · <span class="ac-kbd">Esc</span> 닫기</div>`;
    }
    $drop.innerHTML = html;
    $drop.classList.add('open');
    activeIdx = -1;
  }
  function close() {
    $drop.classList.remove('open');
    activeIdx = -1;
  }
  function setActive(idx) {
    const rows = $drop.querySelectorAll('.ac-row');
    rows.forEach(r => r.classList.remove('ac-active'));
    if (idx < 0 || idx >= rows.length) { activeIdx = -1; return; }
    activeIdx = idx;
    rows[idx].classList.add('ac-active');
    rows[idx].scrollIntoView({ block: 'nearest' });
  }
  function go(item) {
    if (!item) return;
    close();
    $input.blur();
    if (item.action === 'member') location.hash = `#/m/${encodeURIComponent(item.id)}`;
    else if (item.action === 'party') location.hash = `#/party/${encodeURIComponent(item.party)}`;
    else if (item.action === 'group') location.hash = `#/group/${item.gid}`;
    else if (item.action === 'bill' && item.link) window.open(item.link, '_blank', 'noopener');
  }

  $input.addEventListener('input', e => {
    state.search = e.target.value;
    const q = e.target.value.trim();
    if (q.length === 0) { close(); if (!location.hash) route(); return; }
    render(q);
    if (!location.hash) route();
  });
  $input.addEventListener('focus', () => {
    const q = $input.value.trim();
    if (q.length > 0) render(q);
  });
  $input.addEventListener('keydown', e => {
    if (!$drop.classList.contains('open')) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(Math.min(activeIdx + 1, items.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(Math.max(activeIdx - 1, -1)); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0) go(items[activeIdx]);
      else if (items.length) go(items[0]);
    }
    else if (e.key === 'Escape') { close(); }
  });
  $drop.addEventListener('mousedown', e => {
    const row = e.target.closest('.ac-row');
    if (!row) return;
    e.preventDefault();
    const idx = [...$drop.querySelectorAll('.ac-row')].indexOf(row);
    go(items[idx]);
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) close();
  });
  return { close };
})();

// 다크 모드 토글
const THEME_KEY = 'politik:theme';
function applyTheme(name) {
  document.documentElement.setAttribute('data-theme', name);
  document.getElementById('theme-toggle').textContent = name === 'dark' ? '☀' : '🌙';
  localStorage.setItem(THEME_KEY, name);
}
(function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) applyTheme(saved);
  else applyTheme(matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
});

// ============================================================
(async () => {
  loadPhotoCache();
  loadWikiOverrides(); // 백그라운드 — 첫 진입 시 위키 카테고리 fetch
  try {
    const { data, syncedAt } = await loadMembers();
    // 국회 외 인물 합치기 (대통령·시도지사·사법부 등)
    const extras = await loadExtraPoliticians();
    // 의원에도 _group 부여
    const members = data.map(m => ({ ...m, _group: 'legislative', _type: 'assembly_member', _type_label: '국회의원' }));
    // committee_chair / assembly_leader 중복 제거 — 22대 MP 본인 이름이 이미 있으면 chair 정보를 MEM_TITLE에 병합 후 제외
    const mpNames = new Set(members.map(m => m.HG_NM));
    const filteredExtras = extras.filter(e => {
      // 22대 MP 본인과 이름이 매칭되면 병합 후 별도 entry 제거
      if (['committee_chair','committee_secretary','assembly_leader'].includes(e._type) && mpNames.has(e.HG_NM)) {
        const mp = members.find(m => m.HG_NM === e.HG_NM);
        if (mp) {
          mp.MEM_TITLE = (mp.MEM_TITLE || '') + (mp.MEM_TITLE ? '\n\n' : '') + `[직책] ${e.CMIT_NM || e._type_label}` + (e.MEM_TITLE ? '\n' + e.MEM_TITLE : '');
          if (e._type === 'committee_chair') mp._chairRole = e.CMIT_NM;
          if (e._type === 'committee_secretary') mp._secretaryRole = e.CMIT_NM;
        }
        return false;
      }
      return true;
    });
    state.members = [...filteredExtras, ...members];
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('last-sync').textContent = new Date(syncedAt).toLocaleDateString('ko-KR');
    const fy = document.getElementById('foot-year');
    if (fy) fy.textContent = `v2.1 · ${new Date().getFullYear()}`;
    renderFilters();
    route();
    // 의안은 백그라운드 로드 (홈 표시 후)
    loadProcessedBills().then(bills => {
      state.bills = bills;
      state.billsByCommittee = new Map();
      for (const b of bills) {
        const c = b.CURR_COMMITTEE || '미상';
        if (!state.billsByCommittee.has(c)) state.billsByCommittee.set(c, []);
        state.billsByCommittee.get(c).push(b);
      }
      for (const arr of state.billsByCommittee.values()) {
        arr.sort((a, b) => (b.PROC_DT || '').localeCompare(a.PROC_DT || ''));
      }
      // 홈에서 패치 노트 재렌더 (bills가 더 늦게 로드되므로)
      if (!location.hash) route();
      if (location.hash.startsWith('#/m/') || location.hash === '#/bills' || location.hash === '#/committees') route();
    }).catch(e => console.warn('bills load failed:', e.message));
    // 발의자 정보 별도 로드 (5K건 fetch)
    loadBillProposers().then(map => {
      state.billProposers = map;
      // 홈/의안/패치 페이지면 재렌더
      if (!location.hash || location.hash === '#/bills' || location.hash === '#/patches') route();
    }).catch(e => console.warn('proposers load failed:', e.message));
    // 지방선거 데이터 백그라운드 로드 (광역단체장 detail에 사용)
    loadLocalElections().then(() => {
      // 광역단체장 detail 페이지 중이면 재렌더
      if (location.hash.startsWith('#/m/')) route();
    }).catch(e => console.warn('elections load failed:', e.message));
  } catch (e) {
    document.getElementById('view').innerHTML = `<div class="empty">데이터 로드 실패: ${escapeHtml(e.message)}<br><br>국회 OPEN API가 일시적으로 응답하지 않거나, 브라우저 네트워크 문제일 수 있습니다.</div>`;
  }
})();
</script>
</body>
</html>
